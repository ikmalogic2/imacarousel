<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMACAROUSEL - Prompt Builder Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/alpinejs/3.13.5/cdn.min.js" defer></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #F2F2F7; /* iOS System Gray 6 */
            -webkit-font-smoothing: antialiased;
        }

        .ios-glass {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 0.5px solid rgba(0, 0, 0, 0.15);
        }

        .ios-card {
            background-color: #FFFFFF;
            border-radius: 20px;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
        }

        .ios-input {
            background-color: #7676801F; /* iOS Fill Tertiary */
            border: none;
            transition: all 0.2s ease;
        }
        
        .ios-input:focus {
            background-color: #76768029; /* iOS Fill Secondary */
            box-shadow: 0 0 0 4px rgba(0, 122, 255, 0.15);
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #C7C7CC; border-radius: 10px; }
        
        .accordion-content {
            transition: max-height 0.3s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.2s ease-in-out;
        }

        /* Hide Number Input Arrows */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
    </style>
</head>
<body class="min-h-screen w-full flex items-center justify-center p-2 sm:p-4 md:p-8 text-black">

    <div x-data="appData()" class="w-full max-w-4xl h-[95vh] flex flex-col bg-[#F2F2F7] sm:rounded-[32px] rounded-[24px] shadow-2xl overflow-hidden relative border border-gray-200/50">
        
        <header class="flex-none ios-glass px-5 sm:px-6 py-4 flex items-center justify-between z-20 sticky top-0">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 rounded-xl bg-gradient-to-b from-[#007AFF] to-[#0056B3] flex items-center justify-center shadow-sm text-white">
                    <i class="fas fa-layer-group text-lg"></i>
                </div>
                <div>
                    <h1 class="text-[17px] font-bold tracking-tight text-black leading-tight">IMACAROUSEL</h1>
                    <p class="text-[11px] font-medium text-[#8E8E93] uppercase tracking-wider">Blueprint Pro</p>
                </div>
            </div>
            <div class="flex gap-2">
                <div class="w-3 h-3 rounded-full bg-[#FF3B30] border border-[#FF3B30]/20"></div>
                <div class="w-3 h-3 rounded-full bg-[#FFCC00] border border-[#FFCC00]/20"></div>
                <div class="w-3 h-3 rounded-full bg-[#34C759] border border-[#34C759]/20"></div>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto px-3 sm:px-6 py-6 z-10 space-y-5 pb-24">
            
            <div x-show="feedbackMessage" 
                 x-transition:enter="transition ease-out duration-300"
                 x-transition:enter-start="opacity-0 translate-y-4"
                 x-transition:enter-end="opacity-100 translate-y-0"
                 x-transition:leave="transition ease-in duration-200"
                 x-transition:leave-start="opacity-100 translate-y-0"
                 x-transition:leave-end="opacity-0 translate-y-4"
                 class="fixed bottom-8 left-1/2 -translate-x-1/2 z-50 pointer-events-none">
                <div class="px-6 py-3 rounded-full text-[13px] font-semibold shadow-lg flex items-center gap-2"
                     :class="feedbackType === 'success' ? 'bg-[#34C759] text-white' : 'bg-[#1C1C1E] text-white'">
                    <i class="fas" :class="feedbackType === 'success' ? 'fa-check' : 'fa-info-circle'"></i>
                    <span x-text="feedbackMessage"></span>
                </div>
            </div>

            <div class="ios-card overflow-hidden">
                <button @click="accordions.input = !accordions.input" class="w-full px-5 py-4 flex items-center justify-between text-left focus:outline-none bg-white hover:bg-gray-50 transition-colors">
                    <div class="flex items-center gap-3.5">
                        <div class="w-8 h-8 rounded-full bg-[#FF9500]/10 text-[#FF9500] flex items-center justify-center">
                            <i class="fas fa-lightbulb"></i>
                        </div>
                        <div>
                            <span class="text-[15px] font-semibold text-black">1. Kartu Input</span>
                            <p class="text-[12px] text-[#8E8E93]">Tulis topik atau draft naskah slide di sini</p>
                        </div>
                    </div>
                    <i class="fas fa-chevron-right text-[13px] text-[#C7C7CC] transition-transform duration-300" :class="{'rotate-90': accordions.input}"></i>
                </button>

                <div x-show="accordions.input" x-collapse class="px-5 pb-5 pt-1">
                    <textarea x-model="topic" placeholder="Tulis Topik atau paste Draft Naskah lengkap Anda di sini... (Contoh: 5 Cara Sabar Menghadapi Pasangan, atau paste teks lengkap untuk slide 1-7)" class="w-full p-4 rounded-xl ios-input outline-none text-[14px] h-32 resize-none text-black placeholder-[#8E8E93] font-medium leading-relaxed"></textarea>
                </div>
            </div>

            <div class="ios-card overflow-hidden">
                <button @click="accordions.settings = !accordions.settings" class="w-full px-5 py-4 flex items-center justify-between text-left focus:outline-none bg-white hover:bg-gray-50 transition-colors border-t border-gray-100">
                    <div class="flex items-center gap-3.5">
                        <div class="w-8 h-8 rounded-full bg-[#007AFF]/10 text-[#007AFF] flex items-center justify-center">
                            <i class="fas fa-sliders-h"></i>
                        </div>
                        <div>
                            <span class="text-[15px] font-semibold text-black">2. Kartu Setting</span>
                            <p class="text-[12px] text-[#8E8E93]">Visual, Font, Komposisi, Alignment, Jumlah Slide</p>
                        </div>
                    </div>
                    <i class="fas fa-chevron-right text-[13px] text-[#C7C7CC] transition-transform duration-300" :class="{'rotate-90': accordions.settings}"></i>
                </button>

                <div x-show="accordions.settings" x-collapse class="px-5 pb-5 pt-1">
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        
                        <!-- Art Style -->
                        <div class="col-span-1 sm:col-span-2">
                            <label class="block text-[13px] font-medium text-[#8E8E93] mb-1.5 ml-1 flex justify-between">
                                <span>Gaya Seni (Art Style)</span>
                                <span x-show="artStyle === 'custom'" class="text-[10px] bg-[#FF9500]/20 text-[#FF9500] px-2 py-0.5 rounded-full font-bold">Kustom</span>
                            </label>
                            <div class="relative">
                                <select x-model="artStyle" class="w-full p-3.5 pl-4 pr-8 rounded-xl ios-input outline-none text-[14px] appearance-none font-medium text-black">
                                    <option value="auto">✨ Auto / Default (Layered Papercut)</option>
                                    <option value="custom">✏️ Kustom (Ketik Manual)</option>
                                    <option value="layered_papercut">✂️ 1. Layered Papercut</option>
                                    <option value="paper_cut_diorama">🎭 2. 3D Paper Cut Diorama</option>
                                    <option value="papercraft_3d">📦 3. 3D Papercraft</option>
                                    <option value="islamic_papercraft">🕌 4. Islamic 3D Papercraft</option>
                                    <option value="low_poly_3d">💎 5. Low Poly 3D</option>
                                    <option value="isometric_papercraft_lowpoly">📐 6. 3D Isometric Papercraft Low Poly</option>
                                    <option value="origami_art">🦢 7. Origami Art</option>
                                    <option value="vintage_storybook">📖 8. Vintage Storybook</option>
                                    <option value="cutaway_illustration">🏗️ 9. Cutaway Illustration</option>
                                    <option value="voxel_art">🧱 10. Voxel Art</option>
                                    <option value="knit_crochet">🧶 11. Premium Knit & Crochet 3D</option>
                                    <option value="needle_felting">🪡 12. Premium Needle Felting 3D</option>
                                    <option value="quilted_patchwork">🧵 13. Premium Quilted Patchwork 3D</option>
                                    <option value="whimsical_doodle">✒️ 14. Ink & Watercolor Doodle</option>
                                    <option value="studygram_journal">📓 15. Studygram Digital Journaling</option>
                                    <option value="watercolor_ink">🎨 16. Watercolor & Ink Illustration</option>
                                    <option value="wimmelbilderbuch">🏘️ 17. Wimmelbilderbuch</option>
                                    <option value="comic_studio">🗯️ 18. Comic Studio</option>
                                    <option value="grunge_streetwear">🛹 19. Grunge Streetwear</option>
                                    <option value="pixar_3d">🎬 20. Pixar Inspired 3D</option>
                                </select>
                                <div class="absolute right-3 top-1/2 -translate-y-1/2 text-[#8E8E93] pointer-events-none"><i class="fas fa-chevron-down text-[11px]"></i></div>
                            </div>
                            <div x-show="artStyle === 'custom'" class="mt-2" x-transition>
                                <textarea x-model="customArtStyle" rows="2" placeholder="Deskripsikan gaya seni yang Anda inginkan..." class="w-full p-3 rounded-xl ios-input outline-none text-[14px] border border-[#FF9500]/30 resize-none text-black"></textarea>
                            </div>
                        </div>

                        <!-- Tipografi (Font) -->
                        <div class="col-span-1">
                            <label class="block text-[13px] font-medium text-[#8E8E93] mb-1.5 ml-1 flex justify-between">
                                <span>Tipografi (DNA Font)</span>
                                <span x-show="typographyChoice === 'custom'" class="text-[10px] bg-[#FF9500]/20 text-[#FF9500] px-2 py-0.5 rounded-full font-bold">Kustom</span>
                            </label>
                            <div class="relative">
                                <select x-model="typographyChoice" class="w-full p-3.5 pl-4 pr-8 rounded-xl ios-input outline-none text-[14px] appearance-none font-medium text-black">
                                    <option value="auto">✨ Auto / Acak</option>
                                    <option value="custom">✏️ Kustom</option>
                                    <option value="Friendly Rounded Handwritten">1. Friendly Rounded (Edukasi)</option>
                                    <option value="Soft Brush Handwriting">2. Soft Brush (Artistik)</option>
                                    <option value="Modern Editorial Serif">3. Modern Serif (Luxury)</option>
                                    <option value="Humanist Sans">4. Humanist Sans (Profesional)</option>
                                    <option value="Geometric Sans">5. Geometric Sans (Tegas)</option>
                                    <option value="Rounded Sans">6. Rounded Sans (Ramah)</option>
                                    <option value="Storybook Typography">7. Storybook (Ilustrasi)</option>
                                    <option value="Notebook Handwriting">8. Notebook (Catatan)</option>
                                    <option value="Premium Calligraphy">9. Calligraphy (Anggun)</option>
                                    <option value="Modern Script">10. Modern Script (Elegan)</option>
                                    <option value="Vintage Sign Painting">11. Vintage Sign (Retro)</option>
                                    <option value="Chalkboard">12. Chalkboard (Sekolah)</option>
                                    <option value="Pencil Sketch">13. Pencil Sketch (Sketsa)</option>
                                    <option value="Ink Pen">14. Ink Pen (Jurnal Klasik)</option>
                                    <option value="Comic Friendly">15. Comic (Bermain)</option>
                                    <option value="Childrens Book">16. Children's Book (Anak)</option>
                                    <option value="Scandinavian Minimal">17. Scandinavian (Minimalis)</option>
                                    <option value="Japanese Lifestyle">18. Japanese (Estetik)</option>
                                    <option value="Luxury Magazine">19. Luxury Magazine (Fashion)</option>
                                    <option value="Cozy Journal">20. Cozy Journal (Intim)</option>
                                </select>
                                <div class="absolute right-3 top-1/2 -translate-y-1/2 text-[#8E8E93] pointer-events-none"><i class="fas fa-chevron-down text-[11px]"></i></div>
                            </div>
                            <div x-show="typographyChoice === 'custom'" class="mt-2" x-transition>
                                <textarea x-model="customTypography" rows="2" placeholder="Karakteristik font..." class="w-full p-3 rounded-xl ios-input outline-none text-[14px] border border-[#FF9500]/30 resize-none text-black"></textarea>
                            </div>
                        </div>

                        <!-- Efek Teks -->
                        <div class="col-span-1">
                            <label class="block text-[13px] font-medium text-[#8E8E93] mb-1.5 ml-1 flex justify-between">
                                <span>Efek Teks (Header & Body)</span>
                                <span x-show="textEffect === 'custom'" class="text-[10px] bg-[#FF9500]/20 text-[#FF9500] px-2 py-0.5 rounded-full font-bold">Kustom</span>
                            </label>
                            <div class="relative">
                                <select x-model="textEffect" class="w-full p-3.5 pl-4 pr-8 rounded-xl ios-input outline-none text-[14px] appearance-none font-medium text-black">
                                    <option value="flat">🎨 Flat (Bawaan Font)</option>
                                    <option value="embossed">🪨 3D Embossed (Timbul)</option>
                                    <option value="neon">💡 Neon Glow (Menyala)</option>
                                    <option value="foil">✨ Metallic Foil (Emas/Perak)</option>
                                    <option value="chalk">🖍️ Chalk / Textural (Kapur/Kasar)</option>
                                    <option value="watercolor">🖌️ Watercolor Blend (Menyatu Air)</option>
                                    <option value="custom">✏️ Kustom</option>
                                </select>
                                <div class="absolute right-3 top-1/2 -translate-y-1/2 text-[#8E8E93] pointer-events-none"><i class="fas fa-chevron-down text-[11px]"></i></div>
                            </div>
                            <div x-show="textEffect === 'custom'" class="mt-2" x-transition>
                                <input x-model="customTextEffect" type="text" placeholder="Deskripsikan efek teks..." class="w-full p-3 rounded-xl ios-input outline-none text-[14px] border border-[#FF9500]/30 text-black">
                            </div>
                        </div>

                        <!-- Alignment Teks -->
                        <div class="col-span-1">
                            <label class="block text-[13px] font-medium text-[#8E8E93] mb-1.5 ml-1 flex justify-between">
                                <span>Rata Teks (Alignment)</span>
                                <span x-show="textAlign === 'custom'" class="text-[10px] bg-[#FF9500]/20 text-[#FF9500] px-2 py-0.5 rounded-full font-bold">Kustom</span>
                            </label>
                            <div class="relative">
                                <select x-model="textAlign" class="w-full p-3.5 pl-4 pr-8 rounded-xl ios-input outline-none text-[14px] appearance-none font-medium text-black">
                                    <option value="auto">🔀 Auto (Dinamis / Seamless)</option>
                                    <option value="left">⬅️ Rata Kiri (Left-aligned)</option>
                                    <option value="center">↔️ Rata Tengah (Center-aligned)</option>
                                    <option value="right">➡️ Rata Kanan (Right-aligned)</option>
                                    <option value="custom">✏️ Kustom</option>
                                </select>
                                <div class="absolute right-3 top-1/2 -translate-y-1/2 text-[#8E8E93] pointer-events-none"><i class="fas fa-chevron-down text-[11px]"></i></div>
                            </div>
                            <div x-show="textAlign === 'custom'" class="mt-2" x-transition>
                                <input x-model="customTextAlign" type="text" placeholder="Instruksi rata teks kustom..." class="w-full p-3 rounded-xl ios-input outline-none text-[14px] border border-[#FF9500]/30 text-black">
                            </div>
                        </div>

                        <!-- Jumlah Slide -->
                        <div class="col-span-1">
                            <label class="block text-[13px] font-medium text-[#8E8E93] mb-1.5 ml-1">Jumlah Slide (1 = Poster Mode)</label>
                            <div class="flex items-center bg-[#7676801F] rounded-xl p-1 w-full justify-between">
                                <button @click="if(numSlides > 1) numSlides--" class="w-10 h-10 rounded-lg bg-white shadow-sm flex items-center justify-center text-[#007AFF] hover:bg-gray-50 active:scale-95 transition-all">
                                    <i class="fas fa-minus text-sm"></i>
                                </button>
                                <input type="number" x-model="numSlides" min="1" class="w-16 text-center bg-transparent border-none outline-none font-bold text-[16px] text-black">
                                <button @click="numSlides++" class="w-10 h-10 rounded-lg bg-white shadow-sm flex items-center justify-center text-[#007AFF] hover:bg-gray-50 active:scale-95 transition-all">
                                    <i class="fas fa-plus text-sm"></i>
                                </button>
                            </div>
                        </div>

                        <!-- Ratio -->
                        <div>
                            <label class="block text-[13px] font-medium text-[#8E8E93] mb-1.5 ml-1 flex justify-between">
                                <span>Rasio Aspect</span>
                                <span x-show="aspectRatio === 'custom'" class="text-[10px] bg-[#FF9500]/20 text-[#FF9500] px-2 py-0.5 rounded-full font-bold">Kustom</span>
                            </label>
                            <div class="relative">
                                <select x-model="aspectRatio" class="w-full p-3.5 pl-4 pr-8 rounded-xl ios-input outline-none text-[14px] appearance-none font-medium text-black">
                                    <option value="4:5">📱 4:5 (IG Portrait)</option>
                                    <option value="3:4">🖼️ 3:4</option>
                                    <option value="1:1">🟦 1:1 (Square)</option>
                                    <option value="9:16">📲 9:16 (Reels/Story)</option>
                                    <option value="16:9">💻 16:9 (Landscape)</option>
                                    <option value="custom">✏️ Kustom</option>
                                </select>
                                <div class="absolute right-3 top-1/2 -translate-y-1/2 text-[#8E8E93] pointer-events-none"><i class="fas fa-chevron-down text-[11px]"></i></div>
                            </div>
                            <div x-show="aspectRatio === 'custom'" class="mt-2" x-transition>
                                <input x-model="customRatio" type="text" placeholder="Rasio (misal 2:1)..." class="w-full p-3 rounded-xl ios-input outline-none text-[14px] border border-[#FF9500]/30 text-black">
                            </div>
                        </div>
                        
                        <!-- Komposisi Teks vs Visual -->
                        <div class="col-span-1">
                            <label class="block text-[13px] font-medium text-[#8E8E93] mb-1.5 ml-1 flex justify-between">
                                <span>Komposisi (Teks : Visual)</span>
                                <span x-show="composition === 'custom'" class="text-[10px] bg-[#FF9500]/20 text-[#FF9500] px-2 py-0.5 rounded-full font-bold">Kustom</span>
                            </label>
                            <div class="relative">
                                <select x-model="composition" class="w-full p-3.5 pl-4 pr-8 rounded-xl ios-input outline-none text-[14px] appearance-none font-medium text-black">
                                    <option value="auto">⚖️ Auto / Seimbang (50:50)</option>
                                    <option value="text_heavy">📝 Teks Dominan (60% Teks : 40% Visual)</option>
                                    <option value="visual_heavy">🖼️ Visual Dominan (40% Teks : 60% Visual)</option>
                                    <option value="minimal_text">🎨 Minimalis Teks (30% Teks : 70% Visual)</option>
                                    <option value="custom">✏️ Kustom</option>
                                </select>
                                <div class="absolute right-3 top-1/2 -translate-y-1/2 text-[#8E8E93] pointer-events-none"><i class="fas fa-chevron-down text-[11px]"></i></div>
                            </div>
                            <div x-show="composition === 'custom'" class="mt-2" x-transition>
                                <input x-model="customComposition" type="text" placeholder="Contoh: Teks 70%, Ilustrasi 30%..." class="w-full p-3 rounded-xl ios-input outline-none text-[14px] border border-[#FF9500]/30 text-black">
                            </div>
                        </div>

                        <!-- Format Teks Body -->
                        <div class="col-span-1">
                            <label class="block text-[13px] font-medium text-[#8E8E93] mb-1.5 ml-1">Format Teks Body</label>
                            <div class="relative">
                                <select x-model="bodyTextFormat" class="w-full p-3.5 pl-4 pr-8 rounded-xl ios-input outline-none text-[14px] appearance-none font-medium text-black">
                                    <option value="bullet">📝 Dengan Point-point (List)</option>
                                    <option value="paragraph">📄 Tanpa Point-point (Paragraf)</option>
                                </select>
                                <div class="absolute right-3 top-1/2 -translate-y-1/2 text-[#8E8E93] pointer-events-none"><i class="fas fa-chevron-down text-[11px]"></i></div>
                            </div>
                        </div>

                        <!-- Palet Warna -->
                        <div class="col-span-1">
                            <label class="block text-[13px] font-medium text-[#8E8E93] mb-1.5 ml-1 flex justify-between">
                                <span>Palet Warna</span>
                                <span x-show="colorPalette === 'custom'" class="text-[10px] bg-[#FF9500]/20 text-[#FF9500] px-2 py-0.5 rounded-full font-bold">Kustom</span>
                            </label>
                            <div class="relative">
                                <select x-model="colorPalette" class="w-full p-3.5 pl-4 pr-8 rounded-xl ios-input outline-none text-[14px] appearance-none font-medium text-black">
                                    <option value="auto">🎨 Auto / Topik</option>
                                    <option value="earth">🍂 Earth Tones</option>
                                    <option value="pastel">🌸 Soft Pastel</option>
                                    <option value="monochrome">⚫ Monochrome</option>
                                    <option value="warm">☀️ Warm / Amber</option>
                                    <option value="cool">❄️ Cool / Blue</option>
                                    <option value="custom">✏️ Kustom</option>
                                </select>
                                <div class="absolute right-3 top-1/2 -translate-y-1/2 text-[#8E8E93] pointer-events-none"><i class="fas fa-chevron-down text-[11px]"></i></div>
                            </div>
                            <div x-show="colorPalette === 'custom'" class="mt-2" x-transition>
                                <input x-model="customPalette" type="text" placeholder="Warna spesifik..." class="w-full p-3 rounded-xl ios-input outline-none text-[14px] border border-[#FF9500]/30 text-black">
                            </div>
                        </div>

                        <!-- Model Karakter -->
                        <div class="col-span-1 sm:col-span-2">
                            <label class="block text-[13px] font-medium text-[#8E8E93] mb-1.5 ml-1 flex justify-between">
                                <span>Karakter (Hanya jika Konteks Membutuhkan)</span>
                                <span x-show="characterType === 'custom'" class="text-[10px] bg-[#FF9500]/20 text-[#FF9500] px-2 py-0.5 rounded-full font-bold">Kustom</span>
                            </label>
                            <div class="relative">
                                <select x-model="characterType" class="w-full p-3.5 pl-4 pr-8 rounded-xl ios-input outline-none text-[14px] appearance-none font-medium text-black">
                                    <option value="random">🎲 Auto Contextual</option>
                                    <option value="male">👨 Pria Dewasa</option>
                                    <option value="female">🧕 Wanita (Hijab)</option>
                                    <option value="couple">👫 Pasutri</option>
                                    <option value="boy">👦 Anak Laki-laki</option>
                                    <option value="girl">👧 Anak Perempuan</option>
                                    <option value="custom">✏️ Kustom (Ganti Aturan Standar)</option>
                                </select>
                                <div class="absolute right-3 top-1/2 -translate-y-1/2 text-[#8E8E93] pointer-events-none"><i class="fas fa-chevron-down text-[11px]"></i></div>
                            </div>
                            <div x-show="characterType === 'custom'" class="mt-2" x-transition>
                                <input x-model="customCharacter" type="text" placeholder="Karakteristik spesifik (Contoh: Pria berjaket kulit)..." class="w-full p-3 rounded-xl ios-input outline-none text-[14px] border border-[#FF9500]/30 text-black">
                            </div>
                        </div>

                        <!-- Footer Customization -->
                        <div class="bg-gray-50 border border-gray-100 p-4 rounded-[16px] mt-2 col-span-1 sm:col-span-2 grid grid-cols-2 gap-3">
                            <div class="col-span-2">
                                <p class="text-[12px] font-bold text-[#8E8E93] uppercase tracking-wider mb-2">Watermark Footer</p>
                            </div>
                            <div class="col-span-1">
                                <label class="block text-[11px] font-medium text-[#8E8E93] mb-1 ml-1">Logo Sosmed (Koma)</label>
                                <input x-model="socialMediaLogos" type="text" placeholder="Misal: instagram, tiktok" class="w-full p-3 rounded-xl ios-input bg-white outline-none text-[14px] font-medium border border-gray-200 text-black">
                            </div>
                            <div class="col-span-1">
                                <label class="block text-[11px] font-medium text-[#8E8E93] mb-1 ml-1">Username / Credit</label>
                                <input x-model="credit" type="text" placeholder="@username" class="w-full p-3 rounded-xl ios-input bg-white outline-none text-[14px] font-medium border border-gray-200 text-black">
                            </div>
                        </div>

                    </div>
                </div>
            </div>

            <!-- 3. ACTION & OUTPUT -->
            <div>
                <!-- Generate Button -->
                <button @click="generateCarouselPrompts()" class="w-full bg-[#007AFF] hover:bg-[#0056B3] active:bg-[#003d82] text-white font-semibold py-4 rounded-[20px] shadow-md transition-colors text-[16px] flex items-center justify-center gap-2 mb-4">
                    <i class="fas fa-magic"></i> RAKIT BLUEPRINT PROMPT
                </button>

                <!-- Output Area (Cards) -->
                <div x-show="generatedCards.length > 0" x-transition class="space-y-4">
                    <div class="flex justify-between items-center px-1">
                        <h3 class="text-[14px] font-bold text-[#8E8E93] uppercase tracking-wider">Hasil Generate (<span x-text="generatedCards.length"></span> Blok)</h3>
                        <button @click="copyAll()" class="bg-[#34C759] hover:bg-[#28a745] text-white px-4 py-2 rounded-full text-[13px] font-bold shadow-sm transition-colors flex items-center gap-1.5">
                            <i class="fas fa-copy"></i> Copy Semua
                        </button>
                    </div>

                    <!-- Iteration of Cards -->
                    <template x-for="(card, index) in generatedCards" :key="index">
                        <div class="ios-card overflow-hidden border border-gray-100 shadow-sm" x-data="{ isOpen: index === 0 }">
                            
                            <!-- Card Header -->
                            <div @click="isOpen = !isOpen" class="px-4 py-3 bg-[#F9F9FB] border-b border-gray-100 flex justify-between items-center cursor-pointer hover:bg-gray-50 transition-colors">
                                <div class="flex items-center gap-3">
                                    <div class="w-6 h-6 rounded-md bg-[#007AFF]/10 text-[#007AFF] flex items-center justify-center text-[11px] font-bold" x-text="index + 1"></div>
                                    <span class="text-[14px] font-bold text-black" x-text="card.title"></span>
                                </div>
                                <div class="flex items-center gap-3">
                                    <button @click.stop="copySingle(card.content)" class="w-8 h-8 rounded-full bg-white text-[#007AFF] shadow-sm flex items-center justify-center hover:bg-[#007AFF] hover:text-white transition-colors" title="Copy Card Ini">
                                        <i class="fas fa-copy text-[12px]"></i>
                                    </button>
                                    <i class="fas fa-chevron-right text-[12px] text-[#C7C7CC] transition-transform duration-300" :class="{'rotate-90': isOpen}"></i>
                                </div>
                            </div>
                            
                            <!-- Card Content (Textarea) -->
                            <div x-show="isOpen" x-collapse>
                                <textarea readonly x-model="card.content" class="w-full p-4 text-[13px] font-mono bg-white text-gray-800 h-64 outline-none resize-y border-none" spellcheck="false"></textarea>
                            </div>
                        </div>
                    </template>
                </div>
            </div>

        </main>
    </div>

    <script>
        function appData() {
            return {
                accordions: { input: true, settings: false },
                topic: '',
                numSlides: 7,
                artStyle: 'auto', customArtStyle: '',
                typographyChoice: 'auto', customTypography: '',
                textEffect: 'flat', customTextEffect: '',
                textAlign: 'auto', customTextAlign: '', // NEW FEATURE
                bodyTextFormat: 'bullet',
                aspectRatio: '3:4', customRatio: '',
                composition: 'auto', customComposition: '',
                colorPalette: 'auto', customPalette: '',
                characterType: 'random', customCharacter: '',
                credit: '', socialMediaLogos: 'instagram',
                feedbackMessage: '', feedbackType: 'success',
                generatedCards: [],

                typographyDNA: [
                    { name: "Friendly Rounded Handwritten", desc: "Friendly rounded handwritten lettering, soft rounded terminals, highly legible." },
                    { name: "Soft Brush Handwriting", desc: "Soft dry-brush handwritten lettering, natural paintbrush texture." },
                    { name: "Modern Editorial Serif", desc: "Elegant editorial serif typography, high contrast letterforms." },
                    { name: "Humanist Sans", desc: "Modern humanist sans-serif, clean geometric structure." },
                    { name: "Geometric Sans", desc: "Bold geometric sans-serif, strong visual impact." },
                    { name: "Rounded Sans", desc: "Rounded sans-serif lettering, friendly modern appearance." },
                    { name: "Storybook Typography", desc: "Whimsical storybook lettering, warm illustrated aesthetic." },
                    { name: "Notebook Handwriting", desc: "Natural notebook handwriting, casual pen-written lettering." },
                    { name: "Premium Calligraphy", desc: "Elegant flowing calligraphy, delicate flourishes." },
                    { name: "Modern Script", desc: "Modern handwritten script, smooth flowing connections." },
                    { name: "Vintage Sign Painting", desc: "Retro hand-painted signage lettering." },
                    { name: "Chalkboard", desc: "Hand-drawn chalk lettering, powdery texture." },
                    { name: "Pencil Sketch", desc: "Handwritten pencil lettering, light graphite texture." },
                    { name: "Ink Pen", desc: "Fine ink handwritten lettering, classic journal aesthetic." },
                    { name: "Comic Friendly", desc: "Playful comic-style lettering, rounded bold forms." },
                    { name: "Childrens Book", desc: "Cute children's book typography, friendly style." },
                    { name: "Scandinavian Minimal", desc: "Minimal Scandinavian typography, clean elegance." },
                    { name: "Japanese Lifestyle", desc: "Minimal Japanese-inspired typography, calm visual rhythm." },
                    { name: "Luxury Magazine", desc: "Luxury editorial typography, fashion aesthetic." },
                    { name: "Cozy Journal", desc: "Cozy journal handwriting, warm notes." }
                ],

                styleDefinitions: {
                    'layered_papercut': "Premium layered papercut illustration, handcrafted multi-layer paper sculpture, precision laser-cut paper.",
                    'paper_cut_diorama': "Premium 3D paper cut diorama illustration, handcrafted layered paper sculpture, high-end C4D render.",
                    'papercraft_3d': "Premium 3D papercraft illustration, handcrafted paper diorama, realistic folded paper construction.",
                    'islamic_papercraft': "Premium 3D isometric Islamic papercraft illustration, layered paper diorama, modest themes.",
                    'low_poly_3d': "Premium low poly 3D illustration, geometric polygonal artwork, stylized low poly environment.",
                    'isometric_papercraft_lowpoly': "Premium 3D isometric papercraft low poly, miniature paper diorama, C4D render.",
                    'origami_art': "Premium origami paper art illustration, handcrafted folded paper sculpture, crisp geometric folds.",
                    'vintage_storybook': "Premium vintage storybook illustration, nostalgic hand-painted artwork, ink and watercolor.",
                    'cutaway_illustration': "Premium cutaway illustration, detailed cross-section visualization, isometric perspective.",
                    'voxel_art': "Premium voxel art illustration, cubic block-based 3D world, pixel-inspired construction.",
                    'knit_crochet': "Premium 3D realistic isometric knit & crochet illustration, handcrafted knitted wool diorama.",
                    'needle_felting': "Premium 3D realistic isometric needle felting illustration, handcrafted wool sculpting diorama.",
                    'quilted_patchwork': "Premium 3D realistic isometric quilted patchwork illustration, handcrafted stitched fabric diorama.",
                    'whimsical_doodle': "Whimsical hand-drawn watercolor and ink doodle illustration, traditional analog painting.",
                    'studygram_journal': "Premium digital journaling and scrapbook illustration, modern studygram aesthetic, stationery design.",
                    'watercolor_ink': "Premium watercolor and ink illustration, traditional handcrafted painting, expressive ink contour lines.",
                    'wimmelbilderbuch': "Premium Wimmelbilderbuch illustration, highly detailed children's search-and-find artwork.",
                    'comic_studio': "Premium high-fidelity Islamic comic illustration, professional webtoon aesthetic, cel-shaded.",
                    'grunge_streetwear': "Premium grunge streetwear collage illustration, mixed media digital collage, halftone.",
                    'pixar_3d': "Premium Pixar-inspired 3D animation, cinematic movie aesthetic, physically based rendering."
                },

                showFeedback(msg, type = 'success') {
                    this.feedbackMessage = msg;
                    this.feedbackType = type;
                    setTimeout(() => { this.feedbackMessage = ''; }, 3000);
                },

                generateCarouselPrompts() {
                    if (!this.topic) {
                        this.showFeedback("Isi Topik atau Draft Naskah terlebih dahulu!", "neutral");
                        this.accordions.input = true;
                        return;
                    }
                    
                    this.generatedCards = []; 
                    let isPosterMode = parseInt(this.numSlides) === 1;

                    // 1. Style Logic
                    let styleInstruction = this.artStyle === 'custom' ? (this.customArtStyle || "Custom Style") : 
                        (this.styleDefinitions[this.artStyle] || this.styleDefinitions['layered_papercut']);

                    // 2. Typography Logic
                    let typoName = "", typoDesc = "";
                    if (this.typographyChoice === 'custom') {
                        typoName = "Custom Font"; typoDesc = this.customTypography || "Custom typography description.";
                    } else if (this.typographyChoice === 'auto') {
                        let r = this.typographyDNA[Math.floor(Math.random() * this.typographyDNA.length)];
                        typoName = r.name; typoDesc = r.desc;
                    } else {
                        let s = this.typographyDNA.find(f => f.name === this.typographyChoice);
                        typoName = s ? s.name : "Friendly Rounded Handwritten"; typoDesc = s ? s.desc : "";
                    }

                    // Font Size Logic
                    let hSize = this.headerFontSize ? (this.headerFontSize.toLowerCase().includes('pt') ? this.headerFontSize : this.headerFontSize + 'pt') : 'Auto (Large)';
                    let bSize = this.bodyFontSize ? (this.bodyFontSize.toLowerCase().includes('pt') ? this.bodyFontSize : this.bodyFontSize + 'pt') : 'Auto (Medium)';
                    let fSize = this.footerFontSize ? (this.footerFontSize.toLowerCase().includes('pt') ? this.footerFontSize : this.footerFontSize + 'pt') : 'Auto (Small)';
                    let fontSizeInstr = `Header: ${hSize}, Body: ${bSize}, Footer: ${fSize}`;

                    // 3. Text Effect Logic
                    let effectInstr = "";
                    if (this.textEffect === 'custom') {
                        effectInstr = this.customTextEffect || "Text with custom effect applied.";
                    } else if (this.textEffect === 'embossed') {
                        effectInstr = "3D embossed text effect, text appears physically raised from the surface, realistic lighting and shadows on the typography.";
                    } else if (this.textEffect === 'neon') {
                        effectInstr = "Neon glow text effect, luminous bright typography, subtle glowing light wrapping around the letters.";
                    } else if (this.textEffect === 'foil') {
                        effectInstr = "Metallic foil text effect, shiny reflective typography, catching ambient light.";
                    } else if (this.textEffect === 'chalk') {
                        effectInstr = "Textural chalk effect, rough matte lettering seamlessly blended onto the surface.";
                    } else if (this.textEffect === 'watercolor') {
                        effectInstr = "Watercolor blend text effect, typography slightly bleeding into the background like paint.";
                    } else {
                        effectInstr = "Clean 2D flat typography, perfectly flush with the surface.";
                    }

                    // 4. Alignment Logic
                    let alignInstr = "";
                    if (this.textAlign === 'custom') {
                        alignInstr = this.customTextAlign || "Custom alignment";
                    } else if (this.textAlign === 'left') {
                        alignInstr = "Strictly left-aligned text";
                    } else if (this.textAlign === 'center') {
                        alignInstr = "Strictly center-aligned text";
                    } else if (this.textAlign === 'right') {
                        alignInstr = "Strictly right-aligned text";
                    } else {
                        alignInstr = "Dynamically flowing text alignment adapting to the visual shape";
                    }

                    // 5. Other Params & Exact Ratio Calculation
                    let ratioText = this.aspectRatio === 'custom' ? (this.customRatio || "custom ratio") : 
                        (this.aspectRatio === '1:1' ? "1:1 (Square)" : 
                         this.aspectRatio === '9:16' ? "9:16 (Vertical)" : 
                         this.aspectRatio === '16:9' ? "16:9 (Landscape)" : 
                         this.aspectRatio === '3:4' ? "3:4 (Portrait)" : 
                         "4:5 (IG Portrait)");
                    
                    let exactRatio = this.aspectRatio === 'custom' ? (this.customRatio || "3:4") : this.aspectRatio;

                    let compRuleText = this.composition === 'custom' ? this.customComposition : 
                        (this.composition === 'text_heavy' ? "Text placement area occupies 60% of the canvas, visual illustrations occupy 40%." :
                         this.composition === 'visual_heavy' ? "Text placement area occupies 40% of the canvas, visual illustrations occupy 60%." :
                         this.composition === 'minimal_text' ? "Text placement area occupies 30% of the canvas, visual illustrations occupy 70%." : 
                         "Balanced 50/50 space distribution between text area and visual elements.");

                    let colorInstr = this.colorPalette === 'custom' ? this.customPalette : 
                        (this.colorPalette === 'earth' ? "Natural Earth tones" : this.colorPalette === 'pastel' ? "Soft Pastels" : this.colorPalette === 'monochrome' ? "Monochrome" : this.colorPalette === 'warm' ? "Warm/Amber" : this.colorPalette === 'cool' ? "Cool/Blue" : "Auto contextual colors");

                    let rawLogos = this.socialMediaLogos ? this.socialMediaLogos.split(',').map(l => l.trim()) : [];
                    let logoString = rawLogos.length > 0 ? rawLogos.map(l => `[minimalist monochrome vector ${l} logo icon]`).join(' ') : "";
                    let finalUsername = this.credit ? (this.credit.startsWith('@') ? this.credit : '@' + this.credit) : "@username";
                    
                    let bodyTextRule = this.bodyTextFormat === 'bullet' ? "Gunakan format point-point (bullet points)." : "Gunakan format paragraf naratif mengalir (TANPA point-point/bullet).";

                    // Character Override Rules
                    let characterRuleText = "";
                    if (this.characterType === 'custom' && this.customCharacter.trim() !== '') {
                        characterRuleText = `* KUSTOM KARAKTER USER: ${this.customCharacter}\n* (TUGAS AI: HAPUS ATURAN KARAKTER STANDAR. JIKA KARAKTER MUNCUL, WAJIB GUNAKAN DESKRIPSI KUSTOM INI SEPENUHNYA! NAMUN TETAP WAJIB FACELESS NO EYES).`;
                    } else {
                        characterRuleText = `* MC WANITA: Gamis lebar, khimar menutup dada.\n* MC PRIA: Pakaian casual/modest rapi.`;
                    }
                    
                    let contentType = isPosterMode ? "Poster Tunggal" : "Carousel";

                    let card1Content = `@createimage\n\nBertindaklah sebagai AI Content Strategist & Visual Architect. Buat Naskah ${contentType} dan Visual Guide (sebanyak ${this.numSlides} Slide) berdasarkan instruksi ketat berikut!\n\n`;
                    card1Content += `[Card 1]\n=== GLOBAL CONFIGURATION & SLIDE 1 ===\n\n`;
                    card1Content += `[GLOBAL CONFIGURATION]\n`;
                    card1Content += `- Aspect Ratio: ${ratioText}\n`;
                    card1Content += `- Canvas Composition: ${compRuleText}\n`;
                    card1Content += `- Text Alignment: ${alignInstr}\n`;
                    card1Content += `- Style Art: ${styleInstruction}\n`;
                    card1Content += `- Color Palette: ${colorInstr}\n`;
                    card1Content += `- Typography: ${typoName} (${typoDesc})\n`;
                    card1Content += `- Font Sizes: ${fontSizeInstr}\n`;
                    card1Content += `- Typography Effect: ${effectInstr}\n`;
                    card1Content += `- Characters Rules:\n${characterRuleText}\n`;
                    card1Content += `- General Visual Constraints: STRICT ANICONISM. All humans/figures MUST BE FACELESS WITH NO EYES. STRICTLY NO SPLIT-SCREEN OR COLLAGE. NO ARABIC TEXT at all in images.\n\n`;
                    
                    card1Content += `---------------------------------------------------\n# VERY IMPORTANT RULES FOR AI\n`;
                    card1Content += `1. DILARANG KERAS MENGGUNAKAN KATA "FEYNMAN" di dalam slide/caption.\n`;
                    card1Content += `2. DILARANG KERAS MEMBUAT GRID/KOLASE. Setiap instruksi gambar WAJIB menghasilkan 1 Single Standalone Canvas.\n`;
                    card1Content += `3. ADAPTASI INPUT USER: Jika user memasukkan draft naskah utuh, JANGAN MERANGKUM/MENGARANG! Gunakan teks dari user tersebut persis.\n`;
                    card1Content += `4. FLEKSIBILITAS KARAKTER (PENTING): Karakter manusia BOLEH dimunculkan JIKA KONTEKS naskah sedang membicarakan subjek/emosi/interaksi. Namun, jika naskah murni konsep abstrak, JANGAN paksakan ada karakter, gunakan BENDA METAFORA visual sebagai fokus utama.\n`;
                    card1Content += `---------------------------------------------------\n\n`;

                    card1Content += `[SPECS]\n`;
                    card1Content += `- Aspect Ratio: ${ratioText}\n`;
                    card1Content += `- Font Sizes: ${fontSizeInstr}\n`;
                    card1Content += `- Typography Effect: ${effectInstr}\n`;
                    card1Content += `- Placement & Alignment: ${alignInstr} seamlessly into negative space.\n`;
                    card1Content += `- Footer: ${logoString} ${finalUsername} ${isPosterMode ? '' : '| 1/' + this.numSlides}\n\n`;
                    
                    card1Content += `[VISUAL GUIDE]\n`;
                    card1Content += `- Composition: High-impact central focus serving as a powerful visual hook respecting ${compRuleText}.\n`;
                    card1Content += `- Storytelling: [TUGAS AI: Buat deskripsi visual/objek menarik berdasarkan topik: "${this.topic}"]\n\n`;

                    card1Content += `[GEN_AI PROMPT]\n`;
                    card1Content += `[TUGAS AI: Tulis prompt DALL-E 8K. WAJIB AWALI DENGAN: "Single standalone image, strictly NO grid, NO collage layout." KEMUDIAN sertakan: "Seamless environmental negative space for text matching the design flow. The typography must be dynamically placed and seamlessly integrated into the environment (NO solid white boxes or rigid borders), respecting the ${compRuleText} proportion and ${alignInstr} format." Pastikan efek teks "${effectInstr}" diterapkan.]\n\n`;

                    card1Content += `[NASKAH]\n`;
                    card1Content += `- HEADER: ...\n- SUB HEADER: ...\n- FOOTER: ${logoString} ${finalUsername} ${isPosterMode ? '' : '| 1/' + this.numSlides}\n\n`;
                    
                    // Added Dynamic Ratio Suffix for Card 1
                    card1Content += `Make the aspect ratio ${exactRatio}`;

                    this.generatedCards.push({ title: "Card 1 (Master Config & Cover)", content: card1Content });

                    if (!isPosterMode) {
                        for (let i = 2; i <= this.numSlides; i++) {
                            let cardContent = `@createimage\n\n[Card ${i}]\n=== SLIDE ${i} ===\n`;
                            cardContent += `[SPECS]\n`;
                            cardContent += `- Aspect Ratio: ${ratioText}\n`;
                            cardContent += `- Typography Effect: ${effectInstr}\n`;
                            cardContent += `- Placement & Alignment: ${alignInstr} seamlessly into negative space.\n`;
                            cardContent += `- Visual Constraint: STANDALONE CANVAS. FACELESS. NO ARABIC TEXT.\n`;
                            cardContent += `- Footer: ${logoString} ${finalUsername} | ${i}/${this.numSlides}\n\n`;
                            
                            cardContent += `[VISUAL GUIDE]\n`;
                            cardContent += `- Composition: Text and visual aligned respectfully based on ${compRuleText}.\n`;
                            cardContent += `- Characters/Metaphor: [TUGAS AI: Tentukan secara cerdas! Jika slide menceritakan emosi/interaksi, munculkan karakter sesuai aturan kustom/standar. Jika slide abstrak konseptual, HILANGKAN karakter dan ganti dengan benda metafora visual.]\n`;
                            cardContent += `- Storytelling: [TUGAS AI: Buat deskripsi selaras dengan naskah.]\n\n`;

                            cardContent += `[GEN_AI PROMPT]\n`;
                            cardContent += `[TUGAS AI: Tulis prompt DALL-E 8K. WAJIB AWALI DENGAN: "Single standalone image, strictly NO grid, NO collage layout." KEMUDIAN SERTAKAN: 1) Angle Kamera Spesifik yang BERBEDA dari slide sebelumnya (contoh: close up, high angle). 2) "Seamless environmental negative space for text. Typography seamlessly and dynamically integrated into the background (NO white boxes), respecting ${alignInstr} format." Pastikan efek teks bekerja.]\n\n`;

                            let bodyTemplate = this.bodyTextFormat === 'bullet' ? "  * ...\n  * ..." : "  [Tuliskan paragraf pendek naratif di sini tanpa bullet point...]";

                            cardContent += `[NASKAH]\n`;
                            cardContent += `- HEADER: ...\n- BODY:\n${bodyTemplate}\n- FOOTER: ${logoString} ${finalUsername} | ${i}/${this.numSlides}\n\n`;

                            // Added Dynamic Ratio Suffix for subsequent cards
                            cardContent += `Make the aspect ratio ${exactRatio}`;

                            this.generatedCards.push({ title: `Card ${i} (Slide ${i})`, content: cardContent });
                        }
                    }

                    let captionContent = `[Card ${isPosterMode ? 2 : parseInt(this.numSlides) + 1}]\n=== CAPTION ===\n[TUGAS AI: Buat copywriting caption yang engaging, merangkum isi ${isPosterMode ? 'poster' : 'slide'}, diakhiri CTA dan Hashtag.]`;
                    this.generatedCards.push({ title: "Card (Caption)", content: captionContent });

                    this.accordions.input = false;
                    this.accordions.settings = false;
                    this.showFeedback("Blueprint Prompt Berhasil Dirakit!", "success");
                },

                copySingle(text) {
                    const textarea = document.createElement('textarea');
                    textarea.value = text;
                    document.body.appendChild(textarea);
                    textarea.select();
                    document.execCommand('copy');
                    document.body.removeChild(textarea);
                    this.showFeedback("Kartu disalin ke clipboard!", "success");
                },

                copyAll() {
                    if (this.generatedCards.length === 0) return;
                    let fullText = this.generatedCards.map(c => c.content).join('\n\n\n');
                    const textarea = document.createElement('textarea');
                    textarea.value = fullText;
                    document.body.appendChild(textarea);
                    textarea.select();
                    document.execCommand('copy');
                    document.body.removeChild(textarea);
                    this.showFeedback("Semua kartu disalin! Siap di-paste ke ChatGPT.", "success");
                }
            }
        }
    </script>
</body>
</html>
