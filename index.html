<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>IMACAROUSEL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/alpinejs/3.13.5/cdn.min.js" defer></script>
    <style>
        /* Native iOS Font Stack */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #F2F2F7;
            /* iOS System Grouped Background */
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            overscroll-behavior-y: none;
        }

        /* iOS Style Scrollbar (Minimalist) */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #C6C6C8;
            border-radius: 10px;
        }

        /* Hide arrows on number input */
        .hide-arrows::-webkit-inner-spin-button, .hide-arrows::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .hide-arrows {
            -moz-appearance: textfield;
        }

        /* Smooth Accordion */
        .accordion-content {
            transition: max-height 0.4s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.3s ease;
        }

        /* iOS Inputs */
        .ios-input {
            background-color: rgba(118, 118, 128, 0.12);
            transition: background-color 0.2s ease;
        }

        .ios-input:focus {
            background-color: #FFFFFF;
            box-shadow: 0 0 0 2px #007AFF;
        }
    </style>
</head>
<body class="text-[#1C1C1E]">
    <div x-data="appData()" x-init="init()" class="w-full max-w-3xl mx-auto min-h-screen flex flex-col relative pb-12">
        <header class="pt-14 pb-4 px-5 sm:px-6 z-10 sticky top-0 bg-[#F2F2F7]/90 backdrop-blur-md">
            <h1 class="text-[34px] font-bold tracking-tight text-black leading-tight">IMACAROUSEL</h1>
            <p class="text-[13px] text-[#8E8E93] font-medium tracking-wide uppercase mt-0.5">Sharia Carousel Prompt Builder</p>
        </header>

        <!-- Global Toast Notification -->
        <div x-show="feedbackMessage" x-transition:enter="transition ease-out duration-300" x-transition:enter-start="opacity-0 translate-y-[-20px]" x-transition:enter-end="opacity-100 translate-y-0" x-transition:leave="transition ease-in duration-200" x-transition:leave-start="opacity-100" x-transition:leave-end="opacity-0" class="fixed top-14 left-1/2 -translate-x-1/2 z-50 pointer-events-none w-[90%] sm:w-auto text-center drop-shadow-xl">
            <div class="inline-flex px-5 py-3 rounded-full text-[14px] font-semibold items-center gap-2" :class="feedbackType === 'success' ? 'bg-[#34C759] text-white' : 'bg-[#1C1C1E] text-white'">
                <i class="fas" :class="feedbackType === 'success' ? 'fa-check' : 'fa-info-circle'"></i>
                <span x-text="feedbackMessage"></span>
            </div>
        </div>

        <main class="flex-1 px-4 sm:px-6 space-y-6 mt-2 z-0">
            <!-- TOPIK & NASKAH -->
            <div class="bg-white rounded-[20px] overflow-hidden shadow-sm">
                <button @click="toggleAccordion('input')" class="w-full px-5 py-4 flex items-center justify-between text-left active:bg-gray-50 transition-colors">
                    <div class="flex items-center gap-3.5">
                        <div class="w-8 h-8 rounded-lg bg-[#007AFF] text-white flex items-center justify-center text-sm">
                            <i class="fas fa-pencil-alt"></i>
                        </div>
                        <span class="text-[17px] font-semibold">Topik & Naskah</span>
                    </div>
                    <div class="flex items-center gap-2">
                        <span x-show="topic" class="text-[13px] text-[#8E8E93]">Terisi</span>
                        <i class="fas fa-chevron-right text-[#C6C6C8] text-[15px] transition-transform duration-300" :class="{'rotate-90': accordions.input}"></i>
                    </div>
                </button>
                <div x-show="accordions.input" x-collapse class="px-5 pb-5 pt-1 border-t border-gray-100 space-y-4">
                    <div>
                        <label class="block text-[13px] font-medium text-[#8E8E93] uppercase mb-2 ml-1">Draft Teks / Topik</label>
                        <div class="relative">
                            <textarea x-model="topic" placeholder="Paste full script atau tulis topik di sini..." class="w-full p-3.5 rounded-xl ios-input outline-none text-[16px] leading-relaxed h-32 resize-none"></textarea>
                            <button x-show="topic" @click="topic = ''" class="absolute top-3 right-3 w-6 h-6 rounded-full bg-[#8E8E93]/20 text-[#8E8E93] hover:bg-[#8E8E93]/40 flex items-center justify-center">
                                <i class="fas fa-times text-[10px]"></i>
                            </button>
                        </div>
                    </div>
                    <div>
                        <label class="block text-[13px] font-medium text-[#8E8E93] uppercase mb-2 ml-1">Instruksi Tambahan (Opsional)</label>
                        <div class="relative">
                            <textarea x-model="additionalInstructions" placeholder="Contoh: Nuansa lebih emosional..." class="w-full p-3.5 rounded-xl ios-input outline-none text-[16px] leading-relaxed h-16 resize-none"></textarea>
                        </div>
                    </div>
                </div>
            </div>

            <!-- PENGATURAN VISUAL -->
            <div class="bg-white rounded-[20px] overflow-hidden shadow-sm">
                <button @click="toggleAccordion('settings')" class="w-full px-5 py-4 flex items-center justify-between text-left active:bg-gray-50 transition-colors">
                    <div class="flex items-center gap-3.5">
                        <div class="w-8 h-8 rounded-lg bg-[#5856D6] text-white flex items-center justify-center text-sm">
                            <i class="fas fa-sliders-h"></i>
                        </div>
                        <span class="text-[17px] font-semibold">Pengaturan Visual</span>
                    </div>
                    <div class="flex items-center gap-2">
                        <i class="fas fa-chevron-right text-[#C6C6C8] text-[15px] transition-transform duration-300" :class="{'rotate-90': accordions.settings}"></i>
                    </div>
                </button>
                <div x-show="accordions.settings" x-collapse class="px-5 pb-5 pt-1 border-t border-gray-100 space-y-5">
                    <!-- Quick Actions -->
                    <div class="flex gap-3 pt-1">
                        <button @click="autoDetectOptions()" class="flex-1 bg-[#F2F2F7] hover:bg-[#E5E5EA] text-[#007AFF] py-2.5 rounded-xl text-[15px] font-semibold transition-colors flex items-center justify-center gap-2">
                            <i class="fas fa-wand-magic-sparkles"></i>
                            Auto-Set
                        </button>
                        <button @click="resetOptions()" class="flex-1 bg-[#F2F2F7] hover:bg-[#E5E5EA] text-[#FF3B30] py-2.5 rounded-xl text-[15px] font-semibold transition-colors flex items-center justify-center gap-2">
                            <i class="fas fa-arrow-rotate-left"></i>
                            Reset
                        </button>
                    </div>
                    <!-- Slide Stepper iOS Style -->
                    <div class="flex items-center justify-between py-1 border-b border-gray-100 pb-4">
                        <div>
                            <p class="text-[16px] font-medium">Jumlah Slide</p>
                            <p class="text-[13px] text-[#8E8E93]">Slide 1 akan menjadi Poster Mode</p>
                        </div>
                        <div class="flex items-center bg-[#F2F2F7] rounded-lg p-0.5">
                            <button @click="if(numSlides > 1) numSlides--" class="w-10 h-8 flex items-center justify-center text-[#007AFF] active:bg-[#E5E5EA] rounded-md transition-colors text-lg">
                                <i class="fas fa-minus"></i>
                            </button>
                            <div class="w-px h-5 bg-[#C6C6C8]"></div>
                            <input type="number" x-model.number="numSlides" min="1" class="w-12 text-center bg-transparent font-semibold text-[17px] hide-arrows outline-none">
                            <div class="w-px h-5 bg-[#C6C6C8]"></div>
                            <button @click="numSlides++" class="w-10 h-8 flex items-center justify-center text-[#007AFF] active:bg-[#E5E5EA] rounded-md transition-colors text-lg">
                                <i class="fas fa-plus"></i>
                            </button>
                        </div>
                    </div>
                    <!-- Settings Grid -->
                    <div class="space-y-4">
                        <!-- Art Style -->
                        <div>
                            <label class="block text-[13px] font-medium text-[#8E8E93] mb-1.5 ml-1 flex justify-between">
                                <span>Gaya Seni (Art Style)</span>
                                <span x-show="artStyle === 'custom'" class="text-[#FF9500]">Kustom</span>
                            </label>
                            <div class="relative">
                                <select x-model="artStyle" class="w-full p-3.5 pl-4 pr-10 rounded-xl ios-input outline-none text-[16px] appearance-none font-medium text-black">
                                    <option value="auto">✨ Auto (Layered Papercut)</option>
                                    <option value="custom">✏️ Kustom (Ketik Manual)</option>
                                    <option value="layered_papercut">✂️ 1. Layered Papercut</option>
                                    <option value="paper_cut_diorama">🎭 2. 3D Paper Cut Diorama</option>
                                    <option value="papercraft_3d">📦 3. 3D Papercraft</option>
                                    <option value="islamic_papercraft">🕌 4. Islamic 3D Papercraft</option>
                                    <option value="low_poly_3d">💎 5. Low Poly 3D</option>
                                    <option value="isometric_papercraft_lowpoly">📐 6. 3D Isometric Low Poly</option>
                                    <option value="origami_art">🦢 7. Origami Art</option>
                                    <option value="vintage_storybook">📖 8. Vintage Storybook</option>
                                    <option value="cutaway_illustration">🏗️ 9. Cutaway Illustration</option>
                                    <option value="voxel_art">🧱 10. Voxel Art</option>
                                    <option value="knit_crochet">🧶 11. Premium Knit & Crochet</option>
                                    <option value="needle_felting">🪡 12. Premium Needle Felting</option>
                                    <option value="quilted_patchwork">🧵 13. Quilted Patchwork</option>
                                    <option value="whimsical_doodle">✒️ 14. Whimsical Doodle</option>
                                    <option value="studygram_journal">📓 15. Studygram Journaling</option>
                                    <option value="watercolor_ink">🎨 16. Watercolor & Ink</option>
                                    <option value="wimmelbilderbuch">🏘️ 17. Wimmelbilderbuch</option>
                                    <option value="comic_studio">🗯️ 18. Islamic Comic Studio</option>
                                    <option value="grunge_streetwear">🛹 19. Grunge Streetwear</option>
                                    <option value="pixar_3d">🎬 20. Pixar Inspired 3D</option>
                                </select>
                                <div class="absolute right-4 top-1/2 -translate-y-1/2 text-[#8E8E93] pointer-events-none">
                                    <i class="fas fa-chevron-down text-sm"></i>
                                </div>
                            </div>
                            <div x-show="artStyle === 'custom'" class="mt-2" x-transition>
                                <textarea x-model="customArtStyle" rows="3" placeholder="Ketik art style..." class="w-full p-3.5 rounded-xl ios-input outline-none text-[15px] resize-none border border-[#FF9500]/30"></textarea>
                            </div>
                        </div>
                        <!-- Typography -->
                        <div>
                            <label class="block text-[13px] font-medium text-[#8E8E93] mb-1.5 ml-1 flex justify-between">
                                <span>Tipografi (Font DNA)</span>
                                <span x-show="typographyChoice === 'custom'" class="text-[#FF9500]">Kustom</span>
                            </label>
                            <div class="relative">
                                <select x-model="typographyChoice" class="w-full p-3.5 pl-4 pr-10 rounded-xl ios-input outline-none text-[16px] appearance-none font-medium text-black">
                                    <option value="auto">✨ Auto / Pilih Acak</option>
                                    <option value="custom">✏️ Kustom (Ketik Manual)</option>
                                    <template x-for="(font, index) in typographyDNA" :key="index">
                                        <option :value="index" x-text="`${index + 1}. ${font.name}`"></option>
                                    </template>
                                </select>
                                <div class="absolute right-4 top-1/2 -translate-y-1/2 text-[#8E8E93] pointer-events-none">
                                    <i class="fas fa-chevron-down text-sm"></i>
                                </div>
                            </div>
                            <div x-show="typographyChoice === 'custom'" class="mt-2" x-transition>
                                <textarea x-model="customTypography" rows="2" placeholder="Contoh: Bold uppercase serif..." class="w-full p-3.5 rounded-xl ios-input outline-none text-[15px] resize-none border border-[#FF9500]/30"></textarea>
                            </div>
                        </div>
                        <!-- 2-Col Grid for minor settings -->
                        <div class="grid grid-cols-2 gap-3">
                            <!-- Character -->
                            <div>
                                <label class="block text-[13px] font-medium text-[#8E8E93] mb-1.5 ml-1">Karakter</label>
                                <div class="relative">
                                    <select x-model="characterType" class="w-full p-3.5 pl-4 pr-8 rounded-xl ios-input outline-none text-[15px] appearance-none font-medium">
                                        <option value="random">🎲 Kontekstual</option>
                                        <option value="male">👨 Pria</option>
                                        <option value="female">🧕 Wanita</option>
                                        <option value="couple">👫 Pasutri</option>
                                        <option value="boy">👦 Anak L</option>
                                        <option value="girl">👧 Anak P</option>
                                        <option value="custom">✏️ Kustom</option>
                                    </select>
                                    <div class="absolute right-3 top-1/2 -translate-y-1/2 text-[#8E8E93] pointer-events-none">
                                        <i class="fas fa-chevron-down text-[11px]"></i>
                                    </div>
                                </div>
                                <div x-show="characterType === 'custom'" class="mt-2" x-transition>
                                    <input x-model="customCharacter" type="text" placeholder="Detail..." class="w-full p-3 rounded-xl ios-input outline-none text-[14px] border border-[#FF9500]/30">
                                </div>
                            </div>
                            <!-- Palette -->
                            <div>
                                <label class="block text-[13px] font-medium text-[#8E8E93] mb-1.5 ml-1">Warna</label>
                                <div class="relative">
                                    <select x-model="colorPalette" class="w-full p-3.5 pl-4 pr-8 rounded-xl ios-input outline-none text-[15px] appearance-none font-medium">
                                        <option value="auto">🎨 Auto</option>
                                        <option value="earth">🍂 Earth</option>
                                        <option value="pastel">🌸 Pastel</option>
                                        <option value="monochrome">⚫ Mono</option>
                                        <option value="warm">☀️ Warm</option>
                                        <option value="cool">❄️ Cool</option>
                                        <option value="custom">✏️ Kustom</option>
                                    </select>
                                    <div class="absolute right-3 top-1/2 -translate-y-1/2 text-[#8E8E93] pointer-events-none">
                                        <i class="fas fa-chevron-down text-[11px]"></i>
                                    </div>
                                </div>
                                <div x-show="colorPalette === 'custom'" class="mt-2" x-transition>
                                    <input x-model="customPalette" type="text" placeholder="Warna..." class="w-full p-3 rounded-xl ios-input outline-none text-[14px] border border-[#FF9500]/30">
                                </div>
                            </div>
                            <!-- Structure -->
                            <div>
                                <label class="block text-[13px] font-medium text-[#8E8E93] mb-1.5 ml-1">Layout</label>
                                <div class="relative">
                                    <select x-model="structure" class="w-full p-3.5 pl-4 pr-8 rounded-xl ios-input outline-none text-[15px] appearance-none font-medium">
                                        <option value="auto">🤖 Auto</option>
                                        <option value="staircase">🪜 Tahapan</option>
                                        <option value="flowchart">➡️ Proses</option>
                                        <option value="mindmap">🧠 Kategori</option>
                                        <option value="grid">🔲 List</option>
                                        <option value="comparison">⚖️ Vs</option>
                                        <option value="vocabulary">📖 Kata</option>
                                        <option value="custom">✏️ Kustom</option>
                                    </select>
                                    <div class="absolute right-3 top-1/2 -translate-y-1/2 text-[#8E8E93] pointer-events-none">
                                        <i class="fas fa-chevron-down text-[11px]"></i>
                                    </div>
                                </div>
                                <div x-show="structure === 'custom'" class="mt-2" x-transition>
                                    <input x-model="customStructure" type="text" placeholder="Layout..." class="w-full p-3 rounded-xl ios-input outline-none text-[14px] border border-[#FF9500]/30">
                                </div>
                            </div>
                            <!-- Ratio -->
                            <div>
                                <label class="block text-[13px] font-medium text-[#8E8E93] mb-1.5 ml-1">Rasio</label>
                                <div class="relative">
                                    <select x-model="aspectRatio" class="w-full p-3.5 pl-4 pr-8 rounded-xl ios-input outline-none text-[15px] appearance-none font-medium">
                                        <option value="4:5">📱 4:5 (IG)</option>
                                        <option value="3:4">🖼️ 3:4</option>
                                        <option value="1:1">🟦 1:1</option>
                                        <option value="9:16">📲 9:16</option>
                                        <option value="16:9">💻 16:9</option>
                                        <option value="custom">✏️ Kustom</option>
                                    </select>
                                    <div class="absolute right-3 top-1/2 -translate-y-1/2 text-[#8E8E93] pointer-events-none">
                                        <i class="fas fa-chevron-down text-[11px]"></i>
                                    </div>
                                </div>
                                <div x-show="aspectRatio === 'custom'" class="mt-2" x-transition>
                                    <input x-model="customRatio" type="text" placeholder="Rasio..." class="w-full p-3 rounded-xl ios-input outline-none text-[14px] border border-[#FF9500]/30">
                                </div>
                            </div>
                        </div>
                        <!-- Footer Customization -->
                        <div class="bg-[#F2F2F7] p-4 rounded-[16px] mt-2">
                            <label class="block text-[14px] font-semibold mb-3">Footer Watermark</label>
                            <div class="grid grid-cols-2 gap-3">
                                <div>
                                    <p class="text-[12px] text-[#8E8E93] mb-1">Logo Sosmed (Koma)</p>
                                    <input x-model="socialMediaLogos" type="text" placeholder="instagram, threads" class="w-full p-2.5 rounded-lg bg-white border border-gray-200 text-[14px] outline-none focus:border-[#007AFF]">
                                </div>
                                <div>
                                    <p class="text-[12px] text-[#8E8E93] mb-1">Username / Akun</p>
                                    <input x-model="credit" type="text" placeholder="@username" class="w-full p-2.5 rounded-lg bg-white border border-gray-200 text-[14px] outline-none focus:border-[#007AFF]">
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- RAKIT BLUEPRINT -->
            <div class="bg-white rounded-[20px] overflow-hidden shadow-sm" :class="generatedCards.length > 0 ? 'ring-2 ring-[#34C759]' : ''">
                <!-- Trigger Generate Button (iOS Prominent Style) -->
                <div class="p-5">
                    <button @click="generateCarouselPrompts()" class="w-full bg-[#007AFF] active:bg-[#005bb5] text-white font-semibold py-4 rounded-[14px] transition-colors flex items-center justify-center gap-2 text-[17px]">
                        <i class="fas fa-magic"></i>
                        RAKIT BLUEPRINT
                    </button>
                </div>
                <div x-show="generatedCards.length > 0" x-transition class="px-5 pb-5 border-t border-gray-100 pt-5 space-y-4">
                    <div class="flex justify-between items-center px-1">
                        <span class="text-[14px] font-semibold text-[#8E8E93]" x-text="`Total: ${generatedCards.length} Kartu`"></span>
                        <div class="flex gap-2">
                            <button @click="savePrompt()" class="bg-[#F2F2F7] hover:bg-[#E5E5EA] text-[#007AFF] px-4 py-2 rounded-full text-[14px] font-semibold transition-colors flex items-center gap-1.5">
                                <i class="fas fa-bookmark"></i>
                                Simpan
                            </button>
                            <button @click="copyAllCards()" class="bg-[#34C759] active:bg-[#28a745] text-white px-4 py-2 rounded-full text-[14px] font-semibold transition-colors flex items-center gap-1.5">
                                <i class="fas fa-copy"></i>
                                Copy All
                            </button>
                        </div>
                    </div>
                    <!-- Array of Cards (Accordion within Output) -->
                    <div class="space-y-3">
                        <template x-for="(card, index) in generatedCards" :key="index">
                            <div class="bg-[#F2F2F7] rounded-[14px] overflow-hidden" x-data="{ isExpanded: index === 0 }">
                                <!-- Sub-Card Header -->
                                <div @click="isExpanded = !isExpanded" class="px-4 py-3.5 flex justify-between items-center cursor-pointer active:bg-[#E5E5EA] transition-colors">
                                    <h4 class="text-[15px] font-semibold text-black flex items-center gap-2">
                                        <i class="fas fa-file-lines text-[#007AFF]"></i>
                                        <span x-text="card.title"></span>
                                    </h4>
                                    <div class="flex items-center gap-3">
                                        <button @click.stop="copySingleCard(card.content)" class="text-[12px] bg-white text-[#007AFF] px-3 py-1.5 rounded-full font-semibold shadow-sm active:opacity-70 transition-opacity">Copy</button>
                                        <i class="fas fa-chevron-right text-[#C6C6C8] text-[13px] transition-transform duration-300" :class="{'rotate-90': isExpanded}"></i>
                                    </div>
                                </div>
                                <!-- Sub-Card Textarea -->
                                <div x-show="isExpanded" x-collapse>
                                    <textarea readonly x-model="card.content" class="w-full h-56 p-4 text-[13px] font-mono bg-[#1C1C1E] text-[#34C759] outline-none resize-y border-t border-gray-300" spellcheck="false"></textarea>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>
            </div>

            <!-- RIWAYAT DISIMPAN -->
            <div class="bg-white rounded-[20px] overflow-hidden shadow-sm mb-12">
                <button @click="toggleAccordion('saved')" class="w-full px-5 py-4 flex items-center justify-between text-left active:bg-gray-50 transition-colors">
                    <div class="flex items-center gap-3.5">
                        <div class="w-8 h-8 rounded-lg bg-[#FF9500] text-white flex items-center justify-center text-sm">
                            <i class="fas fa-bookmark"></i>
                        </div>
                        <span class="text-[17px] font-semibold">Riwayat Disimpan</span>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="text-[13px] text-[#8E8E93] bg-[#F2F2F7] px-2 py-0.5 rounded-md font-medium" x-text="savedPrompts.length"></span>
                        <i class="fas fa-chevron-right text-[#C6C6C8] text-[15px] transition-transform duration-300" :class="{'rotate-90': accordions.saved}"></i>
                    </div>
                </button>
                <div x-show="accordions.saved" x-collapse class="px-5 pb-5 pt-1 border-t border-gray-100">
                    <div x-show="savedPrompts.length === 0" class="text-center py-6 text-[#8E8E93]">
                        <p class="text-[14px]">Belum ada riwayat.</p>
                    </div>
                    <div x-show="savedPrompts.length > 0" class="space-y-3 max-h-[300px] overflow-y-auto mt-2">
                        <template x-for="(item, index) in savedPrompts" :key="item.id">
                            <div class="p-4 bg-[#F2F2F7] rounded-[14px] flex flex-col gap-2">
                                <div class="flex justify-between items-start">

                    card1Content += `[TUGAS AI: Tulis prompt DALL-E bahasa Inggris 8K. WAJIB AWALI DENGAN KATA: "Single standalone image, strictly NO grid, NO collage layout." KEMUDIAN sertakan: "Seamless integrated negative space for text placement, strictly NO solid white boxes or plain white borders, [Tentukan Angle Kamera Wide/Close]"]\n\n`;

                    card1Content += `[NASKAH]\n`;
                    card1Content += `- HEADER: [TUGAS AI: Buat Judul Hook Copywriting di sini (Gunakan teks draft user jika ada, atau buat baru jika input hanya topik)]\n`;
                    card1Content += `- SUB HEADER: Tanpa Sub Header\n`;
                    card1Content += `- FOOTER: ${footerString}${footerSuffix}\n\n`;
                    card1Content += `Make the aspect ratio ${ratioText}\n\n`;

                    card1Content += `---------------------------------------------------\n`;
                    card1Content += `# VERY IMPORTANT RULES ${!isPosterMode ? `FOR SLIDE 2 TO ${this.numSlides}` : ''}\n`;
                    card1Content += `1. JANGAN PERNAH MENYEBUT KATA "FEYNMAN" ATAU "FEYNMAN TECHNIQUE" DI NASKAH, GAMBAR, ATAUPUN CAPTION.\n`;
                    card1Content += `2. DILARANG MENGGUNAKAN TEKS ARAB DI GAMBAR KARENA AI SERING TYPO. GUNAKAN TERJEMAHAN INDONESIA UNTUK DALIL DI TEKS NASKAH. JIKA SANGAT TERPAKSA ADA TEKS ARAB, WAJIB ARAB GUNDUL TANPA HARAKAT.\n`;
                    card1Content += `3. WAJIB DINAMIS: Ubah Angle Kamera (Close up, Wide, High angle, Isometric, dll) di setiap slide agar tidak monoton!\n`;
                    card1Content += `4. ADAPTASI INPUT USER: Jika input berupa draft paragraf lengkap, HANYA pecah menjadi slide dan letakkan di area NASKAH. JANGAN MERANGKUM teks draft tersebut. Jika input hanya topik pendek, barulah kembangkan menjadi konten utuh.\n`;
                    card1Content += `5. SEAMLESS BACKGROUND: Wajib instruksikan DALL-E agar background menyatu dengan teks (Seamless negative space). Dilarang keras menggunakan kotak putih polos (solid white boxes) untuk area teks.\n`;
                    card1Content += `6. KARAKTER FLEKSIBEL & METAFORA VISUAL: Karakter manusia BOLEH dimunculkan JIKA KONTEKS narasi slide tersebut menceritakan interaksi atau perasaan. Namun jika narasi slide murni membahas konsep abstrak (seperti waktu, fondasi, kesabaran), HILANGKAN manusia dan gantikan dengan BENDA METAFORA VISUAL (seperti jam dinding, batu fondasi, jembatan) agar variatif. Jika manusia muncul, WAJIB Faceless No Eyes dan ikuti spesifikasi karakter.\n`;
                    card1Content += `7. DILARANG KERAS MEMBUAT GRID/KOLASE: Jika kamu (AI) diminta untuk meng-generate gambar, WAJIB generate satu per satu secara terpisah. JANGAN PERNAH menggabungkan beberapa slide menjadi satu gambar kanvas (seperti komik, grid, atau kolase). 1 Slide WAJIB 1 Gambar terpisah!\n\n`;

                    card1Content += `TOPIK/DRAFT DARI USER: "${this.topic}"`;

                    this.generatedCards.push({
                        title: "Card 1 (Global Config)",
                        content: card1Content
                    });

                    for (let i = 2; i <= this.numSlides; i++) {
                        let cardContent = `[Card ${i}]\n=== SLIDE ${i} ===\n`;
                        cardContent += `[SPECS]\n`;
                        cardContent += `- Aspect Ratio: ${ratioText}\n`;
                        cardContent += `- Typography: ${typoName} (Left-aligned, consistent size)\n`;
                        cardContent += `- Visual Constraint: MANDATORY FACELESS NO EYES for all figures. STRICTLY NO ARABIC TEXT.\n`;
                        cardContent += `- Footer: ${footerString} | ${i}/${this.numSlides}\n\n`;

                        cardContent += `[VISUAL GUIDE]\n`;
                        cardContent += `- Composition: Text aligned seamlessly on one side, visual focus on the other.\n`;
                        cardContent += `- Characters/Metaphor: [TUGAS AI: Tentukan secara cerdas apakah karakter perlu muncul berdasarkan KONTEKS narasi slide ini. Jika muncul, tulis interaksinya (wajib faceless). Jika slide abstrak/konseptual, ganti dengan BENDA METAFORA VISUAL (tanpa karakter).]\n`;
                        cardContent += `- Storytelling: [TUGAS AI: Buat deskripsi visual yang selaras dengan naskah.]\n\n`;

                        cardContent += `[GEN_AI PROMPT]\n`;
                        cardContent += `[TUGAS AI: Tulis prompt DALL-E 8K. WAJIB AWALI DENGAN KATA: "Single standalone image, strictly NO grid, NO collage layout." KEMUDIAN sertakan: 1) Angle kamera spesifik yang BERBEDA dari slide sebelumnya. 2) "Seamless environmental negative space for text, strictly NO solid white boxes". 3) Jika karakter muncul, PASTIKAN SESUAI DESKRIPSI KUSTOM/STANDAR]\n\n`;

                        cardContent += `[NASKAH]\n`;
                        cardContent += `- HEADER: [TUGAS AI: Tuliskan Sub-judul / Poin (Gunakan teks draft user jika ada)]\n`;
                        cardContent += `- DIVIDER: ---------------------------------------------------\n`;
                        cardContent += `- BODY:\n  * [TUGAS AI: Tuliskan narasi poin. Jangan merangkum teks user jika itu draft lengkap.]\n`;
                        cardContent += `- FOOTER: ${footerString} | ${i}/${this.numSlides}\n\n`;
                        cardContent += `Make the aspect ratio ${ratioText}`;

                        this.generatedCards.push({
                            title: `Card ${i} (Content Slide)`,
                            content: cardContent
                        });
                    }

                    let captionContent = `[Card ${this.numSlides + 1}]\n=== CAPTION ===\n[TUGAS AI: Tuliskan caption sosmed yang emosional dan persuasif berdasarkan isi ${contentType.toLowerCase()}. Berikan Call to Action (CTA) & Hashtag relevan. JANGAN SEBUT KATA FEYNMAN. BILA ADA DALIL, GUNAKAN BAHASA INDONESIA SAJA, BUKAN TEKS ARAB.]`;
                    this.generatedCards.push({
                        title: "Caption (Sosmed)",
                        content: captionContent
                    });

                    this.accordions.output = true;
                    this.accordions.input = false;
                    this.accordions.settings = false;
                    this.showFeedback("Blueprint Prompt Berhasil Dirakit!", "success");
                },

                copySingleCard(text) {
                    this.executeCopy(text);
                },

                copyAllCards() {
                    if (this.generatedCards.length === 0) return;
                    let fullText = this.generatedCards.map(c => c.content).join('\n\n');
                    this.executeCopy(fullText);
                },

                executeCopy(text) {
                    const textarea = document.createElement('textarea');
                    textarea.value = text;
                    document.body.appendChild(textarea);
                    textarea.select();
                    document.execCommand('copy');
                    document.body.removeChild(textarea);
                    this.showFeedback("Teks berhasil disalin ke clipboard!", "success");
                },

                savePrompt() {
                    if (this.generatedCards.length === 0) return;
                    let fullText = this.generatedCards.map(c => c.content).join('\n\n');
                    const newItem = {
                        id: Date.now(),
                        topic: this.topic || "Tanpa Topik",
                        style: this.artStyle,
                        slides: this.numSlides,
                        cards: this.generatedCards,
                        fullText: fullText,
                        date: new Date().toLocaleDateString('id-ID', {
                            day: '2-digit',
                            month: 'short',
                            hour: '2-digit',
                            minute: '2-digit'
                        })
                    };
                    this.savedPrompts.unshift(newItem);
                    localStorage.setItem('imavisual_saved_prompts', JSON.stringify(this.savedPrompts));
                    this.showFeedback("Disimpan ke Riwayat!", "success");
                },

                loadSavedPrompt(item) {
                    this.topic = item.topic;
                    this.artStyle = item.style;
                    this.numSlides = item.slides;
                    this.generatedCards = item.cards;
                    this.accordions.input = true;
                    this.accordions.output = true;
                    this.accordions.saved = false;
                    this.showFeedback("Riwayat dimuat!", "success");
                },

                deleteSavedPrompt(id) {
                    this.savedPrompts = this.savedPrompts.filter(p => p.id !== id);
                    localStorage.setItem('imavisual_saved_prompts', JSON.stringify(this.savedPrompts));
                    this.showFeedback("Riwayat dihapus.", "neutral");
                }
            }
        }
    </script>
</body>
</html>
