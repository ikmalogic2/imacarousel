<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOMUKA - Islamic Content Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .accordion-content {
            transition: max-height 0.3s ease-in-out, opacity 0.3s ease-in-out;
            max-height: 0;
            opacity: 0;
            overflow: hidden;
        }
        .accordion-content.active {
            max-height: 20000px; /* Large enough to hold content */
            opacity: 1;
        }
        /* Custom scrollbar for pre tags */
        pre::-webkit-scrollbar { height: 6px; width: 6px; }
        pre::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
        pre::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        pre::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="text-slate-800 antialiased min-h-screen flex flex-col">

    <!-- HEADER -->
    <header class="bg-white border-b border-slate-200 sticky top-0 z-50 shadow-sm">
        <div class="max-w-5xl mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-emerald-600 rounded-lg flex items-center justify-center shadow-emerald-200 shadow-lg">
                    <i class="fa-solid fa-moon text-white text-lg"></i>
                </div>
                <div>
                    <h1 class="text-xl font-bold text-slate-800 leading-tight">NOMUKA</h1>
                    <p class="text-[10px] text-slate-500 font-medium uppercase tracking-widest">Islamic Content Studio</p>
                </div>
            </div>
            <div class="flex bg-slate-100 p-1 rounded-lg border border-slate-200">
                <button id="btn-mode-a" onclick="switchMode('A')" class="px-4 py-1.5 text-xs font-bold rounded-md transition-all duration-200 text-slate-500 hover:text-slate-700">MODE A (IDEAS)</button>
                <button id="btn-mode-b" onclick="switchMode('B')" class="px-4 py-1.5 text-xs font-bold rounded-md transition-all duration-200 bg-white text-emerald-600 shadow-sm">MODE B (PROMPT)</button>
            </div>
        </div>
    </header>

    <!-- TOAST NOTIFICATION -->
    <div id="toast" class="fixed bottom-4 right-4 bg-slate-800 text-white px-4 py-3 rounded-lg shadow-xl transform transition-all duration-300 translate-y-10 opacity-0 z-50 flex items-center gap-3">
        <i class="fa-solid fa-circle-check text-emerald-400"></i>
        <span id="toast-msg" class="text-sm font-medium"></span>
    </div>

    <!-- MAIN CONTENT -->
    <main class="flex-1 max-w-5xl mx-auto w-full px-4 py-6 flex flex-col gap-4">

        <!-- KARTU 1: INPUT -->
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="px-6 py-4 bg-slate-50 border-b border-slate-200 flex justify-between items-center cursor-pointer hover:bg-slate-100 transition-colors" onclick="toggleAccordion('acc-input', 'icon-input')">
                <h2 class="text-sm font-bold text-slate-800 uppercase tracking-wider flex items-center gap-2">
                    <i class="fa-solid fa-keyboard text-emerald-600"></i> 1. KARTU INPUT
                </h2>
                <i id="icon-input" class="fa-solid fa-chevron-up text-slate-400 transition-transform duration-300 rotate-180"></i>
            </div>
            <div id="acc-input" class="accordion-content active p-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="relative group">
                        <textarea id="input-topic" rows="5" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-4 text-sm text-slate-700 focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:bg-white transition-all resize-none" placeholder="Tuangkan ide, topik, gagasan, atau paste artikel/materi Anda di sini..."></textarea>
                        <button onclick="document.getElementById('input-topic').value = ''" class="absolute top-3 right-3 w-6 h-6 rounded bg-slate-200 text-slate-500 hover:bg-red-100 hover:text-red-500 flex items-center justify-center text-xs opacity-0 group-hover:opacity-100 transition-opacity" title="Clear"><i class="fa-solid fa-xmark"></i></button>
                    </div>
                    <div class="relative group">
                        <textarea id="input-instructions" rows="5" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-4 text-sm text-slate-700 focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:bg-white transition-all resize-none" placeholder="Instruksi tambahan (Opsional). Contoh: Buat gaya bahasanya sedikit santai, target audiens bapak-bapak..."></textarea>
                        <button onclick="document.getElementById('input-instructions').value = ''" class="absolute top-3 right-3 w-6 h-6 rounded bg-slate-200 text-slate-500 hover:bg-red-100 hover:text-red-500 flex items-center justify-center text-xs opacity-0 group-hover:opacity-100 transition-opacity" title="Clear"><i class="fa-solid fa-xmark"></i></button>
                    </div>
                </div>
            </div>
        </div>

        <!-- KARTU 2: SETTING (MODE B ONLY) -->
        <div id="setting-card" class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="px-6 py-4 bg-slate-50 border-b border-slate-200 flex justify-between items-center cursor-pointer hover:bg-slate-100 transition-colors" onclick="toggleAccordion('acc-setting', 'icon-setting')">
                <h2 class="text-sm font-bold text-slate-800 uppercase tracking-wider flex items-center gap-2">
                    <i class="fa-solid fa-sliders text-emerald-600"></i> 2. KARTU SETTING
                </h2>
                <i id="icon-setting" class="fa-solid fa-chevron-up text-slate-400 transition-transform duration-300 rotate-180"></i>
            </div>
            
            <div id="acc-setting" class="accordion-content active p-6">
                <div class="flex justify-end gap-2 mb-6">
                    <button onclick="resetSettings()" class="px-4 py-2 bg-white border border-slate-200 text-slate-600 text-xs font-bold rounded-lg hover:bg-slate-50 transition-colors flex items-center gap-2">
                        <i class="fa-solid fa-rotate-left"></i> RESET
                    </button>
                    <button onclick="autoSetSettings()" class="px-4 py-2 bg-emerald-50 border border-emerald-200 text-emerald-700 text-xs font-bold rounded-lg hover:bg-emerald-100 transition-colors flex items-center gap-2 shadow-sm">
                        <i class="fa-solid fa-wand-magic-sparkles"></i> AUTO-SET AI
                    </button>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-4">
                    <!-- A. Jumlah Slide -->
                    <div>
                        <label class="block text-xs font-bold text-slate-600 mb-1">A. Jumlah Slide</label>
                        <input type="number" id="set-slide-count" min="1" max="30" value="7" class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500">
                    </div>

                    <!-- B. Gaya Seni -->
                    <div>
                        <label class="block text-xs font-bold text-slate-600 mb-1">B. Gaya Seni (Art Style)</label>
                        <div class="flex gap-2">
                            <select id="set-style" onchange="handleKustom(this)" class="flex-1 bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500">
                                <option value="Auto-Set by AI">Auto-Set by AI</option>
                                <option value="KUSTOM">KUSTOM...</option>
                            </select>
                            <input type="text" id="set-style-custom" placeholder="Ketik custom..." class="hidden flex-1 bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500">
                        </div>
                    </div>

                    <!-- C. Tipografi -->
                    <div>
                        <label class="block text-xs font-bold text-slate-600 mb-1">C. Tipografi (DNA Font)</label>
                        <div class="flex gap-2">
                            <select id="set-font" onchange="handleKustom(this)" class="flex-1 bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500">
                                <option value="Auto-Set by AI">Auto-Set by AI</option>
                                <option value="KUSTOM">KUSTOM...</option>
                            </select>
                            <input type="text" id="set-font-custom" placeholder="Ketik font..." class="hidden flex-1 bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500">
                        </div>
                    </div>

                    <!-- D. Efek Teks -->
                    <div>
                        <label class="block text-xs font-bold text-slate-600 mb-1">D. Efek Teks (Header & Body)</label>
                        <div class="flex gap-2">
                            <select id="set-texteffect" onchange="handleKustom(this)" class="flex-1 bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500">
                                <option value="Auto-Set by AI">Auto-Set by AI</option>
                                <option value="KUSTOM">KUSTOM...</option>
                                <option value="FLAT (BAWAAN FONT)">FLAT (BAWAAN FONT)</option>
                                <option value="3D EMBOSSED (TIMBUL)">3D EMBOSSED (TIMBUL)</option>
                                <option value="DEBOSSED (TENGGELAM)">DEBOSSED (TENGGELAM)</option>
                                <option value="NEON GLOW (MENYALA)">NEON GLOW (MENYALA)</option>
                                <option value="METALLIC FOIL (EMAS/ PERAK)">METALLIC FOIL (EMAS/ PERAK)</option>
                                <option value="CHALK/ TEXTURAL (KAPUR/ KASAR)">CHALK/ TEXTURAL (KAPUR/ KASAR)</option>
                                <option value="WATERCOLOR BLEND (MENYATU AIR)">WATERCOLOR BLEND (MENYATU AIR)</option>
                            </select>
                            <input type="text" id="set-texteffect-custom" placeholder="Ketik efek..." class="hidden flex-1 bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500">
                        </div>
                    </div>

                    <!-- E. Rata Teks -->
                    <div>
                        <label class="block text-xs font-bold text-slate-600 mb-1">E. Rata Teks (Alignment)</label>
                        <div class="flex gap-2">
                            <select id="set-alignment" onchange="handleKustom(this)" class="flex-1 bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500">
                                <option value="Auto-Set by AI (DINAMIS/ SEEMLESS)">Auto-Set by AI (DINAMIS/ SEEMLESS)</option>
                                <option value="KUSTOM">KUSTOM...</option>
                                <option value="RATA KIRI">RATA KIRI</option>
                                <option value="RATA TENGAH">RATA TENGAH</option>
                                <option value="RATA KANAN">RATA KANAN</option>
                            </select>
                            <input type="text" id="set-alignment-custom" placeholder="Ketik rata teks..." class="hidden flex-1 bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500">
                        </div>
                    </div>

                    <!-- F. Aspect Ratio -->
                    <div>
                        <label class="block text-xs font-bold text-slate-600 mb-1">F. Aspect Ratio</label>
                        <div class="flex gap-2">
                            <select id="set-ratio" onchange="handleKustom(this)" class="flex-1 bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500">
                                <option value="Auto-Set by AI">Auto-Set by AI</option>
                                <option value="KUSTOM">KUSTOM...</option>
                                <option value="1:1">1:1</option>
                                <option value="3:4" selected>3:4</option>
                                <option value="4:5">4:5</option>
                                <option value="9:16">9:16</option>
                                <option value="16:9">16:9</option>
                                <option value="5:4">5:4</option>
                                <option value="4:3">4:3</option>
                            </select>
                            <input type="text" id="set-ratio-custom" placeholder="Ketik rasio..." class="hidden flex-1 bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500">
                        </div>
                    </div>

                    <!-- G. Komposisi Teks & Visual -->
                    <div>
                        <label class="block text-xs font-bold text-slate-600 mb-1">G. Komposisi Teks & Visual</label>
                        <div class="flex gap-2">
                            <select id="set-composition" onchange="handleKustom(this)" class="flex-1 bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500">
                                <option value="Auto-Set by AI">Auto-Set by AI</option>
                                <option value="KUSTOM">KUSTOM...</option>
                                <option value="SEIMBANG (50:50)">SEIMBANG (50:50)</option>
                                <option value="TEKS DOMINAN (60% TEKS : 40% VISUAL)">TEKS DOMINAN (60% TEKS : 40% VISUAL)</option>
                                <option value="VISUAL DOMINAN (4O% TEKS : 60% VISUAL)">VISUAL DOMINAN (4O% TEKS : 60% VISUAL)</option>
                                <option value="MINIMALIS TEKS (30% TEKS : 70% VISUAL)">MINIMALIS TEKS (30% TEKS : 70% VISUAL)</option>
                            </select>
                            <input type="text" id="set-composition-custom" placeholder="Ketik komposisi..." class="hidden flex-1 bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500">
                        </div>
                    </div>

                    <!-- H. Format Body Text -->
                    <div>
                        <label class="block text-xs font-bold text-slate-600 mb-1">H. Format Body Text</label>
                        <div class="flex gap-2">
                            <select id="set-bodyformat" onchange="handleKustom(this)" class="flex-1 bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500">
                                <option value="Auto-Set by AI">Auto-Set by AI</option>
                                <option value="KUSTOM">KUSTOM...</option>
                                <option value="DENGAN POINT-POINT">DENGAN POINT-POINT</option>
                                <option value="TANPA POINT-POINT">TANPA POINT-POINT</option>
                            </select>
                            <input type="text" id="set-bodyformat-custom" placeholder="Ketik format..." class="hidden flex-1 bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500">
                        </div>
                    </div>

                    <!-- I. Palet Warna -->
                    <div>
                        <label class="block text-xs font-bold text-slate-600 mb-1">I. Palet Warna</label>
                        <div class="flex gap-2">
                            <select id="set-palette" onchange="handleKustom(this)" class="flex-1 bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500">
                                <option value="Auto-Set by AI">Auto-Set by AI</option>
                                <option value="KUSTOM">KUSTOM...</option>
                                <option value="EARTH TONE">EARTH TONE</option>
                                <option value="SOFT PASTEL">SOFT PASTEL</option>
                                <option value="MONOCHROME">MONOCHROME</option>
                                <option value="WARM">WARM</option>
                                <option value="COOL">COOL</option>
                            </select>
                            <input type="text" id="set-palette-custom" placeholder="Ketik palet warna..." class="hidden flex-1 bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500">
                        </div>
                    </div>

                    <!-- J. Karakter Utama -->
                    <div class="md:col-span-2">
                        <label class="block text-xs font-bold text-slate-600 mb-1">J. Karakter Utama <span class="text-slate-400 font-normal">(Opsional)</span></label>
                        <div class="flex gap-2 mb-2">
                            <select id="set-character" onchange="handleKustom(this); handleCharacterChange(this);" class="w-1/2 bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500">
                                <option value="Auto-Set by AI">Auto-Set by AI</option>
                                <option value="KUSTOM">KUSTOM...</option>
                                <option value="Pria Dewasa">Pria Dewasa</option>
                                <option value="Wanita">Wanita</option>
                                <option value="Pasutri">Pasutri</option>
                                <option value="Anak Laki-Laki">Anak Laki-Laki</option>
                                <option value="Anak Perempuan">Anak Perempuan</option>
                            </select>
                            <input type="text" id="set-character-custom" placeholder="Ketik karakter..." class="hidden w-1/2 bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500">
                        </div>
                        
                        <!-- Dynamic Character Options -->
                        <div id="character-details-container" class="hidden bg-slate-50 border border-slate-200 rounded-xl p-4 mt-2">
                             <p class="text-[10px] text-amber-600 font-bold mb-3"><i class="fa-solid fa-triangle-exclamation"></i> Aturan Faceless & No Eyes mutlak berlaku.</p>
                             <div id="dynamic-char-fields" class="grid grid-cols-1 md:grid-cols-2 gap-3">
                                 <!-- Injected via JS -->
                             </div>
                        </div>
                    </div>
                    
                    <!-- K. Bentuk Patch Footer -->
                    <div>
                        <label class="block text-xs font-bold text-slate-600 mb-1">K. Bentuk Patch Footer</label>
                        <div class="flex gap-2">
                            <select id="set-patch-footer" onchange="handleKustom(this)" class="flex-1 bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500">
                                <option value="Auto-Set by AI">Auto-Set by AI</option>
                                <option value="KUSTOM">KUSTOM...</option>
                                <option value="Pill Hollow Capsule">Pill Hollow Capsule</option>
                                <option value="Solid Rectangle Rounded">Solid Rectangle Rounded</option>
                                <option value="Glassmorphism Blur Panel">Glassmorphism Blur Panel</option>
                                <option value="Minimalist Line Separator">Minimalist Line Separator</option>
                                <option value="Tanpa Patch (Teks Only)">Tanpa Patch (Teks Only)</option>
                            </select>
                            <input type="text" id="set-patch-footer-custom" placeholder="Ketik patch footer custom..." class="hidden flex-1 bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500">
                        </div>
                    </div>

                    <!-- L. Ukuran Font (PT) -->
                    <div class="md:col-span-2">
                        <label class="block text-xs font-bold text-slate-600 mb-1">L. Ukuran Font (PT)</label>
                        <div class="grid grid-cols-3 gap-2">
                            <input type="number" id="set-pt-header" placeholder="Header PT" class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500" title="Ukuran Font Header">
                            <input type="number" id="set-pt-body" placeholder="Body PT" class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500" title="Ukuran Font Body">
                            <input type="number" id="set-pt-footer" placeholder="Footer PT" class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500" title="Ukuran Font Footer">
                        </div>
                    </div>
                    
                    <!-- M. Watermark Footer -->
                    <div class="md:col-span-2">
                        <label class="block text-xs font-bold text-slate-600 mb-1">M. Watermark Footer</label>
                        <div class="grid grid-cols-2 gap-2">
                            <input type="text" id="set-watermark-logos" placeholder="Logos (cth: Instagram, Threads)" class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500" title="Logo Sosial Media">
                            <input type="text" id="set-watermark-username" placeholder="nama akun, misal: @ikmalogic" class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500" title="Username">
                        </div>
                    </div>

                </div>
            </div>
        </div>

        <!-- GENERATE BUTTON -->
        <button onclick="generateContent()" class="w-full py-4 bg-emerald-600 hover:bg-emerald-700 text-white font-bold rounded-2xl shadow-lg shadow-emerald-200 transition-all transform active:scale-[0.99] flex items-center justify-center gap-2 text-lg">
            <i class="fa-solid fa-bolt"></i> GENERATE OUTPUT
        </button>

        <!-- KARTU 3: OUTPUT -->
        <div id="output-card" class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden hidden">
            <div class="px-6 py-4 bg-slate-50 border-b border-slate-200 flex justify-between items-center cursor-pointer hover:bg-slate-100 transition-colors" onclick="toggleAccordion('acc-output', 'icon-output')">
                <h2 class="text-sm font-bold text-slate-800 uppercase tracking-wider flex items-center gap-2">
                    <i class="fa-solid fa-terminal text-emerald-600"></i> 3. KARTU OUTPUT
                </h2>
                <div class="flex items-center gap-4">
                    <div class="flex gap-2" onclick="event.stopPropagation();">
                        <button onclick="copyAllBlocks()" class="px-3 py-1.5 bg-white border border-slate-200 text-slate-600 text-[10px] font-bold rounded hover:bg-slate-50 transition-colors flex items-center gap-1">
                            <i class="fa-regular fa-copy"></i> COPY ALL
                        </button>
                        <button onclick="saveAllBlocks()" class="px-3 py-1.5 bg-emerald-50 border border-emerald-200 text-emerald-700 text-[10px] font-bold rounded hover:bg-emerald-100 transition-colors flex items-center gap-1 shadow-sm">
                            <i class="fa-solid fa-bookmark"></i> SAVE ALL
                        </button>
                    </div>
                    <i id="icon-output" class="fa-solid fa-chevron-up text-slate-400 transition-transform duration-300 rotate-180"></i>
                </div>
            </div>
            <div id="acc-output" class="accordion-content active p-6">
                <div id="output-container" class="space-y-4">
                    <!-- Blocks injected here -->
                </div>
            </div>
        </div>

        <!-- KARTU 4: SAVED -->
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="px-6 py-4 bg-slate-50 border-b border-slate-200 flex justify-between items-center cursor-pointer hover:bg-slate-100 transition-colors" onclick="toggleAccordion('acc-saved', 'icon-saved')">
                <h2 class="text-sm font-bold text-slate-800 uppercase tracking-wider flex items-center gap-2">
                    <i class="fa-solid fa-folder-open text-emerald-600"></i> 4. KARTU SAVED
                </h2>
                <i id="icon-saved" class="fa-solid fa-chevron-up text-slate-400 transition-transform duration-300 rotate-180"></i>
            </div>
            <div id="acc-saved" class="accordion-content active p-6">
                
                <!-- Saved Mode A -->
                <h3 class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-4 border-b border-slate-100 pb-2">Saved Mode A (Ideas)</h3>
                <div id="saved-mode-a-container" class="space-y-4 mb-8">
                    <p class="text-sm text-slate-400 text-center py-4">Belum ada ide yang disimpan.</p>
                </div>

                <!-- Saved Mode B -->
                <h3 class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-4 border-b border-slate-100 pb-2">Saved Mode B (Prompts)</h3>
                <div id="saved-mode-b-container" class="space-y-4 mb-8">
                    <p class="text-sm text-slate-400 text-center py-4">Belum ada prompt yang disimpan.</p>
                </div>

                <!-- Export/Import -->
                <div class="mt-8 pt-6 border-t border-slate-200 flex flex-wrap gap-3 justify-center">
                    <button onclick="exportData()" class="px-4 py-2 bg-slate-100 text-slate-600 text-xs font-bold rounded-lg hover:bg-slate-200 transition-colors flex items-center gap-2">
                        <i class="fa-solid fa-download"></i> EXPORT JSON
                    </button>
                    <label class="cursor-pointer px-4 py-2 bg-slate-100 text-slate-600 text-xs font-bold rounded-lg hover:bg-slate-200 transition-colors flex items-center gap-2">
                        <i class="fa-solid fa-upload"></i> IMPORT JSON
                        <input type="file" id="import-file" class="hidden" accept=".json" onchange="importData(event)">
                    </label>
                    <button onclick="clearAllData()" class="px-4 py-2 bg-red-50 text-red-600 text-xs font-bold rounded-lg hover:bg-red-100 transition-colors flex items-center gap-2">
                        <i class="fa-solid fa-trash-can"></i> CLEAR ALL
                    </button>
                </div>
            </div>
        </div>

    </main>

    <!-- CORE LOGIC & JS -->
    <script>
        let currentMode = 'B';
        let generatedBlocks = [];
        let savedData = JSON.parse(localStorage.getItem('nomuka_saved')) || [];

        const styleArtsList = [
            "1. GAYA 1 / 3D Papercraft", "2. GAYA 2 / Layered Papercut", "3. GAYA 3 / Origami Paper Art",
            "4. GAYA 4 / Paper Diorama", "5. GAYA 5 / Islamic Layered Papercut", "6. GAYA 6 / Paper Quilling",
            "7. GAYA 7 / Kirigami Illustration", "8. GAYA 8 / Cut Paper Collage", "9. GAYA 9 / Cardboard Craft",
            "10. GAYA 10 / Paper Sculpture"
        ];

        const fontDNAList = [
            "FONT 1. Friendly Rounded Handwritten", "FONT 2. Soft Brush Handwriting", "FONT 3. Modern Editorial Serif",
            "FONT 4. Humanist Sans", "FONT 5. Geometric Sans", "FONT 6. Rounded Sans", "FONT 7. Storybook Typography",
            "FONT 8. Notebook Handwriting", "FONT 9. Premium Calligraphy", "FONT 10. Modern Script",
            "FONT 11. Vintage Sign Painting", "FONT 12. Chalkboard", "FONT 13. Pencil Sketch", "FONT 14. Ink Pen",
            "FONT 15. Comic Friendly", "FONT 16. Children's Book", "FONT 17. Scandinavian Minimal",
            "FONT 18. Japanese Lifestyle", "FONT 19. Luxury Magazine", "FONT 20. Cozy Journal",
            "FONT 21. Bold Condensed Display", "FONT 22. Elegant Slab Serif", "FONT 23. Minimal Monospace",
            "FONT 24. Art Deco Display", "FONT 25. Retro Groovy", "FONT 26. Pixel Retro Gaming",
            "FONT 27. Futuristic Tech Display", "FONT 28. Blackletter Gothic", "FONT 29. Elegant Art Nouveau",
            "FONT 30. Luxury Signature Script", "FONT 31. Brush Street Typography"
        ];

        window.onload = () => {
            switchMode('B');
            populateDropdowns();
            renderSavedBlocks();
        };

        function toggleAccordion(contentId, iconId) {
            const content = document.getElementById(contentId);
            const icon = document.getElementById(iconId);
            if (!content || !icon) return;
            
            if (content.classList.contains('active')) {
                content.classList.remove('active');
                icon.classList.remove('rotate-180');
            } else {
                content.classList.add('active');
                icon.classList.add('rotate-180');
            }
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            if (!toast) return;
            document.getElementById('toast-msg').textContent = message;
            toast.classList.remove('opacity-0', 'translate-y-10');
            setTimeout(() => toast.classList.add('opacity-0', 'translate-y-10'), 2500);
        }

        function createOutputBlock(id, title, content, isFirst = false) {
            const activeClass = isFirst ? 'active' : '';
            const rotateClass = isFirst ? 'rotate-180' : '';
            
            return `
            <div id="${id}" class="bg-white border border-slate-200 rounded-xl overflow-hidden shadow-sm relative group mb-4">
                <div class="bg-slate-50 border-b border-slate-200 px-4 py-3 flex justify-between items-center cursor-pointer hover:bg-slate-100 transition-colors" onclick="toggleAccordion('acc-${id}', 'icon-${id}')">
                    <span class="text-xs font-bold text-slate-700 uppercase tracking-wider flex items-center gap-2">
                        <i id="icon-${id}" class="fa-solid fa-chevron-up text-slate-400 transition-transform duration-300 ${rotateClass}"></i>
                        ${title}
                    </span>
                    <div class="flex gap-2" onclick="event.stopPropagation();">
                        <button onclick="copyText('${id}')" class="w-7 h-7 rounded bg-white border border-slate-200 text-slate-500 hover:text-emerald-600 hover:border-emerald-300 flex items-center justify-center transition-colors" title="Copy Block">
                            <i class="fa-regular fa-copy"></i>
                        </button>
                        <button onclick="saveBlock('${id}')" class="w-7 h-7 rounded bg-white border border-slate-200 text-slate-500 hover:text-amber-500 hover:border-amber-300 flex items-center justify-center transition-colors" title="Save Block">
                            <i class="fa-regular fa-bookmark"></i>
                        </button>
                    </div>
                </div>
                <div id="acc-${id}" class="accordion-content ${activeClass}">
                    <div class="p-4 overflow-x-auto bg-white">
                        <pre class="text-[11px] text-slate-700 font-mono leading-relaxed whitespace-pre-wrap break-words outline-none" id="${id}-content">${content}</pre>
                    </div>
                </div>
            </div>`;
        }

        function generateContent() {
            const topic = document.getElementById('input-topic').value.trim();
            const instructions = document.getElementById('input-instructions').value.trim();
            
            if (!topic) {
                showToast("Kolom Ide/Topik tidak boleh kosong!");
                return;
            }

            const outputContainer = document.getElementById('output-container');
            const outputCard = document.getElementById('output-card');
            if(!outputContainer || !outputCard) return;
            
            outputContainer.innerHTML = '';
            generatedBlocks = [];

            if (currentMode === 'A') {
                generateModeA(topic, instructions);
            } else {
                generateModeB(topic, instructions);
            }

            outputCard.classList.remove('hidden');
            
            const accOutput = document.getElementById('acc-output');
            const iconOutput = document.getElementById('icon-output');
            if(accOutput && !accOutput.classList.contains('active')) {
                toggleAccordion('acc-output', 'icon-output');
            }
            
            setTimeout(() => {
                outputCard.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }, 100);
            
            showToast("Berhasil Generate Content!");
        }

        function autoSetSettings() {
            const getRand = (arr) => arr[Math.floor(Math.random() * arr.length)];
            const slideCount = document.getElementById('set-slide-count');
            const ratio = document.getElementById('set-ratio');
            const charSelect = document.getElementById('set-character');
            const style = document.getElementById('set-style');
            const font = document.getElementById('set-font');
            const effect = document.getElementById('set-texteffect');
            const align = document.getElementById('set-alignment');
            const comp = document.getElementById('set-composition');
            const body = document.getElementById('set-bodyformat');
            const pal = document.getElementById('set-palette');
            const patch = document.getElementById('set-patch-footer');
            
            if(!slideCount) return;

            // Extract topic for contextual override
            const topicText = document.getElementById('input-topic').value.trim() || 'dakwah islami';

            slideCount.value = 7;
            ratio.value = "3:4";
            
            charSelect.value = "Wanita";
            handleCharacterChange(charSelect);
            
            const selectedStyle = getRand(styleArtsList);
            style.value = selectedStyle; 
            handleKustom(style); 
            
            // Smart Mapping AI
            let compatibleFonts = [];
            let compatibleEffects = [];

            const styleLower = selectedStyle.toLowerCase();
            if(styleLower.includes('islamic') || styleLower.includes('quilling') || styleLower.includes('nouveau') || styleLower.includes('calligraphy')) {
                compatibleFonts = ["FONT 3. Modern Editorial Serif", "FONT 9. Premium Calligraphy", "FONT 19. Luxury Magazine", "FONT 22. Elegant Slab Serif", "FONT 29. Elegant Art Nouveau", "FONT 30. Luxury Signature Script"];
                compatibleEffects = ["FLAT (BAWAAN FONT)", "METALLIC FOIL (EMAS/ PERAK)", "3D EMBOSSED (TIMBUL)"];
            } else if(styleLower.includes('papercraft') || styleLower.includes('diorama') || styleLower.includes('cardboard') || styleLower.includes('sculpture') || styleLower.includes('storybook')) {
                compatibleFonts = ["FONT 1. Friendly Rounded Handwritten", "FONT 7. Storybook Typography", "FONT 16. Children's Book", "FONT 20. Cozy Journal", "FONT 6. Rounded Sans"];
                compatibleEffects = ["3D EMBOSSED (TIMBUL)", "DEBOSSED (TENGGELAM)", "FLAT (BAWAAN FONT)"];
            } else if(styleLower.includes('collage') || styleLower.includes('kirigami') || styleLower.includes('origami') || styleLower.includes('minimal')) {
                compatibleFonts = ["FONT 4. Humanist Sans", "FONT 17. Scandinavian Minimal", "FONT 18. Japanese Lifestyle", "FONT 8. Notebook Handwriting", "FONT 13. Pencil Sketch"];
                compatibleEffects = ["FLAT (BAWAAN FONT)", "CHALK/ TEXTURAL (KAPUR/ KASAR)", "DEBOSSED (TENGGELAM)"];
            } else if(styleLower.includes('tech') || styleLower.includes('pixel') || styleLower.includes('monospace')) {
                compatibleFonts = ["FONT 23. Minimal Monospace", "FONT 26. Pixel Retro Gaming", "FONT 27. Futuristic Tech Display"];
                compatibleEffects = ["NEON GLOW (MENYALA)", "FLAT (BAWAAN FONT)"];
            } else {
                compatibleFonts = fontDNAList;
                compatibleEffects = ["FLAT (BAWAAN FONT)"];
            }

            font.value = getRand(compatibleFonts); handleKustom(font);
            effect.value = getRand(compatibleEffects); handleKustom(effect);
            
            // Contextual Auto-Set Overrides based on input topic
            
            // Override 1: Palet Warna
            if (Math.random() > 0.6) {
                pal.value = "KUSTOM"; handleKustom(pal);
                document.getElementById('set-palette-custom').value = `Warna estetik dan harmonis yang merepresentasikan ${topicText}`;
            } else {
                const palettes = ["EARTH TONE", "SOFT PASTEL", "WARM", "MONOCHROME", "COOL"];
                pal.value = getRand(palettes); handleKustom(pal);
            }

            // Override 2: Komposisi Teks
            const compChoices = ["SEIMBANG (50:50)", "TEKS DOMINAN (60% TEKS : 40% VISUAL)", "VISUAL DOMINAN (4O% TEKS : 60% VISUAL)"];
            if (Math.random() > 0.5) {
                comp.value = "KUSTOM"; handleKustom(comp);
                document.getElementById('set-composition-custom').value = `Komposisi proporsional menyesuaikan narasi ${topicText}`;
            } else {
                comp.value = getRand(compChoices); handleKustom(comp);
            }
            
            // Override 3: Patch Footer
            patch.value = "KUSTOM"; handleKustom(patch);
            document.getElementById('set-patch-footer-custom').value = `Desain patch minimalis menyesuaikan visual ${topicText}`;

            // Standar
            align.value = "Auto-Set by AI (DINAMIS/ SEEMLESS)"; handleKustom(align);
            body.value = "DENGAN POINT-POINT"; handleKustom(body);
            
            document.getElementById('set-pt-header').value = "64";
            document.getElementById('set-pt-body').value = "32";
            document.getElementById('set-pt-footer').value = "24";

            showToast("Auto-Set Cerdas Berhasil Diterapkan");
        }

        function generateModeA(topic, instructions) {
            const container = document.getElementById('output-container');
            for(let i=1; i<=5; i++) {
                const blockId = `mode-a-block-${i}`;
                const title = `IDE TOPIK KONTEN ${i}`;
                const content = `IDE ${i}\n* Topik: [Topik Turunan dari: ${topic}]\n* Cover Title: "Judul Hook Menarik ${i}"\n* Unique Angle: Sudut pandang yang jarang dibahas.\n* Dalil: QS. Contoh Ayat / Hadits...\n* Core Idea: Penjelasan singkat alur konten.\n* Rekomendasi Style: [AI akan memilihkan]\n* Rekomendasi Warna: [AI akan memilihkan]\n* Rekomendasi Font: [AI akan memilihkan]`;
                
                generatedBlocks.push({ id: blockId, title: title, content: content, type: 'single' });
                // Only open the first block by default
                container.innerHTML += createOutputBlock(blockId, title, content, i === 1);
            }
        }

        function generateModeB(topic, instructions) {
            const slides = parseInt(document.getElementById('set-slide-count').value) || 7;
            const style = getSettingValue('set-style');
            const font = getSettingValue('set-font');
            const effect = getSettingValue('set-texteffect');
            const alignment = getSettingValue('set-alignment');
            const ratio = getSettingValue('set-ratio');
            const composition = getSettingValue('set-composition');
            const bodyFormat = getSettingValue('set-bodyformat');
            const palette = getSettingValue('set-palette');
            const patchFooter = getSettingValue('set-patch-footer');
            
            const ptHead = document.getElementById('set-pt-header').value || 'Auto';
            const ptBody = document.getElementById('set-pt-body').value || 'Auto';
            const ptFoot = document.getElementById('set-pt-footer').value || 'Auto';
            const wtLogos = document.getElementById('set-watermark-logos').value || 'Instagram, Threads';
            const wtUser = document.getElementById('set-watermark-username').value || '@username';

            let alignStr = alignment;
            if(alignStr.toLowerCase().includes('seemless') || alignStr.toLowerCase().includes('dinamis')) {
                alignStr = "SEAMLESS & DINAMIS (BOLEH RATA KIRI/ KANAN/ ATAS/ BAWAH/ TENGAH) SESUAI KONTEKS & ESTETIKA DESAIN VISUAL. (PENTING: Teks dilarang kaku/statis. Buat mengalir dan menyatu dengan ilustrasi)";
            }

            const charDetails = getCharacterDetailsString();

            const globalConfig = `[GLOBAL CONFIGURATION]
* OPERATION MODE: MODE B
* TOPIK/ MATERI KONTEN: ${topic}
${instructions ? '* INSTRUKSI KHUSUS: ' + instructions + '\n' : ''}
* STYLE ART: ${style}
* RATIO: ${ratio}
* KOMPOSISI: ${composition}
* TYPOGRAPHY:
  * NAMA FONT: ${font}
  * EFEK FONT: ${effect}
  * UKURAN FONT (HEADER, BODY, FOOTER): ${ptHead}, ${ptBody}, ${ptFoot}
  * TEXT ALIGNMENT: ${alignStr}
* PALET WARNA: ${palette}
* LATAR/ SCENE: Dinamis spesifik mewakili edukasi tiap slide.
* KARAKTER:
${charDetails === 'Auto-Set by AI' || charDetails === '' ? '  * Dinamis sesuai konteks. (JIKA ADA KARAKTER WAJIB FACELESS & NO EYES)' : charDetails}
* BODY TEXT: ${bodyFormat}
* FOOTER:
  * BENTUK PATCH: ${patchFooter}
  * WATERMARK: [minimalist monochrome vector ${wtLogos} logo icon] ${wtUser} | {x}/${slides}`;

            const container = document.getElementById('output-container');

            // SLIDE 1
            const id1 = `mode-b-slide-1`;
            const title1 = `SLIDE 1 (COVER/ HOOK)`;
            let content1 = `@createimage\n${globalConfig}\n\n[SLIDE 1 (COVER/ HOOK)]\n* SPECS: Aspect Ratio ${ratio}, Style: ${style}\n* VISUAL GUIDE: (Deskripsikan visual hook memancing, konseptual, estetik. JANGAN buat karakter jika tidak perlu. Jika ada, WAJIB faceless no eyes)\n* GEN AI PROMPT: (Tulis prompt bahasa inggris)\n* NASKAH:\n  * HEADER: (Judul Hook Pancingan)\n  * SUB HEADER: (Opsional)\n  * BODY: (KOSONGKAN. SLIDE 1 TIDAK BOLEH ADA BODY TEXT)\n  * FOOTER: [minimalist monochrome vector ${wtLogos} logo icon] ${wtUser} | 1/${slides}\n\nMake the aspect ratio ${ratio}`;
            generatedBlocks.push({ id: id1, title: title1, content: content1, type: 'single' });
            
            // Only open Slide 1
            container.innerHTML += createOutputBlock(id1, title1, content1, true);

            // SLIDE 2 to N
            for(let i=2; i<=slides; i++) {
                const idN = `mode-b-slide-${i}`;
                const titleN = `SLIDE ${i}`;
                let contentN = `@createimage\n[SLIDE ${i}]\n* SPECS: Aspect Ratio ${ratio}, Style: ${style}\n* VISUAL GUIDE: (Deskripsikan scene metafora/lanskap yang BERBEDA. Jangan monoton, layout teks mengalir dinamis. Hanya munculkan karakter jika wajib)\n* GEN AI PROMPT: (Tulis prompt bahasa inggris)\n* NASKAH:\n  * HEADER: (Sub-judul ringkas. PENTING: DILARANG MENAMBAHKAN ANGKA PENOMORAN DI AWAL HEADER)\n  * BODY: (Penjelasan Feynman style, ${bodyFormat})\n  * FOOTER: [minimalist monochrome vector ${wtLogos} logo icon] ${wtUser} | ${i}/${slides}\n\nMake the aspect ratio ${ratio}`;
                generatedBlocks.push({ id: idN, title: titleN, content: contentN, type: 'single' });
                container.innerHTML += createOutputBlock(idN, titleN, contentN, false);
            }

            // CAPTION
            const idCap = `mode-b-caption`;
            const titleCap = `CAPTION & HASHTAG`;
            let contentCap = `[CAPTION]\n(Tulis intisari dakwah singkat, padat, menyentuh hati. Maksimal 500 karakter)\n\n[HASHTAGS]\n#dakwah #islam #(hashtag_relevan)`;
            generatedBlocks.push({ id: idCap, title: titleCap, content: contentCap, type: 'single' });
            container.innerHTML += createOutputBlock(idCap, titleCap, contentCap, false);
        }

        function switchMode(mode) {
            currentMode = mode;
            const btnA = document.getElementById('btn-mode-a');
            const btnB = document.getElementById('btn-mode-b');
            const settingCard = document.getElementById('setting-card');
            
            if (!btnA || !btnB || !settingCard) return;

            if (mode === 'A') {
                btnA.classList.add('bg-white', 'text-emerald-600', 'shadow-sm');
                btnA.classList.remove('text-slate-500', 'hover:text-slate-700');
                btnB.classList.remove('bg-white', 'text-emerald-600', 'shadow-sm');
                btnB.classList.add('text-slate-500', 'hover:text-slate-700');
                settingCard.classList.add('hidden');
            } else {
                btnB.classList.add('bg-white', 'text-emerald-600', 'shadow-sm');
                btnB.classList.remove('text-slate-500', 'hover:text-slate-700');
                btnA.classList.remove('bg-white', 'text-emerald-600', 'shadow-sm');
                btnA.classList.add('text-slate-500', 'hover:text-slate-700');
                settingCard.classList.remove('hidden');
            }
            
            const outputCard = document.getElementById('output-card');
            if(outputCard) outputCard.classList.add('hidden');
        }

        function populateDropdowns() {
            const styleSelect = document.getElementById('set-style');
            const fontSelect = document.getElementById('set-font');
            if(!styleSelect || !fontSelect) return;

            styleArtsList.forEach(item => {
                const opt = document.createElement('option');
                opt.value = item; opt.textContent = item;
                styleSelect.insertBefore(opt, styleSelect.lastElementChild);
            });
            fontDNAList.forEach(item => {
                const opt = document.createElement('option');
                opt.value = item; opt.textContent = item;
                fontSelect.insertBefore(opt, fontSelect.lastElementChild);
            });
        }

        function handleKustom(selectElement) {
            if(!selectElement) return;
            const customInput = document.getElementById(selectElement.id + '-custom');
            if (customInput) {
                if (selectElement.value === 'KUSTOM') {
                    selectElement.classList.add('hidden');
                    customInput.classList.remove('hidden');
                    customInput.focus();
                }
            }
        }

        function getSettingValue(baseId) {
            const customInput = document.getElementById(baseId + '-custom');
            const selectEl = document.getElementById(baseId);
            if (!customInput || !selectEl) return "";
            return !customInput.classList.contains('hidden') && customInput.value.trim() !== '' ? customInput.value : selectEl.value;
        }

        function handleCharacterChange(selectElement) {
            const container = document.getElementById('character-details-container');
            const fieldsContainer = document.getElementById('dynamic-char-fields');
            if(!container || !fieldsContainer) return;
            
            const val = selectElement.value;
            fieldsContainer.innerHTML = ''; 

            if (val === 'Auto-Set by AI' || val === 'KUSTOM') {
                container.classList.add('hidden');
                return;
            }

            container.classList.remove('hidden');
            
            const createField = (id, label, options) => {
                let optsHtml = options.map(o => `<option value="${o}">${o}</option>`).join('');
                return `
                <div>
                    <label class="block text-[10px] font-bold text-slate-500 mb-1">${label}</label>
                    <div class="flex gap-1">
                        <select id="char-${id}" onchange="handleKustom(this)" class="w-full bg-white border border-slate-200 rounded px-2 py-1 text-xs focus:outline-none focus:ring-1 focus:ring-emerald-500">
                            ${optsHtml}
                            <option value="KUSTOM">KUSTOM...</option>
                        </select>
                        <input type="text" id="char-${id}-custom" placeholder="Ketik..." class="hidden w-full bg-white border border-slate-200 rounded px-2 py-1 text-xs focus:outline-none focus:ring-1 focus:ring-emerald-500">
                    </div>
                </div>`;
            };

            const faceOpts = ["Auto-Set by AI", "Normal (Proporsional)", "Chibi (Cute/Pendek)"];
            
            if (val === 'Wanita' || val === 'Anak Perempuan') {
                fieldsContainer.innerHTML += createField('face', 'Wajah', faceOpts);
                fieldsContainer.innerHTML += createField('headwear', 'Penutup Kepala', ["Auto-Set by AI", "Khimar Panjang", "Cadar/ Niqab", "Jilbab Anak"]);
                fieldsContainer.innerHTML += createField('outfit', 'Outfit', ["Auto-Set by AI", "Gamis Longgar", "Jubah Syar'i", "Pakaian Anak Muslimah"]);
                fieldsContainer.innerHTML += createField('accessories', 'Aksesoris', ["Auto-Set by AI", "Membawa Buku", "Tas Selempang", "Tanpa Aksesoris"]);
            } else if (val === 'Pria Dewasa' || val === 'Anak Laki-Laki') {
                fieldsContainer.innerHTML += createField('face', 'Wajah', faceOpts);
                fieldsContainer.innerHTML += createField('headwear', 'Penutup Kepala', ["Auto-Set by AI", "Peci/ Kopiah", "Sorban", "Rambut Rapi Pendek", "Tanpa Penutup Kepala"]);
                fieldsContainer.innerHTML += createField('outfit', 'Outfit', ["Auto-Set by AI", "Baju Koko", "Gamis Pria", "Kemeja Casual", "Kaos Anak"]);
                fieldsContainer.innerHTML += createField('accessories', 'Aksesoris', ["Auto-Set by AI", "Membawa Mushaf", "Jam Tangan Silver", "Tanpa Aksesoris"]);
            } else if (val === 'Pasutri') {
                fieldsContainer.innerHTML += createField('face', 'Wajah', faceOpts);
                fieldsContainer.innerHTML += createField('headwear', 'Penutup Kepala Pasutri', ["Auto-Set by AI", "Istri Khimar, Suami Peci", "Istri Niqab, Suami Rambut Rapi"]);
                fieldsContainer.innerHTML += createField('outfit', 'Outfit', ["Auto-Set by AI", "Pakaian Syar'i Senada", "Pakaian Kasual Sopan"]);
                fieldsContainer.innerHTML += createField('accessories', 'Aksesoris', ["Auto-Set by AI", "Berjalan Berdampingan", "Sedang Berdiskusi"]);
            }
        }

        function getCharacterDetailsString() {
            const charType = getSettingValue('set-character');
            if (charType === 'Auto-Set by AI' || charType === 'KUSTOM' || charType === '') return charType;
            
            let details = `* KARAKTER: ${charType}\n`;
            details += `  * WAJAH: FACELESS, NO EYES (MANDATORY RULES)\n`;
            details += `  * PROPORSI: ${getSettingValue('char-face')}\n`;
            details += `  * PENUTUP KEPALA: ${getSettingValue('char-headwear')}\n`;
            details += `  * OUTFIT: ${getSettingValue('char-outfit')}\n`;
            details += `  * AKSESORIS: ${getSettingValue('char-accessories')}\n`;
            return details;
        }

        function resetSettings() {
            const selects = document.querySelectorAll('#setting-card select');
            selects.forEach(sel => {
                sel.classList.remove('hidden');
                sel.selectedIndex = 0;
                if(sel.id === 'set-ratio') sel.value = '3:4';
            });
            const customs = document.querySelectorAll('#setting-card input[type="text"]');
            customs.forEach(inp => {
                inp.value = '';
                if(inp.id.includes('custom')) inp.classList.add('hidden');
            });
            document.getElementById('set-slide-count').value = 7;
            document.getElementById('character-details-container').classList.add('hidden');
            
            document.getElementById('set-pt-header').value = "";
            document.getElementById('set-pt-body').value = "";
            document.getElementById('set-pt-footer').value = "";

            showToast("Pengaturan dikembalikan ke default");
        }

        function copyText(id) {
            const preEl = document.getElementById(id + '-content');
            if(!preEl) return;
            navigator.clipboard.writeText(preEl.innerText).then(() => {
                showToast("Teks berhasil dicopy!");
            });
        }

        function copyAllBlocks() {
            if (generatedBlocks.length === 0) return;
            let fullText = generatedBlocks.map(b => b.content).join('\n\n--------------------------------------------------\n\n');
            navigator.clipboard.writeText(fullText).then(() => {
                showToast("Seluruh block berhasil dicopy!");
            });
        }

        function saveBlock(id) {
            const block = generatedBlocks.find(b => b.id === id);
            if(block) {
                const newSave = {
                    id: 'saved-' + Date.now(),
                    mode: currentMode,
                    topic: document.getElementById('input-topic').value.trim() || 'No Topic',
                    timestamp: new Date().toLocaleString(),
                    type: 'single',
                    title: block.title,
                    content: block.content,
                    image: null
                };
                savedData.push(newSave);
                saveToLocalStorage();
                renderSavedBlocks();
                showToast("Block tersimpan ke Kartu Saved!");
            }
        }

        function saveAllBlocks() {
            if (generatedBlocks.length === 0) return;
            
            const bundleId = 'bundle-' + Date.now();
            const newBundle = {
                id: bundleId,
                mode: currentMode,
                topic: document.getElementById('input-topic').value.trim() || 'No Topic',
                timestamp: new Date().toLocaleString(),
                type: 'bundle',
                blocks: generatedBlocks.map(b => ({
                    title: b.title,
                    content: b.content,
                    image: null
                }))
            };
            
            savedData.push(newBundle);
            saveToLocalStorage();
            renderSavedBlocks();
            showToast("Seluruh output disimpan sebagai grup!");
            
            const accSaved = document.getElementById('acc-saved');
            if(accSaved && !accSaved.classList.contains('active')) {
                toggleAccordion('acc-saved', 'icon-saved');
            }
        }

        function saveToLocalStorage() {
            localStorage.setItem('nomuka_saved', JSON.stringify(savedData));
        }

        function renderSavedBlocks() {
            const containerA = document.getElementById('saved-mode-a-container');
            const containerB = document.getElementById('saved-mode-b-container');
            if(!containerA || !containerB) return;

            containerA.innerHTML = '';
            containerB.innerHTML = '';

            const dataA = savedData.filter(d => d.mode === 'A');
            const dataB = savedData.filter(d => d.mode === 'B');

            if(dataA.length === 0) containerA.innerHTML = '<p class="text-sm text-slate-400 text-center py-4">Belum ada ide yang disimpan.</p>';
            if(dataB.length === 0) containerB.innerHTML = '<p class="text-sm text-slate-400 text-center py-4">Belum ada prompt yang disimpan.</p>';

            const renderItem = (item, container) => {
                let html = '';
                if(item.type === 'single') {
                    html = `
                    <div class="bg-white border border-slate-200 rounded-xl overflow-hidden shadow-sm flex flex-col mb-4">
                        <div class="bg-slate-50 border-b border-slate-200 px-4 py-3 flex justify-between items-center">
                            <div>
                                <span class="text-xs font-bold text-slate-700">${item.title}</span>
                                <p class="text-[10px] text-slate-400 mt-1">${item.timestamp} | ${item.topic}</p>
                            </div>
                            <div class="flex gap-2">
                                <button onclick="toggleEditSingle('${item.id}')" id="edit-btn-${item.id}" class="w-8 h-8 rounded bg-white border border-slate-200 text-blue-500 hover:text-blue-700 flex items-center justify-center transition-colors" title="Edit Teks">
                                    <i class="fa-solid fa-pen"></i>
                                </button>
                                <label class="cursor-pointer w-8 h-8 rounded bg-white border border-slate-200 text-slate-500 hover:text-emerald-600 flex items-center justify-center transition-colors" title="Unggah Gambar">
                                    <i class="fa-solid fa-image"></i>
                                    <input type="file" class="hidden" accept="image/*" onchange="handleImageUpload(event, '${item.id}')">
                                </label>
                                <button onclick="deleteSaved('${item.id}')" class="w-8 h-8 rounded bg-white border border-slate-200 text-slate-500 hover:text-red-500 flex items-center justify-center transition-colors" title="Hapus">
                                    <i class="fa-solid fa-trash"></i>
                                </button>
                            </div>
                        </div>
                        <div class="p-4 flex-1 flex flex-col md:flex-row gap-4">
                            <div class="flex-1 overflow-x-auto max-h-64 relative group">
                                <pre id="pre-${item.id}" class="text-xs text-slate-600 font-mono whitespace-pre-wrap break-words outline-none p-2 rounded transition-colors">${item.content}</pre>
                                <button onclick="navigator.clipboard.writeText(document.getElementById('pre-${item.id}').innerText); showToast('Teks dicopy!');" class="absolute top-2 right-2 px-3 py-1 bg-white border border-slate-200 text-[10px] font-bold text-emerald-600 rounded opacity-0 group-hover:opacity-100 transition-opacity shadow-sm z-10">COPY TEKS</button>
                            </div>
                            ${item.image ? `<div class="w-full md:w-1/3 bg-slate-50 rounded-lg flex flex-col items-center justify-center p-2 border border-slate-200 relative group"><img src="${item.image}" class="max-w-full h-auto max-h-48 object-contain rounded" alt="Saved Preview"><button onclick="removeSingleImage('${item.id}')" class="absolute top-2 right-2 w-7 h-7 bg-red-100 text-red-600 rounded opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center text-xs" title="Hapus Gambar"><i class="fa-solid fa-xmark"></i></button></div>` : ''}
                        </div>
                    </div>`;
                } else if (item.type === 'bundle') {
                    const bundleAccId = 'acc-bundle-' + item.id;
                    const bundleIconId = 'icon-bundle-' + item.id;
                    
                    let innerBlocks = '';
                    let fullBundleText = '';
                    item.blocks.forEach((blk, idx) => {
                        fullBundleText += blk.content + '\n\n';
                        innerBlocks += `
                            <div class="border border-slate-200 rounded-lg overflow-hidden mb-4 shadow-sm bg-white">
                                <div class="bg-slate-100 px-4 py-2 text-xs font-bold text-slate-600 border-b border-slate-200 flex justify-between items-center">
                                    <span>${blk.title}</span>
                                    <div class="flex gap-2">
                                        <button onclick="navigator.clipboard.writeText(document.getElementById('pre-${item.id}-${idx}').innerText); showToast('Block dicopy!');" class="w-7 h-7 flex items-center justify-center bg-white rounded border border-slate-200 text-emerald-600 hover:text-emerald-800 transition-colors" title="Copy Block"><i class="fa-regular fa-copy"></i></button>
                                        <button onclick="toggleEditBundleBlock('${item.id}', ${idx})" id="edit-btn-${item.id}-${idx}" class="w-7 h-7 flex items-center justify-center bg-white rounded border border-slate-200 text-blue-500 hover:text-blue-700 transition-colors" title="Edit Teks"><i class="fa-solid fa-pen"></i></button>
                                        <label class="cursor-pointer w-7 h-7 flex items-center justify-center bg-white rounded border border-slate-200 text-slate-500 hover:text-amber-500 transition-colors" title="Unggah Gambar Slide">
                                            <i class="fa-solid fa-image"></i>
                                            <input type="file" class="hidden" accept="image/*" onchange="handleImageUploadBundle(event, '${item.id}', ${idx})">
                                        </label>
                                    </div>
                                </div>
                                <div class="p-4 flex flex-col lg:flex-row gap-4">
                                    <div class="flex-1 max-h-48 overflow-y-auto">
                                        <pre id="pre-${item.id}-${idx}" class="text-[11px] text-slate-600 font-mono whitespace-pre-wrap break-words outline-none p-2 rounded transition-colors">${blk.content}</pre>
                                    </div>
                                    ${blk.image ? `<div class="w-full lg:w-1/3 bg-slate-50 rounded-lg flex items-center justify-center p-2 border border-slate-200 relative group min-h-[120px]"><img src="${blk.image}" class="max-w-full h-auto max-h-48 object-contain rounded" alt="Saved Preview"><button onclick="removeBundleImage('${item.id}', ${idx})" class="absolute top-2 right-2 w-6 h-6 bg-red-100 text-red-600 rounded opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center text-[10px]" title="Hapus Gambar"><i class="fa-solid fa-xmark"></i></button></div>` : ''}
                                </div>
                            </div>
                        `;
                    });

                    html = `
                    <div class="bg-white border border-slate-200 rounded-xl overflow-hidden shadow-sm mb-4">
                        <div class="bg-emerald-50/50 border-b border-slate-200 px-4 py-4 flex justify-between items-center cursor-pointer hover:bg-emerald-50 transition-colors" onclick="toggleAccordion('${bundleAccId}', '${bundleIconId}')">
                            <div>
                                <span class="text-sm font-bold text-emerald-800 flex items-center gap-2"><i class="fa-solid fa-layer-group"></i> GROUP SAVED: ${item.topic}</span>
                                <p class="text-[10px] text-slate-500 mt-1">${item.timestamp} | ${item.blocks.length} Blocks</p>
                            </div>
                            <div class="flex items-center gap-3">
                                <button onclick="event.stopPropagation(); navigator.clipboard.writeText(\`${fullBundleText.replace(/`/g, '\\`')}\`); showToast('Seluruh grup dicopy!');" class="px-4 py-1.5 bg-white border border-slate-200 text-xs font-bold text-emerald-600 rounded-lg hover:bg-emerald-50 transition-colors shadow-sm">COPY ALL GROUP</button>
                                <button onclick="event.stopPropagation(); deleteSaved('${item.id}')" class="w-8 h-8 rounded bg-white border border-slate-200 text-slate-500 hover:text-red-500 flex items-center justify-center transition-colors" title="Hapus Group">
                                    <i class="fa-solid fa-trash"></i>
                                </button>
                                <i id="${bundleIconId}" class="fa-solid fa-chevron-up text-slate-400 transition-transform duration-300 rotate-180"></i>
                            </div>
                        </div>
                        <div id="${bundleAccId}" class="accordion-content px-4 bg-slate-50">
                            <div class="py-4">
                                ${innerBlocks}
                            </div>
                        </div>
                    </div>`;
                }
                container.innerHTML += html;
            };

            [...dataA].reverse().forEach(item => renderItem(item, containerA));
            [...dataB].reverse().forEach(item => renderItem(item, containerB));
        }

        function deleteSaved(id) {
            savedData = savedData.filter(d => d.id !== id);
            saveToLocalStorage();
            renderSavedBlocks();
            showToast("Item dihapus.");
        }

        function toggleEditSingle(id) {
            const preEl = document.getElementById(`pre-${id}`);
            const btnEl = document.getElementById(`edit-btn-${id}`);
            if(!preEl || !btnEl) return;

            if(preEl.isContentEditable) {
                preEl.contentEditable = "false";
                preEl.classList.remove('bg-blue-50', 'ring-1', 'ring-blue-300');
                btnEl.innerHTML = '<i class="fa-solid fa-pen"></i>';
                btnEl.classList.replace('text-emerald-600', 'text-blue-500');
                
                const targetIdx = savedData.findIndex(d => d.id === id);
                if(targetIdx > -1) {
                    savedData[targetIdx].content = preEl.innerText;
                    saveToLocalStorage();
                    showToast("Perubahan teks disimpan.");
                }
            } else {
                preEl.contentEditable = "true";
                preEl.classList.add('bg-blue-50', 'ring-1', 'ring-blue-300');
                preEl.focus();
                btnEl.innerHTML = '<i class="fa-solid fa-check"></i>';
                btnEl.classList.replace('text-blue-500', 'text-emerald-600');
            }
        }

        function handleImageUpload(event, id) {
            const file = event.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const targetIdx = savedData.findIndex(d => d.id === id);
                if(targetIdx > -1) {
                    savedData[targetIdx].image = e.target.result;
                    saveToLocalStorage();
                    renderSavedBlocks();
                    showToast("Gambar diunggah.");
                }
            };
            reader.readAsDataURL(file);
        }

        function removeSingleImage(id) {
             const targetIdx = savedData.findIndex(d => d.id === id);
            if(targetIdx > -1) {
                savedData[targetIdx].image = null;
                saveToLocalStorage();
                renderSavedBlocks();
                showToast("Gambar dihapus.");
            }
        }

        function toggleEditBundleBlock(bundleId, blockIdx) {
            const preEl = document.getElementById(`pre-${bundleId}-${blockIdx}`);
            const btnEl = document.getElementById(`edit-btn-${bundleId}-${blockIdx}`);
            if(!preEl || !btnEl) return;

            if(preEl.isContentEditable) {
                preEl.contentEditable = "false";
                preEl.classList.remove('bg-blue-50', 'ring-1', 'ring-blue-300');
                btnEl.innerHTML = '<i class="fa-solid fa-pen"></i>';
                btnEl.classList.replace('text-emerald-600', 'text-blue-500');
                
                const targetIdx = savedData.findIndex(d => d.id === bundleId);
                if(targetIdx > -1) {
                    savedData[targetIdx].blocks[blockIdx].content = preEl.innerText;
                    saveToLocalStorage();
                    showToast("Teks block disimpan.");
                }
            } else {
                preEl.contentEditable = "true";
                preEl.classList.add('bg-blue-50', 'ring-1', 'ring-blue-300');
                preEl.focus();
                btnEl.innerHTML = '<i class="fa-solid fa-check"></i>';
                btnEl.classList.replace('text-blue-500', 'text-emerald-600');
            }
        }

        function handleImageUploadBundle(event, bundleId, blockIdx) {
            const file = event.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const targetIdx = savedData.findIndex(d => d.id === bundleId);
                if(targetIdx > -1) {
                    savedData[targetIdx].blocks[blockIdx].image = e.target.result;
                    saveToLocalStorage();
                    renderSavedBlocks();
                    showToast("Gambar block diunggah.");
                }
            };
            reader.readAsDataURL(file);
        }

        function removeBundleImage(bundleId, blockIdx) {
            const targetIdx = savedData.findIndex(d => d.id === bundleId);
            if(targetIdx > -1) {
                savedData[targetIdx].blocks[blockIdx].image = null;
                saveToLocalStorage();
                renderSavedBlocks();
                showToast("Gambar block dihapus.");
            }
        }

        function exportData() {
            if(savedData.length === 0) {
                showToast("Tidak ada data untuk dieksport.");
                return;
            }
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(savedData));
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href", dataStr);
            downloadAnchorNode.setAttribute("download", "nomuka_saved_data.json");
            document.body.appendChild(downloadAnchorNode);
            downloadAnchorNode.click();
            downloadAnchorNode.remove();
            showToast("Data berhasil dieksport!");
        }

        function importData(event) {
            const file = event.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const imported = JSON.parse(e.target.result);
                    if(Array.isArray(imported)) {
                        savedData = [...savedData, ...imported];
                        saveToLocalStorage();
                        renderSavedBlocks();
                        showToast("Data berhasil diimport!");
                    } else {
                        showToast("Format JSON tidak valid.");
                    }
                } catch(err) {
                    showToast("Gagal membaca file JSON.");
                }
                event.target.value = '';
            };
            reader.readAsText(file);
        }

        function clearAllData() {
            if(confirm("Apakah Anda yakin ingin menghapus SEMUA data tersimpan? Aksi ini tidak dapat dibatalkan.")) {
                savedData = [];
                saveToLocalStorage();
                renderSavedBlocks();
                showToast("Seluruh data berhasil dihapus.");
            }
        }
    </script>
</body>
</html>
