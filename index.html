<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOMUKA - Islamic Content Strategist Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* Accordion transition */
        .accordion-content {
            transition: max-height 0.3s ease-in-out, opacity 0.3s ease-in-out, padding 0.3s ease-in-out;
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            padding-top: 0;
            padding-bottom: 0;
        }
        .accordion-content.active {
            max-height: 5000px; /* Large enough to contain content */
            opacity: 1;
        }
        
        pre { white-space: pre-wrap; word-wrap: break-word; }
    </style>
</head>
<body class="text-slate-800 antialiased min-h-screen flex flex-col">

    <!-- Header -->
    <header class="bg-white border-b border-slate-200 sticky top-0 z-50 shadow-sm">
        <div class="max-w-4xl mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-emerald-600 text-white rounded-xl flex items-center justify-center font-bold text-xl shadow-lg shadow-emerald-200">
                    N
                </div>
                <div>
                    <h1 class="text-lg font-extrabold text-slate-800 leading-tight">NOMUKA</h1>
                    <p class="text-[10px] text-slate-500 font-medium uppercase tracking-wider">Islamic Content Studio</p>
                </div>
            </div>
            <!-- Mode Switcher -->
            <div class="flex bg-slate-100 p-1 rounded-lg border border-slate-200">
                <button onclick="switchMode('A')" id="btn-mode-a" class="px-4 py-1.5 text-xs font-bold rounded-md transition-all text-slate-500 hover:text-slate-700">
                    MODE A (Ide)
                </button>
                <button onclick="switchMode('B')" id="btn-mode-b" class="px-4 py-1.5 text-xs font-bold rounded-md transition-all bg-white text-emerald-700 shadow-sm border border-slate-200">
                    MODE B (Carousel)
                </button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 max-w-4xl mx-auto w-full px-4 py-6 space-y-4">
        
        <!-- ========================================== -->
        <!-- KARTU 1: INPUT -->
        <!-- ========================================== -->
        <div class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
            <button onclick="toggleAccordion('acc-input', 'icon-input')" class="w-full px-5 py-4 flex justify-between items-center bg-slate-50 hover:bg-slate-100 transition-colors border-b border-slate-200">
                <h2 class="text-sm font-bold text-slate-800 flex items-center gap-2">
                    <i class="fa-solid fa-pen-nib text-emerald-600"></i> 1. KARTU INPUT
                </h2>
                <i id="icon-input" class="fa-solid fa-chevron-up text-slate-400 transition-transform duration-300"></i>
            </button>
            
            <div id="acc-input" class="accordion-content active">
                <div class="p-5 grid grid-cols-1 md:grid-cols-2 gap-4">
                    <!-- Kolom Topik -->
                    <div class="relative group">
                        <label class="block text-[11px] font-extrabold text-slate-500 uppercase mb-2">A. Topik/ Gagasan Utama</label>
                        <textarea id="input-topic" rows="5" class="w-full p-3 text-sm border border-slate-300 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none resize-y bg-slate-50 focus:bg-white transition-colors" placeholder="Ketik atau paste ide, topik, artikel, atau materi dakwah di sini..."></textarea>
                        <button onclick="document.getElementById('input-topic').value=''" class="absolute top-8 right-2 w-6 h-6 bg-slate-200 hover:bg-red-100 text-slate-500 hover:text-red-500 rounded-full flex items-center justify-center text-xs opacity-0 group-hover:opacity-100 transition-opacity" title="Clear Text">
                            <i class="fa-solid fa-xmark"></i>
                        </button>
                    </div>

                    <!-- Kolom Instruksi Khusus -->
                    <div class="relative group">
                        <label class="block text-[11px] font-extrabold text-slate-500 uppercase mb-2">B. Instruksi Khusus (Opsional)</label>
                        <textarea id="input-instructions" rows="5" class="w-full p-3 text-sm border border-slate-300 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none resize-y bg-slate-50 focus:bg-white transition-colors" placeholder="Tambahkan instruksi khusus (opsional). Contoh: Gunakan bahasa anak muda, atau wajib sertakan dalil tentang sabar..."></textarea>
                        <button onclick="document.getElementById('input-instructions').value=''" class="absolute top-8 right-2 w-6 h-6 bg-slate-200 hover:bg-red-100 text-slate-500 hover:text-red-500 rounded-full flex items-center justify-center text-xs opacity-0 group-hover:opacity-100 transition-opacity" title="Clear Text">
                            <i class="fa-solid fa-xmark"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- ========================================== -->
        <!-- KARTU 2: SETTING (MODE B ONLY) -->
        <!-- ========================================== -->
        <div id="card-setting" class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
            <button onclick="toggleAccordion('acc-setting', 'icon-setting')" class="w-full px-5 py-4 flex justify-between items-center bg-slate-50 hover:bg-slate-100 transition-colors border-b border-slate-200">
                <h2 class="text-sm font-bold text-slate-800 flex items-center gap-2">
                    <i class="fa-solid fa-sliders text-emerald-600"></i> 2. KARTU SETTING
                </h2>
                <i id="icon-setting" class="fa-solid fa-chevron-up text-slate-400 transition-transform duration-300"></i>
            </button>
            
            <div id="acc-setting" class="accordion-content active">
                <div class="p-5 space-y-6">
                    <!-- Action Buttons -->
                    <div class="flex justify-end gap-2">
                        <button onclick="resetSettings()" class="px-4 py-2 text-xs font-bold bg-slate-100 hover:bg-slate-200 text-slate-600 rounded-lg transition-colors border border-slate-200 shadow-sm flex items-center gap-2">
                            <i class="fa-solid fa-arrow-rotate-left"></i> Reset
                        </button>
                        <button onclick="autoSetSettings()" class="px-4 py-2 text-xs font-bold bg-gradient-to-r from-amber-400 to-orange-400 hover:from-amber-500 hover:to-orange-500 text-white rounded-lg transition-colors shadow-sm shadow-orange-200 flex items-center gap-2">
                            <i class="fa-solid fa-wand-magic-sparkles"></i> Auto-Set AI
                        </button>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <!-- A. Jumlah Slide -->
                        <div class="flex flex-col">
                            <label class="block text-[11px] font-extrabold text-slate-500 uppercase mb-1.5">A. Jumlah Slide Carousel</label>
                            <input type="number" id="set-slide-count" min="1" max="30" value="7" class="w-full px-3 py-2.5 text-sm border border-slate-300 rounded-xl focus:ring-2 focus:ring-emerald-500 bg-white">
                        </div>

                        <!-- B. Rasio -->
                        <div class="flex flex-col">
                            <label class="block text-[11px] font-extrabold text-slate-500 uppercase mb-1.5">B. Aspect Ratio</label>
                            <select id="set-ratio" onchange="handleKustom(this)" class="w-full px-3 py-2.5 text-sm border border-slate-300 rounded-xl focus:ring-2 focus:ring-emerald-500 bg-white">
                                <option value="Auto-Set by AI">Auto-Set by AI</option>
                                <option value="1:1">1:1 (Square)</option>
                                <option value="3:4" selected>3:4 (Portrait Feed)</option>
                                <option value="4:5">4:5 (Instagram Feed)</option>
                                <option value="9:16">9:16 (Reels/ Story)</option>
                                <option value="16:9">16:9 (Landscape)</option>
                                <option value="5:4">5:4</option>
                                <option value="4:3">4:3</option>
                                <option value="kustom">KUSTOM (Isi Sendiri)</option>
                            </select>
                            <input type="text" id="set-ratio-kustom" placeholder="Ketik rasio..." class="hidden mt-2 w-full px-3 py-2 text-sm border border-amber-300 rounded-lg bg-amber-50">
                        </div>

                        <!-- C. Karakter Utama -->
                        <div class="flex flex-col">
                            <label class="block text-[11px] font-extrabold text-slate-500 uppercase mb-1.5">C. Karakter Utama</label>
                            <select id="set-character" onchange="handleCharacterChange(this)" class="w-full px-3 py-2.5 text-sm border border-slate-300 rounded-xl focus:ring-2 focus:ring-emerald-500 bg-white">
                                <option value="Auto-Set by AI">Auto-Set by AI</option>
                                <option value="Pria Dewasa">Pria Dewasa</option>
                                <option value="Wanita">Wanita</option>
                                <option value="Pasutri">Pasutri</option>
                                <option value="Anak Laki-laki">Anak Laki-laki</option>
                                <option value="Anak Perempuan">Anak Perempuan</option>
                                <option value="kustom">KUSTOM (Isi Sendiri)</option>
                            </select>
                            <input type="text" id="set-character-kustom" placeholder="Ketik karakter..." class="hidden mt-2 w-full px-3 py-2 text-sm border border-amber-300 rounded-lg bg-amber-50">
                            <p class="text-[10px] text-amber-600 font-bold mt-1">*Aturan Faceless & No Eyes mutlak berlaku.</p>
                        </div>

                        <!-- Detail Karakter Dinamis (Spans full width if active) -->
                        <div id="character-details-container" class="hidden md:col-span-2 bg-emerald-50/50 border border-emerald-200 p-4 rounded-xl shadow-inner mt-1 mb-2">
                            <h3 class="text-[11px] font-extrabold text-emerald-800 uppercase mb-3 border-b border-emerald-200 pb-2"><i class="fa-solid fa-user-astronaut mr-1"></i> Rincian Spesifik Karakter</h3>
                            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                                <!-- Wajah -->
                                <div>
                                    <label class="block text-[10px] font-extrabold text-slate-500 uppercase mb-1">A. Wajah</label>
                                    <select id="set-char-wajah" onchange="handleKustom(this)" class="w-full px-2 py-1.5 text-xs border border-slate-300 rounded-lg bg-white focus:ring-2 focus:ring-emerald-500">
                                        <option value="Normal (Proporsional)">Normal (Proporsional)</option>
                                        <option value="Chibi (Imut/ Kepala Besar)">Chibi (Imut/ Kepala Besar)</option>
                                        <option value="kustom">KUSTOM (Isi Sendiri)</option>
                                    </select>
                                    <input type="text" id="set-char-wajah-kustom" placeholder="Ketik wajah..." class="hidden mt-1 w-full px-2 py-1 text-xs border border-amber-300 rounded bg-amber-50">
                                </div>
                                <!-- Headwear -->
                                <div>
                                    <label id="label-char-headwear" class="block text-[10px] font-extrabold text-slate-500 uppercase mb-1">B. Penutup Kepala</label>
                                    <select id="set-char-headwear" onchange="handleKustom(this)" class="w-full px-2 py-1.5 text-xs border border-slate-300 rounded-lg bg-white focus:ring-2 focus:ring-emerald-500">
                                    </select>
                                    <input type="text" id="set-char-headwear-kustom" placeholder="Ketik detail..." class="hidden mt-1 w-full px-2 py-1 text-xs border border-amber-300 rounded bg-amber-50">
                                </div>
                                <!-- Outfit -->
                                <div>
                                    <label class="block text-[10px] font-extrabold text-slate-500 uppercase mb-1">C. Outfit/ Pakaian</label>
                                    <select id="set-char-outfit" onchange="handleKustom(this)" class="w-full px-2 py-1.5 text-xs border border-slate-300 rounded-lg bg-white focus:ring-2 focus:ring-emerald-500">
                                    </select>
                                    <input type="text" id="set-char-outfit-kustom" placeholder="Ketik outfit..." class="hidden mt-1 w-full px-2 py-1 text-xs border border-amber-300 rounded bg-amber-50">
                                </div>
                                <!-- Aksesoris -->
                                <div>
                                    <label class="block text-[10px] font-extrabold text-slate-500 uppercase mb-1">D. Aksesoris</label>
                                    <select id="set-char-aksesoris" onchange="handleKustom(this)" class="w-full px-2 py-1.5 text-xs border border-slate-300 rounded-lg bg-white focus:ring-2 focus:ring-emerald-500">
                                    </select>
                                    <input type="text" id="set-char-aksesoris-kustom" placeholder="Ketik aksesoris..." class="hidden mt-1 w-full px-2 py-1 text-xs border border-amber-300 rounded bg-amber-50">
                                </div>
                            </div>
                        </div>

                        <!-- D. Gaya Seni -->
                        <div class="flex flex-col">
                            <label class="block text-[11px] font-extrabold text-slate-500 uppercase mb-1.5">D. Gaya Seni (Art Style)</label>
                            <select id="set-style" onchange="handleKustom(this)" class="w-full px-3 py-2.5 text-sm border border-slate-300 rounded-xl focus:ring-2 focus:ring-emerald-500 bg-white">
                                <option value="Auto-Set by AI">Auto-Set by AI</option>
                                <option value="1. GAYA 1 / 3D Papercraft">1. GAYA 1 / 3D Papercraft</option>
                                <option value="2. GAYA 2 / Layered Papercut">2. GAYA 2 / Layered Papercut</option>
                                <option value="3. GAYA 3 / Origami Paper Art">3. GAYA 3 / Origami Paper Art</option>
                                <option value="4. GAYA 4 / Paper Diorama">4. GAYA 4 / Paper Diorama</option>
                                <option value="5. GAYA 5 / Islamic Layered Papercut">5. GAYA 5 / Islamic Layered Papercut</option>
                                <option value="6. GAYA 6 / Paper Quilling">6. GAYA 6 / Paper Quilling</option>
                                <option value="7. GAYA 7 / Kirigami Illustration">7. GAYA 7 / Kirigami Illustration</option>
                                <option value="8. GAYA 8 / Cut Paper Collage">8. GAYA 8 / Cut Paper Collage</option>
                                <option value="9. GAYA 9 / Cardboard Craft">9. GAYA 9 / Cardboard Craft</option>
                                <option value="10. GAYA 10 / Paper Sculpture">10. GAYA 10 / Paper Sculpture</option>
                                <option value="kustom">KUSTOM (Isi Sendiri)</option>
                            </select>
                            <input type="text" id="set-style-kustom" placeholder="Ketik gaya seni..." class="hidden mt-2 w-full px-3 py-2 text-sm border border-amber-300 rounded-lg bg-amber-50">
                        </div>

                        <!-- E. Typography -->
                        <div class="flex flex-col">
                            <label class="block text-[11px] font-extrabold text-slate-500 uppercase mb-1.5">E. Tipografi (DNA Font)</label>
                            <select id="set-font" onchange="handleKustom(this)" class="w-full px-3 py-2.5 text-sm border border-slate-300 rounded-xl focus:ring-2 focus:ring-emerald-500 bg-white">
                                <option value="Auto-Set by AI">Auto-Set by AI</option>
                                <option value="FONT 1. Friendly Rounded Handwritten">FONT 1. Friendly Rounded Handwritten ⭐⭐⭐</option>
                                <option value="FONT 2. Soft Brush Handwriting">FONT 2. Soft Brush Handwriting</option>
                                <option value="FONT 3. Modern Editorial Serif">FONT 3. Modern Editorial Serif</option>
                                <option value="FONT 4. Humanist Sans">FONT 4. Humanist Sans</option>
                                <option value="FONT 5. Geometric Sans">FONT 5. Geometric Sans</option>
                                <option value="FONT 6. Rounded Sans">FONT 6. Rounded Sans</option>
                                <option value="FONT 7. Storybook Typography">FONT 7. Storybook Typography ⭐⭐⭐</option>
                                <option value="FONT 8. Notebook Handwriting">FONT 8. Notebook Handwriting</option>
                                <option value="FONT 9. Premium Calligraphy">FONT 9. Premium Calligraphy</option>
                                <option value="FONT 10. Modern Script">FONT 10. Modern Script</option>
                                <option value="FONT 11. Vintage Sign Painting">FONT 11. Vintage Sign Painting</option>
                                <option value="FONT 12. Chalkboard">FONT 12. Chalkboard</option>
                                <option value="FONT 13. Pencil Sketch">FONT 13. Pencil Sketch</option>
                                <option value="FONT 14. Ink Pen">FONT 14. Ink Pen</option>
                                <option value="FONT 15. Comic Friendly">FONT 15. Comic Friendly</option>
                                <option value="FONT 16. Children's Book">FONT 16. Children's Book</option>
                                <option value="FONT 17. Scandinavian Minimal">FONT 17. Scandinavian Minimal</option>
                                <option value="FONT 18. Japanese Lifestyle">FONT 18. Japanese Lifestyle</option>
                                <option value="FONT 19. Luxury Magazine">FONT 19. Luxury Magazine</option>
                                <option value="FONT 20. Cozy Journal">FONT 20. Cozy Journal ⭐⭐⭐</option>
                                <option value="FONT 21. Bold Condensed Display">FONT 21. Bold Condensed Display ⭐⭐⭐</option>
                                <option value="FONT 22. Elegant Slab Serif">FONT 22. Elegant Slab Serif ⭐⭐⭐</option>
                                <option value="FONT 23. Minimal Monospace">FONT 23. Minimal Monospace ⭐⭐⭐</option>
                                <option value="FONT 24. Art Deco Display">FONT 24. Art Deco Display ⭐⭐⭐</option>
                                <option value="FONT 25. Retro Groovy">FONT 25. Retro Groovy ⭐⭐⭐</option>
                                <option value="FONT 26. Pixel Retro Gaming">FONT 26. Pixel Retro Gaming ⭐⭐⭐</option>
                                <option value="FONT 27. Futuristic Tech Display">FONT 27. Futuristic Tech Display ⭐⭐⭐</option>
                                <option value="FONT 28. Blackletter Gothic">FONT 28. Blackletter Gothic ⭐⭐⭐</option>
                                <option value="FONT 29. Elegant Art Nouveau">FONT 29. Elegant Art Nouveau ⭐⭐⭐</option>
                                <option value="FONT 30. Luxury Signature Script">FONT 30. Luxury Signature Script ⭐⭐⭐</option>
                                <option value="FONT 31. Brush Street Typography">FONT 31. Brush Street Typography ⭐⭐⭐</option>
                                <option value="kustom">KUSTOM (Isi Sendiri)</option>
                            </select>
                            <input type="text" id="set-font-kustom" placeholder="Ketik nama font..." class="hidden mt-2 w-full px-3 py-2 text-sm border border-amber-300 rounded-lg bg-amber-50">
                        </div>

                        <!-- F. Text Effect -->
                        <div class="flex flex-col">
                            <label class="block text-[11px] font-extrabold text-slate-500 uppercase mb-1.5">F. Efek Teks (Header & Body)</label>
                            <select id="set-texteffect" onchange="handleKustom(this)" class="w-full px-3 py-2.5 text-sm border border-slate-300 rounded-xl focus:ring-2 focus:ring-emerald-500 bg-white">
                                <option value="Auto-Set by AI">Auto-Set by AI</option>
                                <option value="FLAT (BAWAAN FONT)">FLAT (BAWAAN FONT)</option>
                                <option value="3D EMBOSSED (TIMBUL)">3D EMBOSSED (TIMBUL)</option>
                                <option value="DEBOSSED (TENGGELAM)">DEBOSSED (TENGGELAM)</option>
                                <option value="NEON GLOW (MENYALA)">NEON GLOW (MENYALA)</option>
                                <option value="METALLIC FOIL (EMAS/ PERAK)">METALLIC FOIL (EMAS/ PERAK)</option>
                                <option value="CHALK/ TEXTURAL (KAPUR/ KASAR)">CHALK/ TEXTURAL (KAPUR/ KASAR)</option>
                                <option value="WATERCOLOR BLEND (MENYATU AIR)">WATERCOLOR BLEND (MENYATU AIR)</option>
                                <option value="kustom">KUSTOM (Isi Sendiri)</option>
                            </select>
                            <input type="text" id="set-texteffect-kustom" placeholder="Ketik efek teks..." class="hidden mt-2 w-full px-3 py-2 text-sm border border-amber-300 rounded-lg bg-amber-50">
                        </div>

                        <!-- G. Text Alignment -->
                        <div class="flex flex-col">
                            <label class="block text-[11px] font-extrabold text-slate-500 uppercase mb-1.5">G. Perataan Teks (Alignment)</label>
                            <select id="set-alignment" onchange="handleKustom(this)" class="w-full px-3 py-2.5 text-sm border border-slate-300 rounded-xl focus:ring-2 focus:ring-emerald-500 bg-white">
                                <option value="Auto-Set by AI (DINAMIS/ SEEMLESS)">Auto-Set by AI (DINAMIS/ SEEMLESS)</option>
                                <option value="RATA KIRI">RATA KIRI</option>
                                <option value="RATA TENGAH">RATA TENGAH</option>
                                <option value="RATA KANAN">RATA KANAN</option>
                                <option value="kustom">KUSTOM (Isi Sendiri)</option>
                            </select>
                            <input type="text" id="set-alignment-kustom" placeholder="Ketik alignment..." class="hidden mt-2 w-full px-3 py-2 text-sm border border-amber-300 rounded-lg bg-amber-50">
                        </div>

                        <!-- H. Komposisi Teks & Visual -->
                        <div class="flex flex-col">
                            <label class="block text-[11px] font-extrabold text-slate-500 uppercase mb-1.5">H. Komposisi Teks & Visual</label>
                            <select id="set-composition" onchange="handleKustom(this)" class="w-full px-3 py-2.5 text-sm border border-slate-300 rounded-xl focus:ring-2 focus:ring-emerald-500 bg-white">
                                <option value="Auto-Set by AI">Auto-Set by AI</option>
                                <option value="SEIMBANG (50:50)">SEIMBANG (50:50)</option>
                                <option value="TEKS DOMINAN (60% TEKS : 40% VISUAL)">TEKS DOMINAN (60:40)</option>
                                <option value="VISUAL DOMINAN (4O% TEKS : 60% VISUAL)">VISUAL DOMINAN (40:60)</option>
                                <option value="MINIMALIS TEKS (30% TEKS : 70% VISUAL)">MINIMALIS TEKS (30:70)</option>
                                <option value="kustom">KUSTOM (Isi Sendiri)</option>
                            </select>
                            <input type="text" id="set-composition-kustom" placeholder="Ketik komposisi..." class="hidden mt-2 w-full px-3 py-2 text-sm border border-amber-300 rounded-lg bg-amber-50">
                        </div>

                        <!-- I. Format Body Text -->
                        <div class="flex flex-col">
                            <label class="block text-[11px] font-extrabold text-slate-500 uppercase mb-1.5">I. Format Body Text</label>
                            <select id="set-bodyformat" onchange="handleKustom(this)" class="w-full px-3 py-2.5 text-sm border border-slate-300 rounded-xl focus:ring-2 focus:ring-emerald-500 bg-white">
                                <option value="Auto-Set by AI">Auto-Set by AI</option>
                                <option value="DENGAN POINT-POINT">DENGAN POINT-POINT</option>
                                <option value="TANPA POINT-POINT">TANPA POINT-POINT</option>
                                <option value="kustom">KUSTOM (Isi Sendiri)</option>
                            </select>
                            <input type="text" id="set-bodyformat-kustom" placeholder="Ketik format..." class="hidden mt-2 w-full px-3 py-2 text-sm border border-amber-300 rounded-lg bg-amber-50">
                        </div>

                        <!-- J. Palet Warna -->
                        <div class="flex flex-col">
                            <label class="block text-[11px] font-extrabold text-slate-500 uppercase mb-1.5">J. Palet Warna</label>
                            <select id="set-palette" onchange="handleKustom(this)" class="w-full px-3 py-2.5 text-sm border border-slate-300 rounded-xl focus:ring-2 focus:ring-emerald-500 bg-white">
                                <option value="Auto-Set by AI" selected>Auto-Set by AI</option>
                                <option value="EARTH TONE">EARTH TONE</option>
                                <option value="SOFT PASTEL">SOFT PASTEL</option>
                                <option value="MONOCHROME">MONOCHROME</option>
                                <option value="WARM">WARM</option>
                                <option value="COOL">COOL</option>
                                <option value="kustom">KUSTOM (Isi Sendiri)</option>
                            </select>
                            <input type="text" id="set-palette-kustom" placeholder="Ketik palet warna..." class="hidden mt-2 w-full px-3 py-2 text-sm border border-amber-300 rounded-lg bg-amber-50">
                        </div>

        function populateSelect(selectId, optionsArray) {
            const selectEl = document.getElementById(selectId);
            if(!selectEl) return;
            selectEl.innerHTML = "";
            optionsArray.forEach(opt => {
                const optionNode = document.createElement("option");
                optionNode.value = opt;
                optionNode.textContent = opt === 'kustom' ? 'KUSTOM (Isi Sendiri)' : opt;
                selectEl.appendChild(optionNode);
            });
            const kustomInput = document.getElementById(selectId + '-kustom');
            if(kustomInput) {
                kustomInput.classList.add('hidden');
                kustomInput.value = '';
            }
        }

        function handleCharacterChange(selectEl) {
            handleKustom(selectEl); 
            const val = selectEl.value;
            const container = document.getElementById('character-details-container');
            const labelHeadwear = document.getElementById('label-char-headwear');
            
            if(!container || !labelHeadwear) return; // Safety check

            // Reset dropdown detail wajah
            const wajahSelect = document.getElementById('set-char-wajah');
            const wajahKustom = document.getElementById('set-char-wajah-kustom');
            if(wajahSelect) {
                wajahSelect.selectedIndex = 0;
                handleKustom(wajahSelect);
            }

            if (val === 'Pria Dewasa') {
                container.classList.remove('hidden');
                labelHeadwear.textContent = 'B. Gaya Rambut/ Peci';
                populateSelect('set-char-headwear', charOptions.male.headwear);
                populateSelect('set-char-outfit', charOptions.male.outfit);
                populateSelect('set-char-aksesoris', charOptions.male.aksesoris);
            } else if (val === 'Wanita') {
                container.classList.remove('hidden');
                labelHeadwear.textContent = 'B. Model Khimar/ Cadar';
                populateSelect('set-char-headwear', charOptions.female.headwear);
                populateSelect('set-char-outfit', charOptions.female.outfit);
                populateSelect('set-char-aksesoris', charOptions.female.aksesoris);
            } else if (val === 'Anak Laki-laki') {
                container.classList.remove('hidden');
                labelHeadwear.textContent = 'B. Rambut/ Peci Anak';
                populateSelect('set-char-headwear', charOptions.boy.headwear);
                populateSelect('set-char-outfit', charOptions.boy.outfit);
                populateSelect('set-char-aksesoris', charOptions.boy.aksesoris);
            } else if (val === 'Anak Perempuan') {
                container.classList.remove('hidden');
                labelHeadwear.textContent = 'B. Khimar Anak';
                populateSelect('set-char-headwear', charOptions.girl.headwear);
                populateSelect('set-char-outfit', charOptions.girl.outfit);
                populateSelect('set-char-aksesoris', charOptions.girl.aksesoris);

                container.classList.add('hidden');

        function toggleAccordion(contentId, iconId) {
            const content = document.getElementById(contentId);
            const icon = document.getElementById(iconId);
            if(content.classList.contains('active')) {
                content.classList.remove('active');
                if(icon) icon.classList.remove('rotate-180');
            } else {
                content.classList.add('active');
                if(icon) icon.classList.add('rotate-180');
            }
        }

        // Make all accordions active by default
        window.onload = function() {
            document.querySelectorAll('.fa-chevron-up').forEach(icon => icon.classList.add('rotate-180'));
            switchMode('B');
            renderSavedBlocks();
        }

        function switchMode(mode) {
            currentMode = mode;
            const btnA = document.getElementById('btn-mode-a');
            const btnB = document.getElementById('btn-mode-b');
            const cardSetting = document.getElementById('card-setting');

            if(mode === 'A') {
                btnA.classList.replace('bg-transparent', 'bg-white');
                btnA.classList.replace('text-slate-500', 'text-emerald-700');
                btnA.classList.add('shadow-sm', 'border', 'border-slate-200');
                
                btnB.classList.replace('bg-white', 'bg-transparent');
                btnB.classList.replace('text-emerald-700', 'text-slate-500');
                btnB.classList.remove('shadow-sm', 'border', 'border-slate-200');
                
                cardSetting.classList.add('hidden');
                switchSavedTab('A');
            } else {
                btnB.classList.replace('bg-transparent', 'bg-white');
                btnB.classList.replace('text-slate-500', 'text-emerald-700');
                btnB.classList.add('shadow-sm', 'border', 'border-slate-200');
                
                btnA.classList.replace('bg-white', 'bg-transparent');
                btnA.classList.replace('text-emerald-700', 'text-slate-500');
                btnA.classList.remove('shadow-sm', 'border', 'border-slate-200');
                
                cardSetting.classList.remove('hidden');
                switchSavedTab('B');
            }
        }

        function handleKustom(selectEl) {
            if(!selectEl) return;
            const kustomInput = document.getElementById(selectEl.id + '-kustom');
            if(kustomInput) {
                if(selectEl.value === 'kustom') {
                    kustomInput.classList.remove('hidden');
                    kustomInput.focus();
                } else {
                    kustomInput.classList.add('hidden');
                }
            }
        }

        function autoSetSettings() {
            const getRand = (arr) => arr[Math.floor(Math.random() * arr.length)];
            
            const slideCount = document.getElementById('set-slide-count');
            const ratio = document.getElementById('set-ratio');
            const charSelect = document.getElementById('set-character');
            const style = document.getElementById('set-style');
            const font = document.getElementById('set-font');
            const effect = document.getElementById('set-texteffect');
            const align = document.getElementById('set-alignment');
            const comp = document.getElementById('set-composition');
            const body = document.getElementById('set-bodyformat');
            const pal = document.getElementById('set-palette');
            const patch = document.getElementById('set-patch-footer');
            const headPT = document.getElementById('set-pt-header');
            const bodyPT = document.getElementById('set-pt-body');
            const footPT = document.getElementById('set-pt-footer');

            if(slideCount) slideCount.value = 7;
            if(ratio) ratio.value = "3:4";
            
            if(charSelect) {
                charSelect.value = "Wanita";
                handleCharacterChange(charSelect);
            }
            
            if(style) { style.value = getRand(styleArtsList); handleKustom(style); }
            if(font) { font.value = getRand(fontDNAList); handleKustom(font); }
            if(effect) { effect.value = "FLAT (BAWAAN FONT)"; handleKustom(effect); }
            if(align) { align.value = "Auto-Set by AI (DINAMIS/ SEEMLESS)"; handleKustom(align); }
            if(comp) { comp.value = "TEKS DOMINAN (60% TEKS : 40% VISUAL)"; handleKustom(comp); }
            if(body) { body.value = "DENGAN POINT-POINT"; handleKustom(body); }
            
            const palettes = ["EARTH TONE", "SOFT PASTEL", "WARM"];
            if(pal) { pal.value = getRand(palettes); handleKustom(pal); }
            
            if(patch) { patch.value = "Auto-Set by AI"; handleKustom(patch); }
            
            if(headPT) headPT.value = "64";
            if(bodyPT) bodyPT.value = "32";
            if(footPT) footPT.value = "24";

            showToast("Auto-Set Berhasil Diterapkan");
        }

            const selects = document.querySelectorAll('#acc-setting select');
            selects.forEach(select => {

            return `

        function generateContent() {
            const topic = document.getElementById('input-topic').value.trim();
            const instructions = document.getElementById('input-instructions').value.trim();
            
            if (!topic && !instructions) {
                showToast("Silakan isi topik atau instruksi terlebih dahulu.");
                return;
            }

            const container = document.getElementById('output-container');
            container.innerHTML = '<div class="text-center py-10 text-emerald-600"><i class="fa-solid fa-spinner fa-spin text-3xl mb-2"></i><br>Processing Data...</div>';
            
            // Ensure Output accordion is open
            const accOutput = document.getElementById('acc-output');
            const iconOutput = document.getElementById('icon-output');
            accOutput.classList.add('active');
            if(iconOutput) iconOutput.classList.add('rotate-180');

            setTimeout(() => {
                if(currentMode === 'A') {
                    generateModeA(topic, instructions, container);
                } else {
                    generateModeB(topic, instructions, container);
                }
                document.getElementById('output-actions').classList.remove('hidden');
                showToast("Berhasil generate prompt!");
                
                // Scroll to output
                document.getElementById('icon-output').scrollIntoView({ behavior: 'smooth', block: 'start' });
            }, 600);
        }

        function generateModeA(topic, instructions, container) {
            container.innerHTML = ""; // clear
            const systemPrompt = `[SYSTEM: YOU ARE IN MODE A - RESEARCHER. Generate exactly 5 unique Islamic content ideas based on the topic. Provide ONLY the 5 ideas in separate clear blocks ready to be copied.]`;
            
            for(let i=1; i<=5; i++) {
                const blockId = `mode-a-block-${Date.now()}-${i}`;
                const text = `${i===1 ? systemPrompt + '\n\n' : ''}=== IDE KONTEN ${i} ===
Topik: ${topic || 'Ide Niche Islami'}
Cover Title: [Berikan 2-3 opsi judul Clickbait Islami]
Unique Angle: [Sudut pandang unik/ Feynman approach]
Dalil Pendukung: [Sebutkan ayat Qur'an atau Hadits spesifik]
Core Idea: [Jelaskan inti cerita/ alur konten dalam 2 kalimat]
Visual Recommendation:
- Style Art: [Pilih 1 dari Style Art]
- Typography: [Pilih kombinasi DNA Font]
- Color Palette: [Saran warna dominan]`;
                container.innerHTML += createOutputBlock(blockId, `Ide Topik ${i}`, text);
            }
        }

        function generateModeB(topic, instructions, container) {
            const slideCount = parseInt(document.getElementById('set-slide-count').value) || 7;
            const ratio = getSettingValue('set-ratio');
            const character = getSettingValue('set-character');
            const style = getSettingValue('set-style');
            const font = getSettingValue('set-font');
            const effect = getSettingValue('set-texteffect');
            const alignment = getSettingValue('set-alignment');
            const composition = getSettingValue('set-composition');
            const bodyFormat = getSettingValue('set-bodyformat');
            const palette = getSettingValue('set-palette');
            const patchFooter = getSettingValue('set-patch-footer');
            
            let charWajah = "FACELESS, NO EYES (MANDATORY RULES)";
            let charHeadwear = "Tertutup/ Rapi";
            let charOutfit = "DINAMIS SESUAI KONTEKS TIAP SLIDE (Menutup aurat syar'i)";
            let charAksesoris = "Minimalis";

            const charContainer = document.getElementById('character-details-container');
            if (charContainer && !charContainer.classList.contains('hidden')) {
                const wjh = getSettingValue('set-char-wajah');
                charWajah = wjh + " - TAPI WAJIB FACELESS, NO EYES (MANDATORY RULES)";
                charHeadwear = getSettingValue('set-char-headwear');
                charOutfit = getSettingValue('set-char-outfit') + " (Pastikan Menutup Aurat)";
                charAksesoris = getSettingValue('set-char-aksesoris');
            }
            
            const ptHead = document.getElementById('set-pt-header').value || 'Auto';
            const ptBody = document.getElementById('set-pt-body').value || 'Auto';
            const ptFoot = document.getElementById('set-pt-footer').value || 'Auto';
            
            const rawLogosInput = document.getElementById('set-watermark-logo').value || 'Instagram, Threads';
            const rawLogos = rawLogosInput.split(',').map(s=>s.trim()).filter(s=>s);
            const watermarkLogos = rawLogos.map(logo => `[minimalist monochrome vector ${logo.toLowerCase()} logo icon]`).join(' ');
            const username = document.getElementById('set-watermark-user').value || "@username";
            
            let htmlBuffer = "";

            // Block 1: Global Config + Slide 1
            const block1Id = `output-b-${Date.now()}-1`;
            const block1Text = `@createimage\n` +
                `==========================================================\n` +
                `GLOBAL CONFIGURATION & SLIDE 1 (COVER/ HOOK)\n` +
                `==========================================================\n` +
                `* OPERATION MODE: MODE B\n` +
                `* TOPIK/ MATERI KONTEN: ${topic}\n` +
                `${instructions ? '* INSTRUKSI KHUSUS: ' + instructions + '\n' : ''}` +
                `* STYLE ART: ${style}\n` +
                `* RATIO: ${ratio}\n` +
                `* KOMPOSISI TEKS/ ILUSTRASI: ${composition} (PENTING: Jangan monoton dengan layout teks di kiri & gambar di kanan. Variasikan secara dramatis di tiap slide!)\n` +
                `* TYPOGRAPHY\n` +
                `  * NAMA/ DNA FONT: ${font}\n` +
                `  * EFEK FONT: ${effect}\n` +
                `  * UKURAN FONT (HEADER, BODY, FOOTER): ${ptHead}, ${ptBody}, ${ptFoot}\n` +
                `  * TEXT ALIGNMENT: ${alignment}\n` +
                `* PALET WARNA: ${palette}\n` +
                `* LATAR: Dinamis dan berubah-ubah secara spesifik mewakili edukasi tiap slide.\n` +
                `* KARAKTER UTAMA (HANYA DIMUNCULKAN JIKA RELEVAN. JIKA TIDAK, GUNAKAN METAFORA)\n` +
                `  * GENDER: ${character}\n` +
                `  * WAJAH: ${charWajah}\n` +
                `  * PENUTUP KEPALA/ RAMBUT: ${charHeadwear}\n` +
                `  * OUTFIT: ${charOutfit}\n` +
                `  * AKSESORIS: ${charAksesoris}\n` +
                `* BODY TEXT: ${bodyFormat}\n` +
                `* FOOTER\n` +
                `  * BENTUK PATCH FOOTER: ${patchFooter}\n` +
                `  * MEDIA SOSIAL: ${rawLogos.join(', ')}\n` +
                `  * USERNAME: ${username}\n` +
                `----------------------------------------------------------\n` +
                `[SLIDE 1 SPECS]\n` +
                `* SAFE MARGIN: Top 100px, Bottom 100px, Left 100px, Right 100px\n` +
                `* BACKGROUND: [Deskripsikan lingkungan yang sangat relevan dengan hook]\n` +
                `* VISUAL HIERARCHY: 1. Header (Pusat), 2. Visual Hook (Kuat), 3. Footer\n` +
                `----------------------------------------------------------\n` +
                `[VISUAL GUIDE SLIDE 1]\n` +
                `[Deskripsikan visual hook yang memancing rasa penasaran tanpa banyak teks. PASTIKAN KARAKTER (JIKA ADA) FACELESS NO EYES, MENGGUNAKAN PAKAIAN SYAR'I/ MENUTUP AURAT]\n` +
                `----------------------------------------------------------\n` +
                `[GEN AI PROMPT SLIDE 1]\n` +
                `[Tulis prompt bahasa Inggris untuk AI Generator sesuai Visual Guide dan Style Art. Pastikan menyertakan "Faceless, no eyes, completely blank face"]\n` +
                `----------------------------------------------------------\n` +
                `[NASKAH SLIDE 1]\n` +
                `HEADER: [Judul Clickbait/ Hook yang relevan]\n` +
                `BODY: [KOSONGKAN. Slide 1 tidak boleh ada body text]\n` +
                `FOOTER: ${watermarkLogos} ${username} | 1/${slideCount}\n` +
                `Make the aspect ratio ${ratio}`;
            htmlBuffer += createOutputBlock(block1Id, "Slide 1 (Hook & Config)", block1Text);

            // Blocks 2 to N
            for (let i = 2; i <= slideCount; i++) {
                const blockId = `output-b-${Date.now()}-${i}`;
                const text = `@createimage\n` +
                    `==========================================================\n` +
                    `SLIDE ${i}\n` +
                    `==========================================================\n` +
                    `[SLIDE ${i} SPECS]\n` +
                    `* SAFE MARGIN: Top 100px, Bottom 100px, Left 100px, Right 100px\n` +
                    `* BACKGROUND: [Latar yang berbeda/ progresif dari slide sebelumnya]\n` +
                    `* VISUAL HIERARCHY: 1. Header, 2. Visual Pendukung, 3. Body Text (Point), 4. Footer\n` +
                    `----------------------------------------------------------\n` +
                    `[VISUAL GUIDE SLIDE ${i}]\n` +
                    `[Deskripsikan komposisi. Variasikan letak objek/ karakter (misal di bawah, tengah, siluet). JANGAN MONOTON teks kiri-gambar kanan. FACELESS NO EYES MUTLAK.]\n` +
                    `----------------------------------------------------------\n` +
                    `[GEN AI PROMPT SLIDE ${i}]\n` +
                    `[Tulis prompt bahasa Inggris detail sesuai Visual Guide. Include "Faceless, no eyes".]\n` +
                    `----------------------------------------------------------\n` +
                    `[NASKAH SLIDE ${i}]\n` +
                    `HEADER: [Sub-judul ringkas. PENTING: DILARANG MENAMBAHKAN ANGKA PENOMORAN DI AWAL HEADER]\n` +
                    `BODY: \n[Isi Feynman Explanation. ${bodyFormat.includes('TANPA') ? 'Tulis paragraf pendek 2-3 baris.' : 'Gunakan bullet points ringkas.'}]\n` +
                    `FOOTER: ${watermarkLogos} ${username} | ${i}/${slideCount}\n` +
                    `Make the aspect ratio ${ratio}`;
                htmlBuffer += createOutputBlock(blockId, `Slide ${i}`, text);
            }

            // Caption Block
            const capId = `output-b-${Date.now()}-cap`;
            const capText = `=== CAPTION & HASHTAG ===\n` +
                `[Tulis caption menarik merangkum Carousel di atas. Maksimal 500 karakter termasuk spasi.]\n\n` +
                `CTA: [Call to Action yang natural]\n\n` +
                `Hashtag:\n#[Topik] #DakwahVisual #Muhasabah #IslamicReminder`;
            htmlBuffer += createOutputBlock(capId, "Caption", capText);

            container.innerHTML = htmlBuffer;
        }

        // Copy/Save Functionality
        function copyText(blockId) {
            const text = document.getElementById(blockId + '-content').innerText;
            navigator.clipboard.writeText(text).then(() => {
                showToast("Teks berhasil dicopy ke clipboard!");
            });
        }

        function copyAllBlocks() {
            const outputNodes = document.querySelectorAll('#output-container pre');
            if(outputNodes.length === 0) return;
            
            let fullText = "";
            outputNodes.forEach(node => {
                fullText += node.innerText + "\n\n";
            });
            navigator.clipboard.writeText(fullText).then(() => {
                showToast("Semua block berhasil dicopy!");
            });
        }

        function saveBlock(blockId) {
            const text = document.getElementById(blockId + '-content').innerText;
            const titleNode = document.querySelector(`#${blockId} span`);
            const blockTitle = titleNode ? titleNode.innerText : 'Saved Block';

            const newItem = {
                id: 'save-' + Date.now(),
                type: 'single',
                mode: currentMode,
                timestamp: new Date().toLocaleString('id-ID'),
                topic: document.getElementById('input-topic').value || 'Tanpa Judul',
                title: blockTitle,
                content: text,
                image: null
            };

            savedData.push(newItem);
            saveToLocalStorage();
            renderSavedBlocks();
            showToast("Block berhasil disimpan ke tab Saved!");
        }

        function saveAllBlocks() {
            const outputNodes = document.querySelectorAll('#output-container > div[id^="output-"]');
            if(outputNodes.length === 0 && currentMode === 'B') {
                const altNodes = document.querySelectorAll('#output-container > div[id^="mode-a"]');
                if(altNodes.length === 0) {
                     showToast("Tidak ada output untuk disimpan.");
                     return;
                }
                saveBundleNodes(altNodes);
                return;
            }
            saveBundleNodes(outputNodes);
        }

        function saveBundleNodes(nodes) {
            const bundleId = 'bundle-' + Date.now();
            const blocks = [];
            
            nodes.forEach(node => {
                const pre = node.querySelector('pre');
                const titleNode = node.querySelector('span');
                if(pre && titleNode) {
                    blocks.push({
                        title: titleNode.innerText,
                        content: pre.innerText
                    });
                }
            });

            const bundleData = {
                id: bundleId,
                type: 'bundle',
                mode: currentMode,
                timestamp: new Date().toLocaleString('id-ID'),
                topic: document.getElementById('input-topic').value || 'Tanpa Judul',
                blocks: blocks,
                image: null
            };

            savedData.push(bundleData);
            saveToLocalStorage();
            renderSavedBlocks();
            showToast("Semua block berhasil disimpan sebagai grup!");
        }

        function saveToLocalStorage() {
            localStorage.setItem('nomuka_saved_data', JSON.stringify(savedData));
        }

        function switchSavedTab(mode) {
            currentSavedTab = mode;
            const tabA = document.getElementById('tab-saved-a');
            const tabB = document.getElementById('tab-saved-b');
            
            if(mode === 'A') {
                tabA.classList.replace('border-transparent', 'border-emerald-600');
                tabA.classList.replace('text-slate-400', 'text-emerald-600');
                tabB.classList.replace('border-emerald-600', 'border-transparent');
                tabB.classList.replace('text-emerald-600', 'text-slate-400');
            } else {
                tabB.classList.replace('border-transparent', 'border-emerald-600');
                tabB.classList.replace('text-slate-400', 'text-emerald-600');
                tabA.classList.replace('border-emerald-600', 'border-transparent');
                tabA.classList.replace('text-emerald-600', 'text-slate-400');
            }
            renderSavedBlocks();
        }

        function renderSavedBlocks() {
            const container = document.getElementById('saved-container');
            container.innerHTML = "";
            
            const filtered = savedData.filter(d => d.mode === currentSavedTab);
            
            if(filtered.length === 0) {
                container.innerHTML = '<div class="text-center py-6 text-slate-400 text-sm italic">Belum ada item yang tersimpan di mode ini.</div>';
                return;
            }

            // Reverse to show newest first
            [...filtered].reverse().forEach(item => {
                let html = '';
                if(item.type === 'single') {
                    html = `
                    <div class="bg-white border border-slate-200 rounded-xl overflow-hidden shadow-sm flex flex-col">
                        <div class="bg-slate-50 border-b border-slate-200 px-4 py-2 flex justify-between items-center">
                            <div>
                                <span class="text-xs font-bold text-slate-700">${item.title}</span>
                                <p class="text-[10px] text-slate-400">${item.timestamp} | ${item.topic}</p>
                            </div>
                            <div class="flex gap-2">
                                <label class="cursor-pointer w-7 h-7 rounded bg-white border border-slate-200 text-slate-500 hover:text-emerald-600 flex items-center justify-center" title="Unggah Gambar">
                                    <i class="fa-solid fa-image"></i>
                                    <input type="file" class="hidden" accept="image/*" onchange="handleImageUpload(event, '${item.id}')">
                                </label>
                                <button onclick="deleteSaved('${item.id}')" class="w-7 h-7 rounded bg-white border border-slate-200 text-slate-500 hover:text-red-500 flex items-center justify-center" title="Hapus">
                                    <i class="fa-solid fa-trash"></i>
                                </button>
                            </div>
                        </div>
                        <div class="p-4 flex-1 flex flex-col md:flex-row gap-4">
                            <div class="flex-1 overflow-x-auto max-h-48 relative group">
                                <pre class="text-xs text-slate-600 font-mono whitespace-pre-wrap">${item.content}</pre>
                                <button onclick="navigator.clipboard.writeText(\`${item.content.replace(/`/g, '\\`')}\`); showToast('Teks dicopy!');" class="absolute top-2 right-2 px-3 py-1 bg-white border border-slate-200 text-xs font-bold text-emerald-600 rounded opacity-0 group-hover:opacity-100 transition-opacity shadow-sm">COPY TEKS</button>
                            </div>
                            ${item.image ? `<div class="w-full md:w-1/3 bg-slate-100 rounded-lg flex items-center justify-center p-2 border border-slate-200"><img src="${item.image}" class="max-w-full max-h-48 object-contain rounded" alt="Saved Preview"></div>` : ''}
                        </div>
                    </div>`;
                } else if (item.type === 'bundle') {
                    const bundleAccId = 'acc-bundle-' + item.id;
                    const bundleIconId = 'icon-bundle-' + item.id;
                    
                    let innerBlocks = '';
                    let fullBundleText = '';
                    item.blocks.forEach((blk, idx) => {
                        fullBundleText += blk.content + '\n\n';
                        innerBlocks += `
                            <div class="border border-slate-200 rounded-lg overflow-hidden mb-3">
                                <div class="bg-slate-100 px-3 py-1.5 text-[11px] font-bold text-slate-600 border-b border-slate-200 flex justify-between">
                                    ${blk.title}
                                    <button onclick="navigator.clipboard.writeText(\`${blk.content.replace(/`/g, '\\`')}\`); showToast('Block dicopy!');" class="text-emerald-600 hover:text-emerald-800"><i class="fa-regular fa-copy"></i></button>
                                </div>
                                <div class="p-3 bg-white max-h-32 overflow-y-auto">
                                    <pre class="text-[10px] text-slate-600 font-mono whitespace-pre-wrap">${blk.content}</pre>
                                </div>
                            </div>
                        `;
                    });

                    html = `
                    <div class="bg-white border border-slate-200 rounded-xl overflow-hidden shadow-sm">
                        <div class="bg-emerald-50/50 border-b border-slate-200 px-4 py-3 flex justify-between items-center cursor-pointer hover:bg-emerald-50" onclick="toggleAccordion('${bundleAccId}', '${bundleIconId}')">
                            <div>
                                <span class="text-xs font-bold text-emerald-800 flex items-center gap-2"><i class="fa-solid fa-layer-group"></i> GROUP SAVED: ${item.topic}</span>
                                <p class="text-[10px] text-slate-500">${item.timestamp} | ${item.blocks.length} Blocks</p>
                            </div>
                            <div class="flex items-center gap-3">
                                <button onclick="event.stopPropagation(); navigator.clipboard.writeText(\`${fullBundleText.replace(/`/g, '\\`')}\`); showToast('Seluruh grup dicopy!');" class="px-3 py-1 bg-white border border-slate-200 text-[10px] font-bold text-emerald-600 rounded hover:bg-emerald-50">COPY ALL GROUP</button>
                                <label onclick="event.stopPropagation();" class="cursor-pointer w-7 h-7 rounded bg-white border border-slate-200 text-slate-500 hover:text-emerald-600 flex items-center justify-center">
                                    <i class="fa-solid fa-image"></i>
                                    <input type="file" class="hidden" accept="image/*" onchange="handleImageUpload(event, '${item.id}')">
                                </label>
                                <button onclick="event.stopPropagation(); deleteSaved('${item.id}')" class="w-7 h-7 rounded bg-white border border-slate-200 text-slate-500 hover:text-red-500 flex items-center justify-center">
                                    <i class="fa-solid fa-trash"></i>
                                </button>
                                <i id="${bundleIconId}" class="fa-solid fa-chevron-up text-slate-400 transition-transform duration-300"></i>
                            </div>
                        </div>
                        <div id="${bundleAccId}" class="accordion-content px-4 bg-slate-50">
                            <div class="py-4 flex flex-col md:flex-row gap-4">
                                <div class="flex-1">
                                    ${innerBlocks}
                                </div>
                                ${item.image ? `<div class="w-full md:w-1/3 bg-slate-100 rounded-lg flex items-center justify-center p-2 border border-slate-200 self-start"><img src="${item.image}" class="max-w-full h-auto object-contain rounded" alt="Saved Preview"></div>` : ''}
                            </div>
                        </div>
                    </div>`;
                }
                container.innerHTML += html;
            });
        }

        function handleImageUpload(event, id) {
            const file = event.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const targetIdx = savedData.findIndex(d => d.id === id);
                if(targetIdx > -1) {
                    savedData[targetIdx].image = e.target.result;
                    saveToLocalStorage();
                    renderSavedBlocks();
                    showToast("Gambar berhasil diunggah dan disimpan lokal.");
                }
            };
            reader.readAsDataURL(file);
        }

        function deleteSaved(id) {
            if(confirm('Yakin ingin menghapus item ini?')) {
                savedData = savedData.filter(d => d.id !== id);
                saveToLocalStorage();
                renderSavedBlocks();
                showToast("Item berhasil dihapus.");
            }
        }

        function exportJSON() {
            if(savedData.length === 0) {
                showToast("Tidak ada data untuk dieksport.");
                return;
            }
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(savedData, null, 2));
            const dlAnchorElem = document.createElement('a');
            dlAnchorElem.setAttribute("href", dataStr);
            dlAnchorElem.setAttribute("download", "nomuka_saved_data.json");
            dlAnchorElem.click();
            showToast("Data berhasil dieksport.");
        }

        function importJSON(event) {
            const file = event.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const imported = JSON.parse(e.target.result);
                    if(Array.isArray(imported)) {
                        savedData = [...savedData, ...imported];
                        saveToLocalStorage();
                        renderSavedBlocks();
                        showToast("Data berhasil diimport dan digabungkan.");
                    } else {
                        showToast("Format JSON tidak valid.");
                    }
                } catch(err) {
                    showToast("Error parsing JSON file.");
                }
            };
            reader.readAsText(file);
            event.target.value = ''; // reset input
        }
    </script>
</body>
</html>
