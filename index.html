<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IMAVISUAL (Deepin Accordion Edition)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/alpinejs/3.13.5/cdn.min.js" defer></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');
        
        body {
            font-family: 'Nunito', sans-serif;
            background-image: url('https://images.unsplash.com/photo-1478760329108-5c3ed9d495a0?q=80&w=2574&auto=format&fit=crop'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        /* Glassmorphism Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.05); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { 
            background: rgba(255, 255, 255, 0.25); 
            border-radius: 10px; border: 2px solid transparent; background-clip: padding-box; 
        }
        ::-webkit-scrollbar-thumb:hover { 
            background: rgba(255, 255, 255, 0.45); 
            border: 2px solid transparent; background-clip: padding-box; 
        }

        /* Deepin Premium Blur & Glass Utilities */
        .deepin-glass {
            background: rgba(255, 255, 255, 0.82);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.45);
        }

        .deepin-card-glass {
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .deepin-card-glass:hover {
            background: rgba(255, 255, 255, 0.7);
            border-color: rgba(56, 189, 248, 0.4);
        }
        
        .deepin-input {
            background: rgba(248, 250, 252, 0.6);
            border: 1px solid rgba(203, 213, 225, 0.6);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .deepin-input:focus {
            background: rgba(255, 255, 255, 0.95);
            box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.25);
            border-color: #38bdf8;
        }

        /* Custom Keyframes and Hide Arrows */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-6px); }
            100% { transform: translateY(0px); }
        }
        .animate-float { animation: float 6s ease-in-out infinite; }
        
        .accordion-content { transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease; }

        .hide-arrows::-webkit-inner-spin-button, .hide-arrows::-webkit-outer-spin-button { 
            -webkit-appearance: none; margin: 0; 
        }
        .hide-arrows { -moz-appearance: textfield; }
    </style>
</head>

<body class="min-h-screen w-full flex items-center justify-center p-2 sm:p-4 md:p-6 lg:p-8 text-slate-800">

    <div x-data="appData()" x-init="init()" class="w-full max-w-4xl lg:max-w-5xl h-[98vh] sm:h-[92vh] flex flex-col deepin-glass rounded-[24px] sm:rounded-[32px] shadow-2xl overflow-hidden relative border border-white/50 transition-all duration-300">
        
        <!-- Header (Window Title Bar) -->
        <header class="flex-none px-5 sm:px-6 py-4 sm:py-5 flex items-center justify-between z-10 border-b border-slate-200/50 bg-white/20">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 sm:w-11 sm:h-11 rounded-xl sm:rounded-2xl bg-gradient-to-br from-blue-600 to-cyan-400 flex items-center justify-center shadow-lg shadow-blue-500/20 text-white animate-float">
                    <i class="fas fa-palette text-lg sm:text-xl"></i>
                </div>
                <div>
                    <h1 class="text-lg sm:text-xl font-black tracking-tight text-slate-800">IMAVISUAL</h1>
                    <p class="text-[9px] sm:text-[10px] font-extrabold text-blue-600 uppercase tracking-widest flex items-center gap-1">
                        <span class="inline-block w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span>
                        Carousel Prompt Pro
                    </p>
                </div>
            </div>
            <!-- Window Control Simulations -->
            <div class="flex gap-1.5 sm:gap-2 bg-slate-200/50 px-2 sm:px-3 py-1.5 rounded-full">
                <div class="w-2.5 h-2.5 rounded-full bg-rose-400 cursor-pointer hover:scale-110 transition-transform"></div>
                <div class="w-2.5 h-2.5 rounded-full bg-amber-400 cursor-pointer hover:scale-110 transition-transform"></div>
                <div class="w-2.5 h-2.5 rounded-full bg-emerald-400 cursor-pointer hover:scale-110 transition-transform"></div>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto px-4 sm:px-6 md:px-8 py-5 sm:py-6 z-10 space-y-4">
            
            <!-- Global Feedback Notification Toast -->
            <div x-show="feedbackMessage" 
                 x-transition:enter="transition ease-out duration-300"
                 x-transition:enter-start="opacity-0 translate-y-2 scale-95"
                 x-transition:enter-end="opacity-100 translate-y-0 scale-100"
                 x-transition:leave="transition ease-in duration-200"
                 x-transition:leave-start="opacity-100 translate-y-0 scale-100"
                 x-transition:leave-end="opacity-0 translate-y-2 scale-95"
                 class="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 pointer-events-none w-[90%] sm:w-auto text-center">
                <div class="inline-flex px-5 py-3 rounded-2xl text-xs font-bold shadow-2xl items-center gap-2 border"
                     :class="feedbackType === 'success' ? 'bg-emerald-600 text-white border-emerald-500' : 'bg-slate-800 text-white border-slate-700'">
                    <i class="fas" :class="feedbackType === 'success' ? 'fa-check-circle' : 'fa-info-circle'"></i>
                    <span x-text="feedbackMessage"></span>
                </div>
            </div>

            <!-- 1. KARTU INPUT -->
            <div class="rounded-2xl overflow-hidden deepin-card-glass shadow-sm">
                <button @click="toggleAccordion('input')" class="w-full px-5 py-4 flex items-center justify-between text-left font-bold text-slate-700 focus:outline-none bg-white/30 hover:bg-white/50 transition-colors">
                    <div class="flex items-center gap-3">
                        <div class="w-8 h-8 rounded-lg bg-indigo-500 text-white flex items-center justify-center shadow-md">
                            <i class="fas fa-lightbulb"></i>
                        </div>
                        <div>
                            <span class="text-sm font-extrabold uppercase tracking-wide">1. Kartu Input</span>
                            <p class="text-[10px] text-slate-500 font-semibold">Ruang ide, topik poster, dan referensi visual</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-2">
                        <span x-show="topic" class="text-[9px] bg-indigo-100 text-indigo-700 px-2.5 py-0.5 rounded-full font-bold hidden sm:inline-block">Ide Terisi</span>
                        <i class="fas fa-chevron-down text-xs text-slate-400 transition-transform duration-300" :class="{'rotate-180': accordions.input}"></i>
                    </div>
                </button>

                <div x-show="accordions.input" x-collapse class="p-4 sm:p-5 border-t border-slate-100/50 space-y-4 bg-white/20">
                    <div>
                        <label class="block text-xs font-black text-slate-600 uppercase tracking-wide mb-2">Topik & Konten Utama Carousel</label>
                        <div class="relative group">
                            <textarea x-model="topic" placeholder="Tulis topik Carousel Anda di sini (Atau paste Draft Teks Lengkap Anda)..." class="w-full p-4 rounded-xl deepin-input outline-none text-xs h-32 resize-none text-slate-700 font-bold placeholder-slate-400 custom-scrollbar"></textarea>
                            <button x-show="topic" @click="topic = ''" class="absolute top-3 right-3 text-slate-400 hover:text-rose-500 hover:bg-rose-50 p-1.5 rounded-full transition-all" title="Hapus Teks">
                                <i class="fas fa-times text-xs"></i>
                            </button>
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs font-black text-slate-600 uppercase tracking-wide mb-2">Instruksi Tambahan (Opsional)</label>
                        <div class="relative group">
                            <textarea x-model="additionalInstructions" placeholder="Contoh: Tambahkan ornamen awan, suasana ceria..." class="w-full p-4 rounded-xl deepin-input outline-none text-xs h-16 resize-none text-slate-700 font-bold placeholder-slate-400 custom-scrollbar"></textarea>
                            <button x-show="additionalInstructions" @click="additionalInstructions = ''" class="absolute top-3 right-3 text-slate-400 hover:text-rose-500 hover:bg-rose-50 p-1.5 rounded-full transition-all">
                                <i class="fas fa-times text-xs"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 2. KARTU SETTING -->
            <div class="rounded-2xl overflow-hidden deepin-card-glass shadow-sm">
                <button @click="toggleAccordion('settings')" class="w-full px-5 py-4 flex items-center justify-between text-left font-bold text-slate-700 focus:outline-none bg-white/30 hover:bg-white/50 transition-colors">
                    <div class="flex items-center gap-3">
                        <div class="w-8 h-8 rounded-lg bg-sky-500 text-white flex items-center justify-center shadow-md">
                            <i class="fas fa-cog"></i>
                        </div>
                        <div>
                            <span class="text-sm font-extrabold uppercase tracking-wide">2. Kartu Setting</span>
                            <p class="text-[10px] text-slate-500 font-semibold">Sesuaikan gaya, font, karakter & jumlah slide</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-2">
                        <i class="fas fa-chevron-down text-xs text-slate-400 transition-transform duration-300" :class="{'rotate-180': accordions.settings}"></i>
                    </div>
                </button>

                <div x-show="accordions.settings" x-collapse class="p-4 sm:p-5 border-t border-slate-100/50 space-y-4 bg-white/20">
                    
                    <!-- Quick Actions -->
                    <div class="flex flex-col sm:flex-row gap-3 pb-2">
                        <button @click="autoDetectOptions()" class="flex-1 bg-gradient-to-r from-blue-500 to-cyan-500 hover:from-blue-600 hover:to-cyan-600 text-white py-2.5 px-4 rounded-xl text-xs font-black shadow-md transition-all active:scale-95 flex items-center justify-center gap-2">
                            <i class="fas fa-magic"></i> Auto-Set via Topik
                        </button>
                        <button @click="resetOptions()" class="w-full sm:w-auto bg-white hover:bg-slate-50 text-slate-600 py-2.5 px-5 rounded-xl text-xs font-black shadow-sm border border-slate-200 transition-all active:scale-95 flex items-center justify-center gap-2">
                            <i class="fas fa-rotate-left"></i> Reset Opsi
                        </button>
                    </div>

                    <!-- Unlimited Slide Stepper -->
                    <div class="flex flex-col sm:flex-row items-start sm:items-center justify-between p-4 bg-white/40 rounded-xl border border-slate-200/60 shadow-sm gap-3">
                        <div>
                            <p class="font-extrabold text-xs text-slate-800 uppercase tracking-wide">Jumlah Slide Carousel</p>
                            <p class="text-[10px] text-slate-500 font-bold mt-0.5">Tidak dibatasi, ketik atau gunakan tombol +/-</p>
                        </div>
                        <div class="flex items-center gap-2 bg-slate-100/80 p-1.5 rounded-xl border border-slate-200/50 w-full sm:w-auto justify-center sm:justify-start">
                            <button @click="if(numSlides > 1) numSlides--" class="w-9 h-9 rounded-lg bg-white text-slate-600 shadow-sm hover:text-blue-600 flex items-center justify-center transition-colors">
                                <i class="fas fa-minus text-xs"></i>
                            </button>
                            <input type="number" x-model.number="numSlides" min="1" class="font-black text-base w-14 text-center text-slate-800 bg-transparent outline-none hide-arrows focus:bg-white focus:rounded-md transition-colors">
                            <button @click="numSlides++" class="w-9 h-9 rounded-lg bg-white text-slate-600 shadow-sm hover:text-blue-600 flex items-center justify-center transition-colors">
                                <i class="fas fa-plus text-xs"></i>
                            </button>
                        </div>
                    </div>

                    <!-- Options Fields Grid -->
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        
                        <!-- ART STYLE -->
                        <div class="col-span-1 md:col-span-2">
                            <label class="block text-xs font-black text-slate-600 uppercase tracking-wide mb-1.5 flex justify-between items-center">
                                <span>Gaya Seni (Art Style)</span>
                                <span x-show="artStyle === 'custom'" class="text-[9px] bg-amber-100 text-amber-700 px-2 py-0.5 rounded-full font-bold">Kustom</span>
                            </label>
                            <div class="relative">
                                <select x-model="artStyle" class="w-full p-3 pl-4 pr-10 rounded-xl deepin-input outline-none text-xs appearance-none cursor-pointer text-slate-700 font-extrabold">
                                    <option value="auto">✨ Auto / Default (Layered Papercut)</option>
                                    <option value="custom">✏️ Kustom (Ketik Manual)</option>
                                    <option value="layered_papercut">✂️ 1. Layered Papercut</option>
                                    <option value="paper_cut_diorama">🎭 2. 3D Paper Cut Diorama</option>
                                    <option value="papercraft_3d">📦 3. 3D Papercraft</option>
                                    <option value="islamic_papercraft">🕌 4. Islamic 3D Papercraft</option>
                                    <option value="low_poly_3d">💎 5. Low Poly 3D</option>
                                    <option value="isometric_papercraft_lowpoly">📐 6. 3D Isometric Papercraft Low Poly</option>
                                    <option value="origami_art">🦢 7. Origami Art</option>
                                    <option value="vintage_storybook">📖 8. Vintage Storybook</option>
                                    <option value="cutaway_illustration">🏗️ 9. Cutaway Illustration</option>
                                    <option value="voxel_art">🧱 10. Voxel Art</option>
                                    <option value="knit_crochet">🧶 11. Premium Knit & Crochet 3D</option>
                                    <option value="needle_felting">🪡 12. Premium Needle Felting 3D</option>
                                    <option value="quilted_patchwork">🧵 13. Premium Quilted Patchwork 3D</option>
                                    <option value="whimsical_doodle">✒️ 14. Ink & Watercolor Whimsical Doodle</option>
                                    <option value="studygram_journal">📓 15. Studygram Digital Journaling</option>
                                    <option value="watercolor_ink">🎨 16. Watercolor & Ink Illustration</option>
                                    <option value="wimmelbilderbuch">🏘️ 17. Wimmelbilderbuch (Teeming Picture Book)</option>
                                    <option value="comic_studio">🗯️ 18. Comic Studio (Islamic Comic)</option>
                                    <option value="grunge_streetwear">🛹 19. Grunge Streetwear Collage</option>
                                    <option value="pixar_3d">🎬 20. Pixar Inspired 3D Animation</option>
                                </select>
                                <div class="absolute right-4 top-1/2 transform -translate-y-1/2 text-slate-400 pointer-events-none text-xs"><i class="fas fa-chevron-down"></i></div>
                            </div>
                            <div x-show="artStyle === 'custom'" class="mt-2" x-transition>
                                <textarea x-model="customArtStyle" rows="3" placeholder="Ketik deskripsi art style di sini..." class="w-full p-3 rounded-xl bg-amber-50/50 border border-amber-200 text-slate-700 text-xs focus:border-amber-400 outline-none resize-none deepin-input font-bold custom-scrollbar"></textarea>
                            </div>
                        </div>

                        <!-- TYPOGRAPHY -->
                        <div class="col-span-1 md:col-span-2">
                            <label class="block text-xs font-black text-slate-600 uppercase tracking-wide mb-1.5 flex justify-between items-center">
                                <span>Tipografi (Font DNA)</span>
                                <span x-show="typographyChoice === 'custom'" class="text-[9px] bg-amber-100 text-amber-700 px-2 py-0.5 rounded-full font-bold">Kustom</span>
                            </label>
                            <div class="relative">
                                <select x-model="typographyChoice" class="w-full p-3 pl-4 pr-10 rounded-xl deepin-input outline-none text-xs appearance-none cursor-pointer text-slate-700 font-extrabold">
                                    <option value="auto">✨ Auto / Pilih Acak Sesuai Style</option>
                                    <option value="custom">✏️ Kustom (Ketik Manual)</option>
                                    <template x-for="(font, index) in typographyDNA" :key="index">
                                        <option :value="index" x-text="`${index + 1}. ${font.name}`"></option>
                                    </template>
                                </select>
                                <div class="absolute right-4 top-1/2 transform -translate-y-1/2 text-slate-400 pointer-events-none text-xs"><i class="fas fa-chevron-down"></i></div>
                            </div>
                            <div x-show="typographyChoice === 'custom'" class="mt-2" x-transition>
                                <textarea x-model="customTypography" rows="2" placeholder="Contoh: Bold uppercase vintage serif dengan efek deboss..." class="w-full p-3 rounded-xl bg-amber-50/50 border border-amber-200 text-slate-700 text-xs focus:border-amber-400 outline-none resize-none deepin-input font-bold custom-scrollbar"></textarea>
                            </div>
                        </div>

                        <!-- CHARACTER TYPE -->
                        <div>
                            <label class="block text-xs font-black text-slate-600 uppercase mb-1.5 pl-1 flex justify-between items-center">
                                <span>Karakter</span>
                                <span x-show="characterType === 'custom'" class="text-[9px] bg-amber-100 text-amber-700 px-2 py-0.5 rounded-full font-bold">Kustom</span>
                            </label>
                            <div class="relative">
                                <select x-model="characterType" class="w-full p-3 pl-4 rounded-xl deepin-input text-xs appearance-none cursor-pointer text-slate-700 font-extrabold outline-none" :class="{'border-blue-400 bg-blue-50/50': autoDetected.character}">
                                    <option value="random">🎲 Menyesuaikan Konteks Narasi</option>
                                    <option value="male">👨 Laki-laki Dewasa</option>
                                    <option value="female">🧕 Perempuan Dewasa (Hijab & Rok)</option>
                                    <option value="couple">👫 Pasangan Suami Istri</option>
                                    <option value="boy">👦 Anak Laki-laki</option>
                                    <option value="girl">👧 Anak Perempuan</option>
                                    <option value="custom">✏️ Kustom (Ketik Spesifik)</option>
                                </select>
                                <div class="absolute right-4 top-1/2 transform -translate-y-1/2 text-slate-400 pointer-events-none text-xs"><i class="fas fa-chevron-down"></i></div>
                            </div>
                            <div x-show="characterType === 'custom'" class="mt-2" x-transition>
                                <input x-model="customCharacter" type="text" placeholder="Contoh: Pria rambut ikal korea, kacamata kuning, celana cingkrang..." class="w-full p-3 rounded-xl bg-amber-50/50 border border-amber-200 text-slate-700 text-xs focus:border-amber-400 outline-none deepin-input font-bold">
                            </div>
                        </div>

                        <!-- PALETTE -->
                        <div>
                            <label class="block text-xs font-black text-slate-600 uppercase mb-1.5 pl-1 flex justify-between items-center">
                                <span>Palet Warna</span>
                                <span x-show="colorPalette === 'custom'" class="text-[9px] bg-amber-100 text-amber-700 px-2 py-0.5 rounded-full font-bold">Kustom</span>
                            </label>
                            <div class="relative">
                                <select x-model="colorPalette" class="w-full p-3 pl-4 rounded-xl deepin-input text-xs appearance-none cursor-pointer text-slate-700 font-extrabold outline-none" :class="{'border-blue-400 bg-blue-50/50': autoDetected.palette}">
                                    <option value="auto">🎨 Auto / Sesuai Topik</option>
                                    <option value="earth">🍂 Earth (Terracotta, Sage, Beige)</option>
                                    <option value="pastel">🌸 Pastel (Lembut, Soft, Imut)</option>
                                    <option value="monochrome">⚫ Monochrome (Hitam, Abu, Putih)</option>
                                    <option value="warm">☀️ Warm (Hangat, Jingga, Emas)</option>
                                    <option value="cool">❄️ Cool (Damai, Biru, Toska)</option>
                                    <option value="custom">✏️ Kustom Warna</option>
                                </select>
                                <div class="absolute right-4 top-1/2 transform -translate-y-1/2 text-slate-400 pointer-events-none text-xs"><i class="fas fa-chevron-down"></i></div>
                            </div>
                            <div x-show="colorPalette === 'custom'" class="mt-2" x-transition>
                                <input x-model="customPalette" type="text" placeholder="Contoh: Navy Blue & Gold..." class="w-full p-3 rounded-xl bg-amber-50/50 border border-amber-200 text-slate-700 text-xs focus:border-amber-400 outline-none deepin-input font-bold">
                            </div>
                        </div>

                        <!-- STRUCTURE -->
                        <div>
                            <label class="block text-xs font-black text-slate-600 uppercase mb-1.5 pl-1 flex justify-between items-center">
                                <span>Layout / Struktur</span>
                                <span x-show="structure === 'custom'" class="text-[9px] bg-amber-100 text-amber-700 px-2 py-0.5 rounded-full font-bold">Kustom</span>
                            </label>
                            <div class="relative">
                                <select x-model="structure" class="w-full p-3 pl-4 rounded-xl deepin-input text-xs appearance-none cursor-pointer text-slate-700 font-extrabold outline-none" :class="{'border-blue-400 bg-blue-50/50': autoDetected.structure}">
                                    <option value="auto">🤖 Auto Select</option>
                                    <option value="staircase">🪜 Staircase (Tahapan)</option>
                                    <option value="flowchart">➡️ Flowchart (Proses)</option>
                                    <option value="mindmap">🧠 Mind Map (Kategori)</option>
                                    <option value="grid">🔲 Grid / Flashcards (List)</option>
                                    <option value="comparison">⚖️ Comparison (Perbandingan)</option>
                                    <option value="vocabulary">📖 Kosakata / Mufradat</option>
                                    <option value="custom">✏️ Kustom Layout</option>
                                </select>
                                <div class="absolute right-4 top-1/2 transform -translate-y-1/2 text-slate-400 pointer-events-none text-xs"><i class="fas fa-chevron-down"></i></div>
                            </div>
                            <div x-show="structure === 'custom'" class="mt-2" x-transition>
                                <input x-model="customStructure" type="text" placeholder="Ketik jenis struktur sendiri..." class="w-full p-3 rounded-xl bg-amber-50/50 border border-amber-200 text-slate-700 text-xs focus:border-amber-400 outline-none deepin-input font-bold">
                            </div>
                        </div>

                        <!-- ASPECT RATIO -->
                        <div>
                            <label class="block text-xs font-black text-slate-600 uppercase mb-1.5 pl-1 flex justify-between items-center">
                                <span>Rasio Dimensi</span>
                                <span x-show="aspectRatio === 'custom'" class="text-[9px] bg-amber-100 text-amber-700 px-2 py-0.5 rounded-full font-bold">Kustom</span>
                            </label>
                            <div class="relative">
                                <select x-model="aspectRatio" class="w-full p-3 pl-4 rounded-xl deepin-input text-xs appearance-none cursor-pointer text-slate-700 font-extrabold outline-none">
                                    <option value="4:5">📱 4:5 (Carousel / Instagram)</option>
                                    <option value="3:4">🖼️ 3:4 (Portrait)</option>
                                    <option value="1:1">🟦 1:1 (Square Feed)</option>
                                    <option value="9:16">📲 9:16 (Story / Reels)</option>
                                    <option value="16:9">💻 16:9 (Landscape / Slide)</option>
                                    <option value="custom">✏️ Kustom Rasio</option>
                                </select>
                                <div class="absolute right-4 top-1/2 transform -translate-y-1/2 text-slate-400 pointer-events-none text-xs"><i class="fas fa-chevron-down"></i></div>
                            </div>
                            <div x-show="aspectRatio === 'custom'" class="mt-2" x-transition>

                    else if (text.match(/pria|laki|bapak|ayah|abi|suami|pemuda|ikhwan|imam|jenggot|jumatan/)) this.characterType = 'male';
                    else if (text.match(/anak laki|putra|bocah|bermain/)) this.characterType = 'boy';
                    else if (text.match(/anak perempuan|putri|balita/)) this.characterType = 'girl';
                    else { this.characterType = 'random'; this.autoDetected.character = false; }

                    this.autoDetected.palette = true;
                    if (text.match(/alam|bumi|tanah|kayu|natural|pohon|gunung|hutan|desa|coklat|krem|hijau/)) this.colorPalette = 'earth';
                    else if (text.match(/anak|bayi|lucu|lembut|soft|imut|manis|kasih sayang|pink|biru muda/)) this.colorPalette = 'pastel';
                    else if (text.match(/minimalis|simpel|sederhana|tegas|prinsip|kematian|kubur|hitam|putih|abu/)) this.colorPalette = 'monochrome';
                    else if (text.match(/panas|api|neraka|semangat|senja|marah|bahaya|dosa|peringatan|matahari|emas/)) this.colorPalette = 'warm';
                    else if (text.match(/sejuk|dingin|air|laut|langit|salju|tenang|damai|sabar|surga|wudhu|es|biru/)) this.colorPalette = 'cool';
                    else { this.colorPalette = 'auto'; this.autoDetected.palette = false; }
                    
                    this.showFeedback("Opsi otomatis disesuaikan berdasarkan teks!", "success");
                    this.accordions.settings = true;
                },

                resetOptions() {
                    this.structure = 'auto'; this.aspectRatio = '3:4'; this.colorPalette = 'auto';
                    this.characterType = 'random'; this.customCharacter = ''; this.customStructure = '';
                    this.customRatio = ''; this.customPalette = ''; this.artStyle = 'auto'; this.customArtStyle = '';
                    this.typographyChoice = 'auto'; this.customTypography = '';
                    this.credit = ''; this.socialMediaLogos = 'instagram, threads'; this.numSlides = 7;
                    this.autoDetected = { structure: false, character: false, palette: false };
                    this.showFeedback("Opsi dikembalikan ke bawaan.", "neutral");
                },

                generateCarouselPrompts() {
                    if (!this.topic) {
                        this.showFeedback("Mohon isi topik utama di Kartu Input terlebih dahulu!", "neutral");
                        this.accordions.input = true; return;
                    }
                    this.generatedCards = []; 

                    // 1. Process Logo & Footer (Customizable)
                    let logoString = "";
                    if (this.socialMediaLogos && this.socialMediaLogos.trim() !== "") {
                        const logos = this.socialMediaLogos.split(',').map(l => l.trim()).filter(l => l);
                        logoString = logos.map(l => `[minimalist monochrome vector ${l.toLowerCase()} logo icon]`).join(' ');
                    }
                    let handle = this.credit.trim();
                    if (handle && !handle.startsWith('@')) handle = '@' + handle;
                    let footerString = logoString || handle ? `${logoString} ${handle}`.trim() : "[TANPA FOOTER]";

                    let isPosterMode = this.numSlides === 1;
                    let contentType = isPosterMode ? "Poster" : "Carousel";
                    let footerSuffix = isPosterMode ? "" : ` | 1/${this.numSlides}`;

                    // 2. Formatting Configurations (Art Style)
                    let styleDesc = this.artStyle === 'custom' ? (this.customArtStyle || "Custom Style") : (this.styleDefinitions[this.artStyle] || this.styleDefinitions['layered_papercut']);
                    let styleTitle = this.artStyle === 'custom' ? "Custom Style" : this.artStyle.toUpperCase();
                    
                    // 3. Formatting Configurations (Typography)
                    let typoDesc = ""; let typoName = "";
                    if (this.typographyChoice === 'custom') {
                        typoName = "Custom Font"; typoDesc = this.customTypography || "Custom Typography";
                    } else if (this.typographyChoice === 'auto') {
                        let randIndex = Math.floor(Math.random() * this.typographyDNA.length);
                        typoName = `FONT ${randIndex + 1}. ${this.typographyDNA[randIndex].name}`; 
                        typoDesc = this.typographyDNA[randIndex].desc;
                    } else {
                        typoName = `FONT ${parseInt(this.typographyChoice) + 1}. ${this.typographyDNA[this.typographyChoice].name}`; 
                        typoDesc = this.typographyDNA[this.typographyChoice].desc;
                    }

                    // 4. Color & Ratio
                    let colorInstr = this.colorPalette === 'custom' ? this.customPalette : (this.colorPalette !== 'auto' ? this.colorPalette : "Terracotta, Sage Green, Warm Beige");
                    let ratioText = this.aspectRatio === 'custom' ? this.customRatio : this.aspectRatio;

                    // 5. THE FIX: Aggressive Custom Character Logic
                    let characterRuleText = "";
                    if (this.characterType === 'custom') {
                        characterRuleText = `* KUSTOM: HANYA GUNAKAN DESKRIPSI KARAKTER INI JIKA MUNCUL: "${this.customCharacter}".\n* (Abaikan aturan pria casual atau gamis jika bertentangan dengan deskripsi kustom ini. Ikuti kustom user sepenuhnya!)`;
                    } else if (this.characterType === 'couple') {
                        characterRuleText = `* MC PRIA: Pakaian casual/modest rapi (kemeja/hoodie/jaket), bukan photorealistic.\n* MC WANITA: Wajib memakai setelan gamis lebar dan longgar, khimar menutupi bahu hingga lengan, kaki tertutupi rok.\n* KARAKTER: Pasangan Suami Istri (Interaksi respectful).`;
                    } else if (this.characterType === 'female') {
                        characterRuleText = `* MC WANITA: WAJIB memakai setelan gamis lebar dan longgar, khimar menutupi bahu hingga lengan, kaki tertutupi rok. Bukan photorealistic.`;
                    } else if (this.characterType === 'male') {
                         characterRuleText = `* MC PRIA: Pakaian casual/modest rapi, bukan photorealistic.`;
                    } else if (this.characterType === 'boy' || this.characterType === 'girl') {
                         characterRuleText = `* KARAKTER: Anak-anak (${this.characterType}). Pakaian sopan tertutup. Bukan photorealistic.`;
                    } else {
                        characterRuleText = `* MC WANITA: Jika wanita, WAJIB gamis lebar, khimar menutup bahu/lengan, rok menutup kaki.\n* MC PRIA: Casual/modest.`;
                    }

                    // Card 1: Master Configuration & System Prompt
                    let card1Content = `Bertindaklah sebagai AI Islamic Content Strategist & Visual Architect. Buat Naskah ${contentType} dan Visual Guide (sebanyak ${this.numSlides} Slide) berdasarkan instruksi ketat berikut!\n\n`;
                    card1Content += `== TESTING ==\n\n[Card 1]\n=== GLOBAL CONFIGURATION & SLIDE 1 ===\n\n`;
                    card1Content += `[GLOBAL CONFIGURATION]\n`;
                    card1Content += `- Aspect Ratio: ${ratioText}\n`;
                    card1Content += `- Safe Margin: Top 100 px, Bottom 100 px, Left 100 px, Right 100 px\n`;
                    card1Content += `- Style Art: ${styleTitle} (${styleDesc})\n`;
                    card1Content += `- Color Palette: ${colorInstr} (Bright yet eye-catching, comfortable for the eyes, vibrant and lively background environment)\n`;
                    card1Content += `- Typography: ${typoName} (${typoDesc})\n`;
                    card1Content += `- Main Character Detail: ${characterRuleText}\n`;
                    card1Content += `- General Visual Constraints: STRICT ANICONISM. All humans, figures, NPCs, animals, or dolls MUST BE FACELESS WITH NO EYES. Absolute prohibition on living beings displayed in wall photo frames or paintings. No music elements, no dating, no gold for men. NO ARABIC TEXT. No text mentioning "Feynman".\n\n`;
                    card1Content += `---------------------------------------------------\n\n`;
                    
                    card1Content += `[SPECS]\n`;
                    card1Content += `- Aspect Ratio: ${ratioText}\n`;
                    card1Content += `- Typography: ${typoName} (Center-aligned for Slide 1 Cover)\n`;
                    card1Content += `- Visual Constraint: MANDATORY FACELESS NO EYES for all figures. No Arabic text. No "Feynman".\n`;
                    card1Content += `- Footer: ${footerString}${footerSuffix}\n\n`;
                    
                    card1Content += `[VISUAL GUIDE]\n`;
                    card1Content += `- Composition: High-impact central focus serving as a powerful visual curiosity hook.\n`;
                    card1Content += `- Characters: [TUGAS AI: Tentukan secara cerdas apakah Slide 1 ini butuh karakter atau hanya metafora benda besar yang estetik. Jika manusia muncul, WAJIB faceless no eyes.]\n`;
                    card1Content += `- Storytelling: [TUGAS AI: Buat deskripsi objek/metafora yang memancing penasaran untuk Cover.]\n\n`;

                    card1Content += `[GEN_AI PROMPT]\n`;
                    card1Content += `[TUGAS AI: Tulis prompt DALL-E bahasa Inggris 8K. WAJIB sertakan: "Seamless integrated negative space for text placement, strictly NO solid white boxes or plain white borders, [Tentukan Angle Kamera Wide/Close]"]\n\n`;

                    card1Content += `[NASKAH]\n`;
                    card1Content += `- HEADER: [TUGAS AI: Buat Judul Hook Copywriting di sini (Gunakan teks draft user jika ada)]\n`;
                    card1Content += `- SUB HEADER: Tanpa Sub Header\n`;
                    card1Content += `- FOOTER: ${footerString}${footerSuffix}\n\n`;
                    card1Content += `Make the aspect ratio ${ratioText}\n\n`;
                    
                    // The Rule Engine inside Slide 1
                    card1Content += `---------------------------------------------------\n`;
                    card1Content += `# VERY IMPORTANT RULES ${!isPosterMode ? `FOR SLIDE 2 TO ${this.numSlides}` : ''}\n`;
                    card1Content += `1. JANGAN PERNAH MENYEBUT KATA "FEYNMAN" ATAU "FEYNMAN TECHNIQUE" DI NASKAH, GAMBAR, ATAUPUN CAPTION.\n`;
                    card1Content += `2. DILARANG MENGGUNAKAN TEKS ARAB DI GAMBAR KARENA AI SERING TYPO. GUNAKAN TERJEMAHAN INDONESIA UNTUK DALIL DI TEKS NASKAH. JIKA SANGAT TERPAKSA ADA TEKS ARAB, WAJIB ARAB GUNDUL TANPA HARAKAT.\n`;
                    card1Content += `3. WAJIB DINAMIS: Ubah Angle Kamera (Close up, Wide, High angle, Isometric, dll) di setiap slide agar tidak monoton!\n`;
                    card1Content += `4. ADAPTASI INPUT USER: Jika input berupa draft paragraf lengkap, HANYA pecah menjadi slide dan letakkan di area NASKAH. JANGAN MERANGKUM teks draft tersebut. Jika input hanya topik pendek, barulah kembangkan menjadi konten utuh.\n`;
                    card1Content += `5. SEAMLESS BACKGROUND: Wajib instruksikan DALL-E agar background menyatu dengan teks (Seamless negative space). Dilarang keras menggunakan kotak putih polos (solid white boxes) untuk area teks.\n`;
                    card1Content += `6. KARAKTER FLEKSIBEL & METAFORA VISUAL: Karakter manusia BOLEH dimunculkan JIKA KONTEKS narasi slide tersebut menceritakan interaksi atau perasaan. Namun jika narasi slide murni membahas konsep abstrak (seperti waktu, fondasi, kesabaran), HILANGKAN manusia dan gantikan dengan BENDA METAFORA VISUAL (seperti jam dinding, batu fondasi, jembatan) agar variatif. Jika manusia muncul, WAJIB Faceless No Eyes dan ikuti spesifikasi karakter.\n\n`;
                    
                    card1Content += `TOPIK/DRAFT DARI USER: "${this.topic}"`;

                    this.generatedCards.push({ title: "Card 1 (Global Config & Hook)", content: card1Content });

                    // Looping Cards 2 to N
                    for (let i = 2; i <= this.numSlides; i++) {
                        let cardContent = `[Card ${i}]\n=== SLIDE ${i} ===\n`;
                        cardContent += `[SPECS]\n`;
                        cardContent += `- Aspect Ratio: ${ratioText}\n`;
                        cardContent += `- Typography: ${typoName} (Left-aligned, consistent size)\n`;
                        cardContent += `- Visual Constraint: MANDATORY FACELESS NO EYES for all figures. STRICTLY NO ARABIC TEXT.\n`;
                        cardContent += `- Footer: ${footerString} | ${i}/${this.numSlides}\n\n`;
                        
                        cardContent += `[VISUAL GUIDE]\n`;
                        cardContent += `- Composition: Text aligned seamlessly on one side, visual focus on the other.\n`;
                        cardContent += `- Characters/Metaphor: [TUGAS AI: Tentukan secara cerdas apakah karakter perlu muncul berdasarkan KONTEKS narasi slide ini. Jika muncul, tulis interaksinya (wajib faceless). Jika slide abstrak/konseptual, ganti dengan BENDA METAFORA VISUAL (tanpa karakter).]\n`;
                        cardContent += `- Storytelling: [TUGAS AI: Buat deskripsi visual yang selaras dengan naskah.]\n\n`;

                        cardContent += `[GEN_AI PROMPT]\n`;
                        cardContent += `[TUGAS AI: Tulis prompt DALL-E 8K. WAJIB sertakan: 1) Angle kamera spesifik yang BERBEDA dari slide sebelumnya. 2) "Seamless environmental negative space for text, strictly NO solid white boxes". 3) Jika karakter muncul, PASTIKAN SESUAI DESKRIPSI KUSTOM/STANDAR]\n\n`;

                        cardContent += `[NASKAH]\n`;
                        cardContent += `- HEADER: [TUGAS AI: Tuliskan Sub-judul / Poin]\n`;
                        cardContent += `- DIVIDER: ---------------------------------------------------\n`;
                        cardContent += `- BODY:\n  * [TUGAS AI: Tuliskan narasi poin. Jika input user berupa draft lengkap, JANGAN DIRANGKUM, gunakan teks draft user di sini. Jika input hanya topik, buat teks cerdas baru.]\n`;
                        cardContent += `- FOOTER: ${footerString} | ${i}/${this.numSlides}\n\n`;
                        cardContent += `Make the aspect ratio ${ratioText}`;

                        this.generatedCards.push({ title: `Card ${i} (Content Slide)`, content: cardContent });
                    }

                    // Caption Card
                    let captionContent = `[Card ${this.numSlides + 1}]\n=== CAPTION ===\n[TUGAS AI: Tuliskan caption sosmed yang emosional dan persuasif berdasarkan isi ${contentType.toLowerCase()}. Berikan Call to Action (CTA) & Hashtag relevan. JANGAN SEBUT KATA FEYNMAN. BILA ADA DALIL, GUNAKAN BAHASA INDONESIA SAJA, BUKAN TEKS ARAB.]`;
                    this.generatedCards.push({ title: "Caption (Sosmed)", content: captionContent });

                    this.accordions.output = true;
                    this.accordions.input = false;
                    this.accordions.settings = false;
                    this.showFeedback("Blueprint Prompt Berhasil Dirakit!", "success");
                },

                copySingleCard(text) {
                    this.executeCopy(text);
                },

                copyAllCards() {
                    if (this.generatedCards.length === 0) return;
                    let fullText = this.generatedCards.map(c => c.content).join('\n\n');
                    this.executeCopy(fullText);
                },

                executeCopy(text) {
                    const textarea = document.createElement('textarea');
                    textarea.value = text;
                    document.body.appendChild(textarea);
                    textarea.select();
                    document.execCommand('copy');
                    document.body.removeChild(textarea);
                    this.showFeedback("Teks berhasil disalin ke clipboard!", "success");
                }
            }
        }
    </script>
</body>
</html>
